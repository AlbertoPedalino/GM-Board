<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>D&amp;D 5e — GM Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:   #0f0e0d;
      --bg2:  #1a1815;
      --bg3:  #232019;
      --bdr:  rgba(180,150,90,.18);
      --bdr2: rgba(180,150,90,.35);
      --gold: #c8a84b;
      --gold2:#e8c96a;
      --gdim: rgba(200,168,75,.12);
      --text: #e8e0cc;
      --text2:#b8a87a;
      --text3:#7a6a4a;
      --teal: #2ecc71;
      --tbg:  rgba(46,204,113,.1);
      --purple:#9b59b6;
      --pbg:  rgba(155,89,182,.1);
      --orange:#e67e22;
      --obg:  rgba(230,126,34,.1);
      --red2: #e74c3c;
      --redbg:rgba(192,57,43,.14);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'EB Garamond',serif;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:2rem 1rem;
    }
    .hero{
      text-align:center;
      margin-bottom:3rem;
    }
    .hero-title{
      font-family:'Cinzel',serif;
      font-size:clamp(2rem,6vw,3.5rem);
      font-weight:900;
      letter-spacing:.06em;
      color:var(--gold2);
      text-shadow:0 0 40px rgba(200,168,75,.35);
      line-height:1.1;
    }
    .hero-sub{
      font-size:1.1rem;
      color:var(--text3);
      margin-top:.6rem;
      letter-spacing:.08em;
      font-style:italic;
    }
    .divider{
      width:120px;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      margin:1.4rem auto 0;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:1.25rem;
      width:100%;
      max-width:560px;
    }
    .card{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:.75rem;
      padding:2rem 1.5rem 1.75rem;
      background:var(--bg2);
      border:1px solid var(--bdr2);
      border-radius:12px;
      text-decoration:none;
      color:var(--text);
      transition:border-color .15s,box-shadow .15s,transform .12s;
      cursor:pointer;
    }
    .card:hover{
      border-color:var(--gold);
      box-shadow:0 0 24px rgba(200,168,75,.18);
      transform:translateY(-2px);
    }
    .card:hover .card-icon{color:var(--gold2);}
    .card-icon{
      color:var(--gold);
      width:2.4rem;
      height:2.4rem;
      flex-shrink:0;
      transition:color .15s;
    }
    .card-icon svg{width:100%;height:100%;stroke-width:1.5}
    .card-label{
      font-family:'Cinzel',serif;
      font-size:.9rem;
      font-weight:700;
      letter-spacing:.08em;
      text-align:center;
      color:var(--text2);
    }
    .card-desc{
      font-size:.8rem;
      color:var(--text3);
      text-align:center;
      line-height:1.4;
      font-style:italic;
    }
    .card.sheet  {border-color:rgba(46,204,113,.3);}
    .card.sheet  .card-icon{color:var(--teal);}
    .card.sheet:hover{border-color:var(--teal);box-shadow:0 0 24px rgba(46,204,113,.15);}
    .card.sheet:hover .card-icon{color:var(--teal);}

    .card.builder{border-color:rgba(155,89,182,.3);}
    .card.builder .card-icon{color:var(--purple);}
    .card.builder:hover{border-color:var(--purple);box-shadow:0 0 24px rgba(155,89,182,.15);}
    .card.builder:hover .card-icon{color:var(--purple);}

    .card.gm    {border-color:rgba(230,126,34,.3);}
    .card.gm    .card-icon{color:var(--orange);}
    .card.gm:hover{border-color:var(--orange);box-shadow:0 0 24px rgba(230,126,34,.15);}
    .card.gm:hover .card-icon{color:var(--orange);}

    .card.encounter{border-color:rgba(231,76,60,.3);}
    .card.encounter .card-icon{color:var(--red2);}
    .card.encounter:hover{border-color:var(--red2);box-shadow:0 0 24px rgba(231,76,60,.15);}
    .card.encounter:hover .card-icon{color:var(--red2);}

    @media(max-width:420px){
      .grid{grid-template-columns:1fr;max-width:320px}
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-title">D&amp;D 5e GM Board</div>
    <div class="hero-sub">2024 Player's Handbook</div>
    <div class="divider"></div>
  </div>

  <div class="grid">
    <a class="card sheet" href="character-sheet.html">
      <div class="card-icon"><i data-lucide="scroll-text"></i></div>
      <div class="card-label">Character Sheet</div>
      <div class="card-desc">View and manage your character in play</div>
    </a>
    <a class="card builder" href="charbuilder.html">
      <div class="card-icon"><i data-lucide="user-pen"></i></div>
      <div class="card-label">Char Builder</div>
      <div class="card-desc">Create or level up your character</div>
    </a>
    <a class="card gm" href="gmboard.html">
      <div class="card-icon"><i data-lucide="layout-dashboard"></i></div>
      <div class="card-label">GM Board</div>
      <div class="card-desc">Initiative tracker, conditions, notes</div>
    </a>
    <a class="card encounter" href="encounter-builder.html">
      <div class="card-icon"><i data-lucide="swords"></i></div>
      <div class="card-label">Encounter Builder</div>
      <div class="card-desc">Build and balance combat encounters</div>
    </a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      if(window.lucide) lucide.createIcons({attrs:{'stroke-width':1.5}});
    });
  </script>
</body>
</html>
