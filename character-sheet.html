function _sheetClassEntities(){
  const out = [];
  const pName = String(C?.className || '');
  if (pName) {
    out.push({
      className: pName,
      subclassShortName: String(C?.subclassShortName || ''),
      level: Number(C?.classLevel || C?.level || 1),
      ownerToken: 'pc',
    });
  }
  (C?.extraClasses || []).forEach((ec, idx) => {
    if (!ec?.name) return;
    out.push({
      className: String(ec.name || ''),
      subclassShortName: String(ec.subclassShortName || ''),
      level: Number(ec.level || 1),
      ownerToken: `mc${idx}`,
    });
  });
  return out;
}
function _sheetSpellcastingProfile(className, subclassShortName, clsSnapshot){
  return getSpellcastingProfile(className, subclassShortName, clsSnapshot);
}
function _sheetCasterProgression(v){ return normCasterProg(v); }
function _sheetCasterContribution(prog, level){ return getCasterContribution(prog, level); }
function _sheetCollectChoiceSpellSourceMeta(){
  const out = {};
  const merge = (obj) => {
    if (!obj || typeof obj !== 'object') return;
    for (const [k, v] of Object.entries(obj)) {
      if (!k || !v || typeof v !== 'object') continue;
      out[k] = { ...v };
    }
  };
  _sheetClassEntities().forEach(ent => {
    const classCfg = _sheetGetClassRuntimeConfig(ent.className);
    merge(classCfg?.spellcasting?.choiceSpellSources);
    const subCfg = _sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName);
    merge(subCfg?.spellcasting?.choiceSpellSources);
  });
  return out;
}
function _sheetFeatureDieFaces(className, featureKey, level){
  const cfg = _sheetGetClassRuntimeConfig(className);
  const dieCfg = cfg?.featureDice?.[featureKey];
  if (!Array.isArray(dieCfg) || !dieCfg.length) return null;
  const lv = Number(level || 0);
  for (const row of dieCfg) {
    const minLv = Number(row?.minLevel || 1);
    if (lv >= minLv && Number.isFinite(Number(row?.faces))) return Number(row.faces);
  }
  return null;
}
function _sheetPreparedCountFromFormula(spellProfile, level){
  const f = spellProfile?.preparedFormula;
  if (!f || typeof f !== 'object') return null;
  const ab = String(f.ability || '').toLowerCase();
  if (!STATS.includes(ab)) return null;
  return applyPreparedFormula(f, getMod(getFinal(ab)), level);
}

function _applySheetFeatureFilters(className, subclassShortName, features, ctx){
  let out = Array.isArray(features) ? features : [];

  const classFilters = typeof getClassSheetFeatureFilters === 'function'
    ? getClassSheetFeatureFilters(className)
    : (_sheetGetAdapterValue(typeof ClassSheetFeatureFilters !== 'undefined' ? ClassSheetFeatureFilters : {}, className) || []);
  for(const fn of classFilters){
    if(typeof fn !== 'function') continue;
    out = fn({ ...(ctx||{}), className, subclassShortName }, out) || out;
  }

  const subclassFilters = typeof getSubclassSheetFeatureFilters === 'function'
    ? getSubclassSheetFeatureFilters(className, subclassShortName)
    : (() => {
        const subKey = className && subclassShortName ? `${className}_${subclassShortName}` : '';
        const canonical = `${_normSheetAdapterKey(className)}_${_normSheetAdapterKey(subclassShortName)}`;
        const store = typeof SubclassSheetFeatureFilters !== 'undefined' ? SubclassSheetFeatureFilters : {};
        return _sheetGetAdapterValue(store, subKey) || _sheetGetAdapterValue(store, canonical) || [];
      })();
  for(const fn of subclassFilters){
    if(typeof fn !== 'function') continue;
    out = fn({ ...(ctx||{}), className, subclassShortName }, out) || out;
  }

  return out;
}

function _applySpeciesSheetFeatureFilters(speciesName, speciesSource, features, ctx){
  let out = Array.isArray(features) ? features : [];
  const filters = typeof getSpeciesSheetFeatureFilters === 'function'
    ? getSpeciesSheetFeatureFilters(speciesName, speciesSource)
    : (() => {
        const key = _sheetGetSpeciesAdapterKey(speciesName, speciesSource);
        const canonical = `${_normSheetAdapterKey(speciesName)}_${_normSheetAdapterKey(speciesSource)}`;
        const store = typeof SpeciesSheetFeatureFilters !== 'undefined' ? SpeciesSheetFeatureFilters : {};
        return _sheetGetAdapterValue(store, key) || _sheetGetAdapterValue(store, canonical) || [];
      })();
  for(const fn of filters){
    if(typeof fn !== 'function') continue;
    out = fn({ ...(ctx||{}), speciesName, speciesSource, speciesKey:_sheetGetSpeciesAdapterKey(speciesName, speciesSource) }, out) || out;
  }
  return out;
}

function _sheetNormalizeChoiceToken(value){
  const nk = String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  if (!nk) return '';
  if (nk === 'dreadnaught') return 'dreadnought';
  return nk;
}
function _sheetFilterActionsByChoice(actions, choicePrefix){
  const prefix = String(choicePrefix || '');
  return (Array.isArray(actions) ? actions : []).filter(a => {
    if (!a || typeof a !== 'object') return false;
    const choiceKey = a.choiceKey ? String(a.choiceKey) : '';
    if (!choiceKey) return true;
    const raw = C?.choices?.[prefix + choiceKey];
    const selectedVals = (Array.isArray(raw) ? raw : [raw]).map(_sheetNormalizeChoiceToken).filter(Boolean);
    if (!selectedVals.length) return false;

    let expected = [];
    if (Array.isArray(a.choiceValues)) expected = a.choiceValues;
    else if (a.choiceValue !== undefined && a.choiceValue !== null) expected = [a.choiceValue];
    else if (a.model !== undefined && a.model !== null) expected = [a.model];
    if (!expected.length) return true;
    const want = expected.map(_sheetNormalizeChoiceToken).filter(Boolean);
    if (!want.length) return true;
    return selectedVals.some(v => want.includes(v));
  });
}

function getSheetClassActions(className, classLevel){
  const lv = Number(classLevel || C?.classLevel || C?.level || 1);
  return _sheetGetClassActions(className).filter(a => {
    if (!a || typeof a !== 'object') return false;
    if (a.minLevel && lv < Number(a.minLevel)) return false;
    if (typeof a.condition === 'function') { try { return !!a.condition(C); } catch(_){return false;} }
    return true;
  });
}

function getSheetSubclassActions(subclassKey, classLevel, choicePrefix){
  const lv = Number(classLevel || C?.classLevel || C?.level || 1);
  const rawKey = String(subclassKey || '');
  const cut = rawKey.indexOf('_');
  const className = cut >= 0 ? rawKey.slice(0, cut) : rawKey;
  const subclassShortName = cut >= 0 ? rawKey.slice(cut + 1) : '';

  let actions = _sheetGetSubclassActions(className, subclassShortName)
    .filter(a => !a?.minLevel || lv >= Number(a.minLevel));
  return _sheetFilterActionsByChoice(actions, choicePrefix || '');
}

function getSheetSpeciesActions(speciesName, speciesSource, charLevel){
  const lv = Number(charLevel || C?.level || 1);
  return _sheetGetSpeciesActions(speciesName, speciesSource)
    .filter(a => !a?.minLevel || lv >= Number(a.minLevel));
}
function _buildReactionSpellCards(cantrips) {
  const raw = typeof getReactionSpells === 'function'
    ? getReactionSpells(C, sheetSpellDb, cantrips)
    : [];
  return raw.map(r => {
    const src = r.source.toLowerCase();
    const slug = r.name.toLowerCase().replace(/'/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const url = src ? `https://5e.tools/spells/${slug}-${src}.html` : null;
    const condition = r.condition ? _stripSheetTags(r.condition) : '';
    const entries = Array.isArray(r.entries) ? r.entries : [r.entries];
    const descText = entries
      .map(e => typeof e === 'string' ? _stripSheetTags(e) : (e && typeof e === 'object' ? _stripSheetTags(Array.isArray(e.entries) ? e.entries.filter(x=>typeof x==='string').join(' ') : (e.text||'')) : ''))
      .filter(Boolean).join(' ');
    return {
      name: r.name,
      nameHtml: url ? `<a href="${url}" target="_blank" style="color:inherit;text-decoration:underline dotted">${esc(r.name)}</a>` : null,
      icon: 'sparkles',
      cat: 'reaction',
      uses: condition ? `Reaction — ${condition}` : 'Reaction',
      desc: descText,
    };
  });
}

function renderActionsTab(){
  const wrap=document.getElementById('attacks-table-wrap');
  if(!wrap) return;
  const wrap2=document.getElementById('combat-actions-wrap');
  const f=activeActionFilter;
  const cls=C?.className||'';
  const lv=C?.level||1;
  const inv=(sheetInventory||[]).map(_resolveInvItem);
  const equippedWeapons=inv.map((item,idx)=>({item,idx})).filter(({item})=>item.equipped&&['M','R'].includes(item.type)&&item.hand!=='off');
  const offHandWeapons=inv.map((item,idx)=>({item,idx})).filter(({item})=>item.equipped&&['M','R'].includes(item.type)&&item.hand==='off');
  const cantripSet = new Set(C?.selectedCantrips||[]);
  const _choiceSpellName = (v) => String(v || '').split('|')[0].trim();
  if(C?.choices){
    const snapshots = C?.spellSnapshots||[];
    const spellLevelByName = (name)=>{
      const lc = String(name||'').toLowerCase();
      const snap = snapshots.find(s=>String(s?.name||'').toLowerCase()===lc);
      if(snap && typeof snap.level === 'number') return snap.level;
      const db = Array.isArray(sheetSpellDb) ? sheetSpellDb.find(s=>s.name.toLowerCase()===lc) : null;
      return db ? db.level : null;
    };
    for(const val of Object.values(C.choices)){
      const vals = Array.isArray(val) ? val : [val];
      vals.forEach(v=>{
        if(typeof v !== 'string') return;
        const sn = _choiceSpellName(v);
        if(!sn) return;
        if(spellLevelByName(sn) === 0) cantripSet.add(sn);
      });
    }
  }
  const cantrips=[...cantripSet];

  // Primary class level (not total character level)
  const pLv=C?.classLevel||lv;
  // Primary class actions — filtered by level AND conditional feature filters
  const subKey=cls+'_'+(C?.subclassShortName||'');
  const classActions=getSheetClassActions(cls, pLv);
  const subActions=getSheetSubclassActions(subKey, pLv);
  // Extra (multiclass) actions
  const extraActions=[];
  for(let _ecIdx=0;_ecIdx<(C?.extraClasses||[]).length;_ecIdx++){
    const ec=(C.extraClasses||[])[_ecIdx];
    if(!ec.name) continue;
    const ecLv=ec.level||1;
    const ecSubKey=ec.name+'_'+(ec.subclassShortName||'');
    const ecPrefix=`mc${_ecIdx}_`;
    const ecBase=getSheetClassActions(ec.name,ecLv).map(a=>({...a,_cls:ec.name}));
    const ecSub=getSheetSubclassActions(ecSubKey,ecLv,ecPrefix).map(a=>({...a,_cls:ec.name}));
    extraActions.push(...ecBase,...ecSub);
  }
  const speciesActions=getSheetSpeciesActions(C?.speciesName||'', C?.speciesSource||'', lv)
    .map(a=>({ ...a, _cls: C?.speciesName || 'Species' }));
  const featActionsAll = [];
  (C?.allFeatSnapshots||[]).forEach(function(feat){
    if(!feat?.name) return;
    const acts = typeof getFeatSheetActions === 'function' ? getFeatSheetActions(feat.name) : [];
    acts.forEach(function(a){ featActionsAll.push({...a, _cls:'Feat'}); });
  });
  const allClassActions=[...classActions,...subActions,...extraActions,...speciesActions,...featActionsAll];

  const isCaster = !!(
    C?.clsSnapshot?.casterProgression ||
    _sheetGetClassRuntimeConfig(C?.className)?.spellcasting?.casterProgression ||
    (C?.selectedCantrips?.length || 0) > 0 ||
    Object.values(C?.selectedSpells||{}).flat().length ||
    (C?.extraClasses||[]).some(ec =>
      ec.clsSnapshot?.casterProgression ||
      _sheetGetClassRuntimeConfig(ec.name)?.spellcasting?.casterProgression ||
      (ec.selectedCantrips?.length||0) > 0 ||
      Object.values(ec.selectedSpells||{}).flat().length
    )
  );

  // Filter standard actions: universal always shown; casterOnly only if caster
  const stdVisible = STANDARD_ACTIONS.filter(a =>
    a.universal || (a.casterOnly && isCaster)
  );

  let html='';
  const show=(cat)=>f==='all'||f===cat;

  // ── ATTACCHI ──
  if(show('attack')){
    if(f==='all') html+=`<div class="action-section-hdr">${luci('swords')} Attacks</div>`;
    if(!equippedWeapons.length && !offHandWeapons.length && !allClassActions.filter(a=>a.cat==='attack').length){
      html+=`<div style="font-size:var(--fs-body);color:var(--text3);font-style:italic;padding:.3rem 0">
        ${luci('lightbulb')} Go to <b>Inventory</b>, find a weapon and press <b>Equip</b> to see it here.
      </div>`;
    }
    for(const {item:w,idx:wIdx} of equippedWeapons) html+=buildWeaponCard(w,wIdx);
    html+=buildUnarmedCard(UNARMED_OPTIONS[0]);
    for(const a of allClassActions.filter(a=>a.cat==='attack')) html+=buildClassActionCard(a);
  }

  // ── ACTIONS ──
  if(show('action')){
    if(f==='all') html+=`<div class="action-section-hdr">${luci('target')} Actions</div>`;
    for(const a of allClassActions.filter(a=>a.cat==='action'&&a.uses!=='Passive')) html+=buildClassActionCard(a);
  }

  // ── BONUS ACTIONS ──
  if(show('bonus')){
    if(f==='all') html+=`<div class="action-section-hdr">${luci('zap')} Bonus Actions</div>`;
    for(const {item:w,idx:wIdx} of offHandWeapons) html+=buildWeaponCard(w,wIdx);
    for(const a of allClassActions.filter(a=>a.cat==='bonus')) html+=buildClassActionCard(a);
    for(const a of stdVisible.filter(a=>a.cat==='bonus')) html+=buildStdActionCard(a);
    if(!offHandWeapons.length && !allClassActions.filter(a=>a.cat==='bonus').length)
      html+=`<div style="font-size:var(--fs-body);color:var(--text3);font-style:italic;padding:.3rem 0">
        No bonus actions specific to ${esc(cls)||'this class'}.
      </div>`;
  }

  // ── REACTIONS ──
  if(show('reaction')){
    if(f==='all') html+=`<div class="action-section-hdr">${luci('rotate-ccw')} Reactions</div>`;
    for(const a of allClassActions.filter(a=>a.cat==='reaction'||a.cat==='react')) html+=buildClassActionCard(a);
    const reactSpells = _buildReactionSpellCards(cantrips);
    for(const a of reactSpells) html+=buildClassActionCard(a);
    const reactStd = stdVisible.filter(a=>a.cat==='reaction'||a.cat==='react');
    for(const a of reactStd.filter(a=>a.name!=='Spell (Reaction)')) html+=buildStdActionCard(a);
    if(isCaster && !reactSpells.length)
      for(const a of reactStd.filter(a=>a.name==='Spell (Reaction)')) html+=buildStdActionCard(a);
  }

  wrap.innerHTML=html;
  if(wrap2) wrap2.innerHTML='';
  refreshIcons();
}


function filterActions(type, btn){
  document.querySelectorAll('.af-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  activeActionFilter=type;
  renderActionsTab();
}

function renderSpellsTab(){
  const el = document.getElementById('spells-wrap');
  const allCantrips = [...new Set([
    ...(C.selectedCantrips||[]),
    ...(C.extraClasses||[]).flatMap(ec=>ec.selectedCantrips||[])
  ])];
  const allSpells = (()=>{
    const merged = {};
    const merge = (src)=>{ for(const [lv,names] of Object.entries(src||{})){ if(!merged[lv]) merged[lv]=[]; merged[lv]=[...new Set([...merged[lv],...names])]; } };
    merge(C.selectedSpells||{});
    (C.extraClasses||[]).forEach(ec=>merge(ec.selectedSpells||{}));
    return merged;
  })();
  const auto        = C.autoGrantedSpells||[];
  const snapshots   = C.spellSnapshots||[];

  const _lvlCache = new Map();
  const spellLevelByName = (name)=>{
    const lc = String(name||'').toLowerCase();
    if(_lvlCache.has(lc)) return _lvlCache.get(lc);
    const snap = snapshots.find(s=>String(s?.name||'').toLowerCase()===lc);
    if(snap && typeof snap.level === 'number'){ _lvlCache.set(lc, snap.level); return snap.level; }
    const db = Array.isArray(sheetSpellDb) ? sheetSpellDb.find(s=>s.name.toLowerCase()===lc) : null;
    const lv = db ? db.level : null;
    _lvlCache.set(lc, lv);
    return lv;
  };
  const _isRitualByName = (spellName) => {
    const lc = String(spellName || '').toLowerCase();
    const snapHit = snapshots.find(s => String(s?.name || '').toLowerCase() === lc);
    if (typeof snapHit?.ritual === 'boolean') return !!snapHit.ritual;
    const dbHit = Array.isArray(sheetSpellDb) ? sheetSpellDb.find(s => String(s?.name || '').toLowerCase() === lc) : null;
    return !!dbHit?.ritual;
  };

  const choiceSpellNames = [];
  const _choiceSpellName = (v) => String(v || '').split('|')[0].trim();
  if(C?.choices){
    for(const val of Object.values(C.choices)){
      const vals = Array.isArray(val) ? val : [val];
      vals.forEach(v=>{
        if(typeof v !== 'string') return;
        const sn = _choiceSpellName(v);
        if(!sn) return;
        const slv = spellLevelByName(sn);
        if(slv === 0 || (typeof slv === 'number' && slv >= 1 && slv <= 9)) choiceSpellNames.push(sn);
      });
    }
  }
  const choiceCantrips = choiceSpellNames.filter(n=>spellLevelByName(n)===0);
  const choiceSpellsByLevel = {};
  choiceSpellNames.forEach(n=>{
    const slv = spellLevelByName(n);
    if(typeof slv === 'number' && slv >= 1 && slv <= 9){
      if(!choiceSpellsByLevel[slv]) choiceSpellsByLevel[slv] = [];
      choiceSpellsByLevel[slv].push(n);
    }
  });

  // Gather extra cantrips from adapter choices (EK, AT, Thaumaturge, Magician, Pact of Tome)
  const CANTRIP_CHOICE_KEYS = [
    'cleric_thaumaturge_cantrip','druid_magician_cantrip',
    'subclass_ek_cantrip_1','subclass_ek_cantrip_2',
    'subclass_at_cantrip_1','subclass_at_cantrip_2',
    'warlock_tome_cantrip_1','warlock_tome_cantrip_2','warlock_tome_cantrip_3',
  ];
  const adapterCantrips = []; // [{name, key}]
  if(C?.choices){
    for(const key of CANTRIP_CHOICE_KEYS){
      const val = C.choices[key];
      if(!val) continue;
      const vals = Array.isArray(val)?val:[val];
      vals.forEach(v=>{if(typeof v==='string') adapterCantrips.push({name:v,key});});
    }
  }

  const hasCaster = C.clsSnapshot?.casterProgression ||
    _sheetGetClassRuntimeConfig(C?.className)?.spellcasting?.casterProgression ||
    (C?.extraClasses||[]).some(ec =>
      ec.clsSnapshot?.casterProgression ||
      _sheetGetClassRuntimeConfig(ec.name)?.spellcasting?.casterProgression
    );
  const hasAdapterCantrips = adapterCantrips.length > 0;
  const hasChoiceSpells = choiceSpellNames.length > 0;

  // ── At Will Invocation Spells — compute entries early for early-return & placeholder ──
  const _sheetHasInvocation = (invName) => {
    if (!C?.choices) return false;
    return Object.entries(C.choices).some(([k, v]) =>
      k.replace(/^mc\d+_/, '').startsWith('warlock_invocation_') &&
      String(v).split('|')[0].trim() === invName
    );
  };
  const _atWillEntries = [];
  const _awClassEntities = [
    { name: C?.className || '', level: C?.classLevel || C?.level || 1 },
    ...(C?.extraClasses || []).map(ec => ({ name: ec.name || '', level: ec.level || 1 }))
  ];
  if (typeof getClassAtWillSpells === 'function') {
    for (const ent of _awClassEntities) {
      const awMap = getClassAtWillSpells(ent.name);
      if (!awMap) continue;
      for (const entry of awMap) {
        if (ent.level < (entry.minLevel || 1)) continue;
        if (!_sheetHasInvocation(entry.invocation)) continue;
        if (!_atWillEntries.find(r => r.spell === entry.spell)) _atWillEntries.push(entry);
      }
    }
  }

  if(!hasCaster && !allCantrips.length && !Object.values(allSpells).flat().length && !hasAdapterCantrips && !auto.length && !hasChoiceSpells && !_atWillEntries.length){
    el.innerHTML='<div class="phmsg">This character is not a spellcaster.</div>'
      + '<button class="spl-add-btn" onclick="openSpellPicker()">+ Add Spell</button>';
    return;
  }

  const dc = getSpellSaveDC();
  const atk = fbonus(getSpellAttackBonus());

  let h = `<div style="display:flex;gap:1rem;margin-bottom:.75rem;flex-wrap:wrap">
    <div class="stat-box" style="min-width:80px">
      <div class="stat-box-val" style="font-size:var(--fs-value-sm)">${dc}</div>
      <div class="stat-box-lbl">Spell DC</div>
    </div>
    <div class="stat-box" style="min-width:80px">
      <div class="stat-box-val" style="font-size:var(--fs-value-sm)">${atk}</div>
      <div class="stat-box-lbl">Spell Attack</div>
    </div>
    <div class="stat-box" style="min-width:80px">
      <div class="stat-box-val" style="font-size:var(--fs-value-sm)">${SLBL[getSpellAbility()]}</div>
      <div class="stat-box-lbl">Spell Ability</div>
    </div>
  </div>`;
  if (_sheetHasNonProficientArmor()) {
    h += `<div class="phmsg" style="border-color:var(--red);color:var(--red);margin-bottom:.75rem">
      Untrained armor: this character can't cast spells while wearing it.
    </div>`;
  }
  const _AW_PLACEHOLDER = '<!--AW-->';
  h += _AW_PLACEHOLDER;

  // Spell slots
  const lv = C.level;
  const extra = C.extraClasses||[];
  const pLvSheet = C.classLevel || lv - extra.reduce((s,ec)=>s+(ec.level||1),0);
  function _sheetCasterLv(clsName,clsLv,scName){
    const profile = _sheetSpellcastingProfile(clsName, scName, null);
    const t = _sheetCasterProgression(profile?.casterProgression);
    return _sheetCasterContribution(t, clsLv); // pact/non-caster => 0
  }
  const pProfile = _sheetSpellcastingProfile(C.className || '', C.subclassShortName || '', C.clsSnapshot || {});
  const prog = _sheetCasterProgression(pProfile?.casterProgression || C.clsSnapshot?.casterProgression);
  let slots = [];
  let warlockLv = prog === 'pact' ? pLvSheet : 0; // pure Warlock gets pLvSheet directly
  if(extra.length){
    // Combined non-Warlock caster levels
    let cLv = _sheetCasterLv(C.className||'', pLvSheet, C.subclassShortName||'');
    if(prog==='pact') warlockLv += pLvSheet;
    extra.forEach(ec=>{
      cLv += _sheetCasterLv(ec.name||'',ec.level||1,ec.subclassShortName||'');
      const ecProf = _sheetSpellcastingProfile(ec.name||'', ec.subclassShortName||'', ec.clsSnapshot||{});
      const ecProg = _sheetCasterProgression(ecProf?.casterProgression || ec.clsSnapshot?.casterProgression);
      if(ecProg==='pact') warlockLv+=(ec.level||1);
    });
    cLv = Math.floor(cLv);
    slots = cLv>0 ? (FULL_SLOTS[Math.min(cLv,20)]||[]) : [];
  } else if(prog==='full') slots = FULL_SLOTS[lv]||[];
  else if(prog==='1/2' || prog==='half') slots = HALF_SLOTS[lv]||[];
  else if(prog==='1/3') slots = THIRD_SLOTS[lv]||[];
  else if(prog==='artificer') slots = FULL_SLOTS[Math.min(Math.ceil(lv/2),20)]||[];
  const castableSlotLevels = new Set();
  if(slots.length){
    h+=`<div style="margin-bottom:.75rem">
      <div class="spell-level-hdr" style="color:var(--gold);border-bottom-color:var(--gdim)">Spell Slots</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.4rem">`;
    for(let i=0;i<slots.length;i++){
      const tot=slots[i]; if(!tot) continue;
      castableSlotLevels.add(i+1);
      const used=spellSlotUsed[i+1]||0;
      h+=`<div>
        <div style="font-family:var(--ff-display);font-size:var(--fs-micro);color:var(--text3);text-align:center;margin-bottom:3px">${i+1}°</div>
        <div class="slot-pips" id="slot-pips-${i+1}">
          ${Array.from({length:tot},(_,k)=>`<div class="slot-pip${k<used?' used':''}" onclick="toggleSlot(${i+1},${k})"></div>`).join('')}
        </div>
      </div>`;
    }
    h+=`</div></div>`;
  } else if(prog==='pact' && !extra.length){
    // Single-class Warlock: show pact slots
    const ps=PACT_SLOTS[lv]||{n:1,l:1};
    if(ps.n > 0) castableSlotLevels.add(ps.l);
    const used=spellSlotUsed[ps.l]||0;
    h+=`<div style="margin-bottom:.75rem">
      <div class="spell-level-hdr" style="color:var(--gold);border-bottom-color:var(--gdim)">Slot Patto (${ps.n}x ${ps.l}°)</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.4rem">
        <div>
          <div style="font-family:var(--ff-display);font-size:var(--fs-micro);color:var(--text3);text-align:center;margin-bottom:3px">${ps.l}°</div>
          <div class="slot-pips" id="slot-pips-pact-${ps.l}">
            ${Array.from({length:ps.n},(_,k)=>`<div class="slot-pip${k<used?' used':''}" onclick="togglePactSlot(${ps.l},${ps.n},${k})"></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }
  // Warlock pact slots in multiclass: always shown separately per 5e rules
  if(extra.length && warlockLv > 0){
    const ps=PACT_SLOTS[Math.min(warlockLv,20)]||{n:1,l:1};
    if(ps.n > 0) castableSlotLevels.add(ps.l);
    const used=spellSlotUsed[ps.l]||0;
    h+=`<div style="margin-bottom:.75rem">
      <div class="spell-level-hdr" style="color:var(--purple);border-bottom-color:rgba(155,89,182,.25)">Slot Patto Warlock (${ps.n}x ${ps.l}°) — SR</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.4rem">
        <div>
          <div style="font-family:var(--ff-display);font-size:var(--fs-micro);color:var(--text3);text-align:center;margin-bottom:3px">${ps.l}°</div>
          <div class="slot-pips" id="slot-pips-pact-${ps.l}">
            ${Array.from({length:ps.n},(_,k)=>`<div class="slot-pip${k<used?' used':''}" onclick="togglePactSlot(${ps.l},${ps.n},${k})"></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }

  const _upcastStepRegex = (kind) => {
    const term = kind === 'heal'
      ? '(?:healing|hit points|regain|regains)'
      : '(?:damage|takes?\\s+extra\\s+damage)';
    return [
      new RegExp(`${term}[^.]{0,220}?increases?\\s+by\\s+(\\d+d\\d+(?:\\s*[+-]\\s*\\d+)?)\\s+for\\s+each\\s+slot\\s+level\\s+above\\s+(\\d+)(?:st|nd|rd|th)`, 'i'),
      new RegExp(`for\\s+each\\s+slot\\s+level\\s+above\\s+(\\d+)(?:st|nd|rd|th)[^.]{0,220}?${term}[^.]{0,220}?increases?\\s+by\\s+(\\d+d\\d+(?:\\s*[+-]\\s*\\d+)?)`, 'i'),
      new RegExp(`using\\s+a\\s+spell\\s+slot\\s+of\\s+(\\d+)(?:st|nd|rd|th)?\\s+level\\s+or\\s+higher[^.]{0,220}?increases?\\s+by\\s+(\\d+d\\d+(?:\\s*[+-]\\s*\\d+)?)`, 'i'),
      new RegExp(`${term}[^.]{0,220}?increases?\\s+by\\s+(\\d+d\\d+(?:\\s*[+-]\\s*\\d+)?)\\s+for\\s+each\\s+slot\\s+level\\s+above\\s+(\\d+)`, 'i'),
      new RegExp(`for\\s+each\\s+slot\\s+level\\s+above\\s+(\\d+)[^.]{0,220}?${term}[^.]{0,220}?increases?\\s+by\\s+(\\d+d\\d+(?:\\s*[+-]\\s*\\d+)?)`, 'i')
    ];
  };
  function _fmtDiceFormula(count, faces, mod){
    const c = Number(count || 0);
    const f = Number(faces || 0);
    const m = Number(mod || 0);
    if(!Number.isFinite(c) || !Number.isFinite(f) || c < 1 || f < 1) return '';
    return `${c}d${f}${m ? (m >= 0 ? '+' : '') + m : ''}`;
  }
  function _extractFirstHealFormulaFromEntries(entries){
    const txt = JSON.stringify(entries || []);
    if(!txt || txt === '[]') return null;
    const healContext = /\b(regain|regains|healing|hit points|restore|restores)\b/i.test(txt);
    const tagMatches = txt.matchAll(/\{@(?:heal|dice|scaledice)\s+([^}|]+)[^}]*\}/ig);
    for(const m of tagMatches){
      const wholeTag = String(m?.[0] || '').toLowerCase();
      if (!wholeTag.startsWith('{@heal') && !healContext) continue;
      const f = _normalizeDiceFormula(m?.[1] || '');
      if(_parseFormula(f)) return f;
    }
    const plainNear = txt.match(/\b(?:regain|regains|restore|restores)\b[^.]{0,220}?\b(\d+d\d+(?:\s*[+-]\s*\d+)?)\b/i);
    if(plainNear){
      const f = _normalizeDiceFormula(plainNear[1]);
      if(_parseFormula(f)) return f;
    }
    const plainEqual = healContext
      ? txt.match(/\b(?:equal(?:s)?\s+to|plus)\b[^.]{0,120}?\b(\d+d\d+(?:\s*[+-]\s*\d+)?)\b/i)
      : null;
    if(plainEqual){
      const f = _normalizeDiceFormula(plainEqual[1]);
      if(_parseFormula(f)) return f;
    }
    return null;
  }
  function _applySpellcastingModIfNeeded(baseFormula, entries, kind){
    const base = _normalizeDiceFormula(baseFormula || '');
    const p = _parseFormula(base);
    if(!p) return base;
    const txt = JSON.stringify(entries || []).replace(/\\"/g,'"').toLowerCase();
    if(!txt || txt === '[]') return base;
    const hasBonusPhrase = /(?:\+|plus|add(?:ed|s|ing)?|equal to)[^.]{0,80}\b(?:your\s+)?spellcasting ability modifier\b/i.test(txt);
    const hasUseAbilityForDamageRolls = /\buse(?:s|d)?\s+your\s+spellcasting ability modifier[^.]{0,140}\b(?:damage rolls?|attack and damage rolls?)\b/i.test(txt);
    if(!hasBonusPhrase && !hasUseAbilityForDamageRolls) return base;
    if(kind === 'heal' && !/\b(regain|regains|healing|hit points|restore|restores)\b/i.test(txt)) return base;
    if(kind === 'damage' && !/\b(damage|takes?)\b/i.test(txt)) return base;
    const sm = getMod(getFinal(getSpellAbility()));
    return _fmtDiceFormula(p.count, p.faces, p.mod + sm) || base;
  }
  function _scaleFormulaByStep(baseFormula, stepFormula, steps){
    const b = _parseFormula(_normalizeDiceFormula(baseFormula || ''));
    const s = _parseFormula(_normalizeDiceFormula(stepFormula || ''));
    if(!b || !s || !steps || steps < 1) return _normalizeDiceFormula(baseFormula || '');
    if(b.faces !== s.faces || s.mod !== 0) return _normalizeDiceFormula(baseFormula || '');
    const cnt = b.count + (s.count * steps);
    const mod = b.mod || 0;
    return _fmtDiceFormula(cnt, b.faces, mod) || _normalizeDiceFormula(baseFormula || '');
  }
  function _extractUpcastStep(entries, kind){
    const txt = JSON.stringify(entries || []).replace(/\\"/g,'"');
    if(!txt || txt === '[]') return null;
    const scaledTag = txt.match(/\{@scaled(?:amage|ice)\s+([^|}]+)\|([^|}]*)\|([^}|]+)(?:\|[^}]*)?\}/i);
    if(scaledTag){
      const baseRange = String(scaledTag[2] || '');
      const stepFormula = _normalizeDiceFormula(scaledTag[3] || '');
      const rangeStart = Number(String(baseRange).split('-')[0] || 0);
      const baseLv = Number.isFinite(rangeStart) && rangeStart > 0 ? Math.max(1, rangeStart - 1) : 1;
      if(_parseFormula(stepFormula) && Number.isFinite(baseLv) && baseLv > 0){
        return { stepFormula, baseLv };
      }
    }
    for(const rx of _upcastStepRegex(kind)){
      const m = txt.match(rx);
      if(!m) continue;
      const dice = /\d+d\d+/i.test(String(m[1] || '')) ? m[1] : m[2];
      const lvl = /\d+d\d+/i.test(String(m[1] || '')) ? m[2] : m[1];
      const stepFormula = _normalizeDiceFormula(dice || '');
      const baseLv = Number(lvl || 0);
      if(_parseFormula(stepFormula) && Number.isFinite(baseLv) && baseLv > 0){
        return { stepFormula, baseLv };
      }
    }
    return null;
  }
  function _formulaForCastLevel(baseFormula, entries, baseLevel, castLevel, kind){
    const base = _normalizeDiceFormula(baseFormula || '');
    if(!base || !castLevel || castLevel <= baseLevel) return base;
    const up = _extractUpcastStep(entries, kind);
    if(!up) return base;
    const fromLv = Math.max(Number(up.baseLv || baseLevel), Number(baseLevel || 1));
    const steps = castLevel - fromLv;
    if(steps < 1) return base;
    return _scaleFormulaByStep(base, up.stepFormula, steps);
  }
  const spellModifierFns = (() => {
    const out = [];
    const push = (arr, ownerClass, ownerLevel, ownerToken) => {
      (Array.isArray(arr) ? arr : []).forEach(fn => {
        if (typeof fn !== 'function') return;
        out.push({
          fn,
          ownerClass: String(ownerClass || ''),
          ownerLevel: Number(ownerLevel || 1),
          ownerToken: String(ownerToken || 'pc'),
        });
      });
    };

    const pCls = String(C?.className || '');
    const pLv = Number(C?.classLevel || C?.level || 1);
    push(_sheetGetClassSpellModifiers(pCls), pCls, pLv, 'pc');
    push(_sheetGetSubclassSpellModifiers(pCls, C?.subclassShortName || ''), pCls, pLv, 'pc');

    (C?.extraClasses || []).forEach((ec, idx) => {
      if (!ec?.name) return;
      const ecCls = String(ec.name || '');
      const ecLv = Number(ec.level || 1);
      const token = `mc${idx}`;
      push(_sheetGetClassSpellModifiers(ecCls), ecCls, ecLv, token);
      push(_sheetGetSubclassSpellModifiers(ecCls, ec.subclassShortName || ''), ecCls, ecLv, token);
    });

    push(
      _sheetGetSpeciesSpellModifiers(C?.speciesName || '', C?.speciesSource || ''),
      C?.speciesName || '',
      Number(C?.level || 1),
      'species'
    );

    return out;
  })();
  function _applyAdapterSpellModifiers(baseFormula, ctx){
    let out = _normalizeDiceFormula(baseFormula || '');
    if(!out) return out;
    for(const mod of spellModifierFns){
      try {
        const next = mod.fn({
          ...(ctx || {}),
          formula: out,
          character: C,
          ownerClass: mod.ownerClass,
          ownerLevel: mod.ownerLevel,
          ownerToken: mod.ownerToken,
        });
        if(typeof next === 'string' && next.trim()) out = _normalizeDiceFormula(next);
      } catch (err) {
        console.warn('[SheetSpellModifier] error', err);
      }
    }
    return out;
  }

  // Helper for a spell row with source badge and dice buttons
  function _spellRow(name, extra='', castLevel=null){
    const snap = snapshots.find(s=>s.name===name);
    // sheetSpellDb is authoritative for attack/damage metadata once loaded
    const full = sheetSpellDb?.find(s=>s.name===name);
    const fullLevel = Number(full?.level);
    const snapLevel = Number(snap?.level);
    const baseLevel = Number.isFinite(fullLevel)
      ? fullLevel
      : (Number.isFinite(snapLevel) ? snapLevel : null);
    const castLvNum = Number(castLevel);
    const effCastLevel = (Number.isFinite(castLvNum) && castLvNum > 0)
      ? castLvNum
      : (typeof baseLevel === 'number' ? baseLevel : null);
    const school = snap ? (SCHOOL_LABELS[snap.school]||snap.school||'') : (full ? (SCHOOL_LABELS[full.school]||full.school||'') : '');
    const isConc = snap?.concentration ?? full?.concentration;
    const isRit  = snap?.ritual ?? full?.ritual;
    const src = getSpellSource(name);
    const spellAbility = (src?.ability && STATS.includes(src.ability)) ? src.ability : getSpellAbility();
    const spellMod = getMod(getFinal(spellAbility));
    const spellAtk = spellMod + getPB();
    const entries = (snap?.entries ?? full?.entries ?? []);
    const entriesHigher = (snap?.entriesHigherLevel ?? full?.entriesHigherLevel ?? []);
    const ruleEntries = [
      ...(Array.isArray(entries) ? entries : [entries]),
      ...(Array.isArray(entriesHigher) ? entriesHigher : [entriesHigher]),
    ].filter(Boolean);
    const rawDmgFormula = _applySpellcastingModIfNeeded(_extractFirstDamageFormulaFromEntries(entries), ruleEntries, 'damage');
    const rawHealFormula = _applySpellcastingModIfNeeded(_extractFirstHealFormulaFromEntries(entries), ruleEntries, 'heal');
    const dmgFormulaBase = (typeof baseLevel === 'number' && typeof effCastLevel === 'number')
      ? _formulaForCastLevel(rawDmgFormula, ruleEntries, baseLevel, effCastLevel, 'damage')
      : rawDmgFormula;
    const healFormulaBase = (typeof baseLevel === 'number' && typeof effCastLevel === 'number')
      ? _formulaForCastLevel(rawHealFormula, ruleEntries, baseLevel, effCastLevel, 'heal')
      : rawHealFormula;
    const safeName = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const textBlob = JSON.stringify(ruleEntries || []).toLowerCase();
    const hasDamageContext = /\b(?:damage|takes?)\b/.test(textBlob);
    const hasHealContext = /\b(?:regain|regains|healing|hit points|restore|restores)\b/.test(textBlob);
    const usesSpellSlot = Number.isFinite(effCastLevel) && effCastLevel >= 1 && castableSlotLevels.has(effCastLevel);
    const dmgFormula = _applyAdapterSpellModifiers(dmgFormulaBase, {
      kind: 'damage',
      spellName: name,
      spellLevel: baseLevel,
      castLevel: effCastLevel,
      entries: ruleEntries,
      source: src,
      hasDamageContext,
      hasHealContext,
      usesSpellSlot,
    });
    const healFormula = _applyAdapterSpellModifiers(healFormulaBase, {
      kind: 'heal',
      spellName: name,
      spellLevel: baseLevel,
      castLevel: effCastLevel,
      entries: ruleEntries,
      source: src,
      hasDamageContext,
      hasHealContext,
      usesSpellSlot,
    });
    const hasAttack = !!(full?.spellAttack?.length || /\{@atk\s+/i.test(textBlob) || /\b(?:spell attack|melee spell attack|ranged spell attack)\b/.test(textBlob));
    const castSuffix = (typeof effCastLevel === 'number' && typeof baseLevel === 'number' && effCastLevel > baseLevel)
      ? ` [${effCastLevel}°]`
      : '';
    const atkBtn = hasAttack
      ? `<button class="roll-btn" style="font-size:var(--fs-xs);padding:2px 5px;margin-left:3px" onclick="event.stopPropagation();rollD20(${spellAtk},'ATK: ${safeName}${castSuffix}')">${luci('dice-5')} ${fbonus(spellAtk)}</button>`
      : '';
    const dmgBtn = (hasDamageContext && dmgFormula)
      ? `<button class="roll-btn dmg" style="font-size:var(--fs-xs);padding:2px 5px;margin-left:2px" onclick="event.stopPropagation();rollDamage('${_jsEsc(dmgFormula)}','${safeName}${castSuffix}')">${luci('flame')} ${dmgFormula}</button>`
      : '';
    const healBtn = (hasHealContext && healFormula)
      ? `<button class="roll-btn heal" style="font-size:var(--fs-xs);padding:2px 5px;margin-left:2px" onclick="event.stopPropagation();rollDamage('${_jsEsc(healFormula)}','Heal: ${safeName}${castSuffix}')">${luci('heart')} ${healFormula}</button>`
      : '';
    const spellId = 'spl_' + name.replace(/[^a-zA-Z0-9]/g,'_');
    const entryHtml = rE(entries);
    const castTime = full?.time?.[0] ? `${full.time[0].number} ${full.time[0].unit}` : (snap?.time?.[0] ? `${snap.time[0].number} ${snap.time[0].unit}` : '');
    const range = full?.range?.distance?.amount != null ? `${full.range.distance.amount} ${full.range.distance.type||''}`.trim() : (full?.range?.type||snap?.range?.type||'');
    const compArr = (full?.components ?? snap?.components ?? {});
    const comp = [compArr.v?'V':null, compArr.m?'M':null, compArr.s?'S':null].filter(Boolean).join(', ');
    const dur = full?.duration?.[0]?.type||snap?.duration?.[0]?.type||'';
    const metaLine = [castTime, range, comp, dur].filter(Boolean).join(' · ');
    const castBadge = (typeof effCastLevel === 'number' && typeof baseLevel === 'number' && effCastLevel > baseLevel)
      ? `<span class="spell-badge" style="border:1px solid var(--blue);color:var(--blue);background:var(--bg3)">${effCastLevel}° slot</span>`
      : '';
    const _castUnit = full?.time?.[0]?.unit || snap?.time?.[0]?.unit || '';
    const _castTimeBadge = _castUnit === 'bonus'
      ? `<span class="spell-badge" style="border:1px solid var(--yellow,#f5c542);color:var(--yellow,#f5c542);background:transparent">BA</span>`
      : _castUnit === 'reaction'
      ? `<span class="spell-badge" style="border:1px solid var(--orange,#f5a623);color:var(--orange,#f5a623);background:transparent">RE</span>`
      : _castUnit === 'action' || _castUnit === ''
      ? `<span class="spell-badge" style="border:1px solid var(--blue,#4a9eff);color:var(--blue,#4a9eff);background:transparent">A</span>`
      : `<span class="spell-badge" style="border:1px solid var(--bdr2,#444);color:var(--text3);background:transparent">${esc(_castUnit)}</span>`;
    const _spellSrc = (snap?.source || full?.source || '').toLowerCase();
    const _spellSlug = name.toLowerCase().replace(/'/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const _spellUrl = _spellSrc ? `https://5e.tools/spells/${_spellSlug}-${_spellSrc}.html` : null;

    // Apply cantrip data modifiers (e.g. Eldritch Blast invocations via warlock adapter)
    const _effCantrip = _getEffectiveCantripData(name);
    const _baseCantrip = typeof getCantripData === 'function' ? getCantripData(name) : null;
    let _rowDmgBtn = dmgBtn, _rowMetaLine = metaLine;
    if (_effCantrip) {
      const _lv = C?.level || 1;
      if (_effCantrip.dmgBonusPerBeam) {
        const _numBeams = cantripDice(_lv);
        const _die = _effCantrip.die;
        const _base = _die ? `${_numBeams}d${_die.split('d')[1]}` : dmgFormula;
        const _bonus = _numBeams * getMod(getFinal(_effCantrip.dmgBonusPerBeam));
        if (_base) {
          const _full = _base + (_bonus >= 0 ? `+${_bonus}` : `${_bonus}`);
          _rowDmgBtn = `<button class="roll-btn dmg" style="font-size:var(--fs-xs);padding:2px 5px;margin-left:2px" onclick="event.stopPropagation();rollDamage('${_jsEsc(_full)}','${safeName}${castSuffix}')">${luci('flame')} ${_full}</button>`;
        }
      }
      // Only override range/notes if the modifier actually changed them from base
      if (_effCantrip.range && _effCantrip.range !== (_baseCantrip?.range)) {
        _rowMetaLine = [castTime, _effCantrip.range, comp, dur].filter(Boolean).join(' · ');
      }
      const _addedNotes = (_effCantrip.notes && _effCantrip.notes !== (_baseCantrip?.notes ?? ''))
        ? _effCantrip.notes : null;
      if (_addedNotes) _rowMetaLine += (_rowMetaLine ? ' · ' : '') + _addedNotes;
    }

    return `<div>
      <div class="spell-entry" onclick="toggleSpellDesc('${spellId}')">
        ${_spellUrl
          ? `<a href="${_spellUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:inherit;text-decoration:underline dotted;text-underline-offset:2px">${esc(name)}</a>`
          : `<span>${esc(name)}</span>`}
        ${src?`<span class="spell-badge" style="background:var(--pbg);border-color:var(--purple);color:var(--purple);border:1px solid;border-radius:3px;padding:1px 5px;font-size:var(--fs-xs);flex-shrink:0">${esc(src.label)}</span>`:''}
        ${extra}${castBadge}
        ${atkBtn}${_rowDmgBtn}${healBtn}
        <span style="margin-left:auto;display:flex;align-items:center;gap:3px;flex-shrink:0">
          ${school?`<span class="spell-badge" style="border:1px solid var(--bdr2,#444);color:var(--text3);background:transparent">${esc(school)}</span>`:''}
          ${isConc?`<span class="spell-badge conc">C</span>`:''}
          ${isRit?`<span class="spell-badge rit">R</span>`:''}
          ${_castTimeBadge}
        </span>
      </div>
      ${entryHtml?`<div id="${spellId}" class="spell-entry-body">
        ${_rowMetaLine?`<div style="font-size:var(--fs-label);color:var(--text3);margin-bottom:5px">${esc(_rowMetaLine)}</div>`:''}
        ${entryHtml}
      </div>`:''}
    </div>`;
  }

  // Cantrips: class cantrips + adapter cantrips
  const allCantripNames = [...new Set([...allCantrips, ...adapterCantrips.map(a=>a.name), ...choiceCantrips])];
  if(allCantripNames.length){
    h+=`<div class="spell-level-section"><div class="spell-level-hdr">Cantrip</div>`;
    for(const name of allCantripNames) h+=_spellRow(name);
    h+=`</div>`;
  }

  // Spells by slot level (includes upcast options when a higher slot is available)
  const ritualSpellbookLeveled = [];
  const _collectWizardRitualBook = (bucket) => {
    for(let lv=1; lv<=9; lv++){
      const list = [...new Set((bucket?.wizardSpellbook?.[lv] || []).filter(Boolean))];
      list.forEach(n => { if(_isRitualByName(n)) ritualSpellbookLeveled.push(n); });
    }
  };
  if(String(C?.className || '').toLowerCase() === 'wizard') _collectWizardRitualBook(C);
  (C.extraClasses || []).forEach(ec => {
    if(String(ec?.name || '').toLowerCase() === 'wizard') _collectWizardRitualBook(ec);
  });
  const leveledKnownNames = [...new Set([
    ...Object.values(allSpells).flat(),
    ...ritualSpellbookLeveled,
    ...Object.values(choiceSpellsByLevel).flat(),
    ...auto.filter(a => typeof a?.level === 'number' && a.level >= 1 && a.level <= 9).map(a => a.name),
  ])];
  const leveledByBase = {};
  leveledKnownNames.forEach(name => {
    const base = spellLevelByName(name);
    if(typeof base !== 'number' || base < 1 || base > 9) return;
    if(!leveledByBase[base]) leveledByBase[base] = [];
    leveledByBase[base].push(name);
  });

  // Pact caster: if no regular slots exist, collapse all spells to pact slot level
  const _pactSlotLv = warlockLv > 0 ? ((PACT_SLOTS[Math.min(warlockLv,20)]||{l:0}).l) : 0;
  const _onlyPactSlots = _pactSlotLv > 0 && slots.length === 0;

  for(let slv=1;slv<=9;slv++){
    if(_onlyPactSlots && slv < _pactSlotLv) continue;
    const exactAtLv = [...new Set(leveledByBase[slv] || [])];
    const canCastAtLv = castableSlotLevels.has(slv);
    const combined = canCastAtLv
      ? [...new Set(leveledKnownNames.filter(name => {
          const base = spellLevelByName(name);
          return typeof base === 'number' && base >= 1 && base <= slv;
        }))]
      : exactAtLv;
    if(!combined.length) continue;
    combined.sort((a,b)=>String(a).localeCompare(String(b)));
    h+=`<div class="spell-level-section"><div class="spell-level-hdr">${SPELL_LEVEL_LABELS[slv]}</div>`;
    for(const name of combined){
      h+=_spellRow(
        name,
        '',
        canCastAtLv ? slv : null
      );
    }
    h+=`</div>`;
  }

  // ── At Will section HTML — built here (after _spellRow available), injected via placeholder ──
  let _hAtWill = '';
  if (_atWillEntries.length) {
    _hAtWill = `<div class="spell-level-section"><div class="spell-level-hdr">At Will</div>`;
    for (const { spell } of _atWillEntries) _hAtWill += _spellRow(spell);
    _hAtWill += `</div>`;
  }
  h = h.replace(_AW_PLACEHOLDER, _hAtWill);

  if(!allCantripNames.length && !Object.values(allSpells).flat().length && !auto.length && !Object.values(choiceSpellsByLevel).flat().length && !_atWillEntries.length){
    h+='<div class="phmsg">No spells selected.</div>';
  }

  h+='<div style="margin-top:.75rem"><button class="spl-add-btn" onclick="openSpellPicker()">+ Add / Remove Spell</button></div>';
  el.innerHTML = h;
  refreshIcons();
}

function getSpellAbility(){
  const speciesAbility = C?.choices?.species_spell_ability;
  const cls = C?.className||'';
  const profile = _sheetSpellcastingProfile(cls, C?.subclassShortName || '', C?.clsSnapshot || {});
  const classAbility = String(profile?.ability || '').toLowerCase();
  if(STATS.includes(classAbility)) return classAbility;
  if(!C?.clsSnapshot?.casterProgression && STATS.includes(speciesAbility)) return speciesAbility;
  if(STATS.includes(speciesAbility) && !cls) return speciesAbility;
  return 'cha';
}

function _inferAbilityFromSourceLabel(label, sourceType){
  const txt = String(label || '').toLowerCase();
  if(sourceType === 'species'){
    const speciesAbility = C?.choices?.species_spell_ability;
    if(STATS.includes(speciesAbility)) return speciesAbility;
    const spCfg = _sheetGetSpeciesRuntimeConfig(C?.speciesName || '', C?.speciesSource || '');
    const spAb = String(spCfg?.spellcasting?.ability || '').toLowerCase();
    if(STATS.includes(spAb)) return spAb;
  }
  if(sourceType === 'class' || sourceType === 'subclass'){
    for(const ent of _sheetClassEntities()){
      const cName = String(ent.className || '').toLowerCase();
      const sName = String(ent.subclassShortName || '').toLowerCase();
      if ((cName && txt.includes(cName)) || (sName && txt.includes(sName))) {
        const prof = _sheetSpellcastingProfile(ent.className, ent.subclassShortName, null);
        const ab = String(prof?.ability || '').toLowerCase();
        if(STATS.includes(ab)) return ab;
      }
    }
    return getSpellAbility();
  }
  return null;
}
function _extractChoiceGrantSlotKey(choiceKey){
  const m = String(choiceKey || '').match(/^(.*)_(known|innate|prepared|expanded)_/i);
  return m ? String(m[1] || '') : '';
}
function _getGrantSpellAbilityFromChoiceKey(choiceKey){
  const slotKey = _extractChoiceGrantSlotKey(choiceKey);
  if(!slotKey) return null;
  const ab = String(C?.choices?.[`${slotKey}_spell_ability`] || '').toLowerCase();
  return STATS.includes(ab) ? ab : null;
}

// Returns source label for a spell name — checks auto grants, choices, then class
function getSpellSource(spellName){
  const n = spellName.toLowerCase();
  const _choiceSpellName = (v) => String(v || '').split('|')[0].trim().toLowerCase();
  // Auto-granted (species, subclass domain spells)
  const auto = C.autoGrantedSpells||[];
  const autoEntry = auto.find(a=>a.name.toLowerCase()===n);
  if(autoEntry){
    const lbl = autoEntry.source || 'Auto';
    return {label: lbl, cls:'t', ability: _inferAbilityFromSourceLabel(lbl, autoEntry.sourceType)};
  }
  // At Will invocation spells
  if (typeof getClassAtWillSpells === 'function') {
    const _awEntities = [
      { name: C?.className || '', level: C?.classLevel || C?.level || 1 },
      ...(C?.extraClasses || []).map(ec => ({ name: ec.name || '', level: ec.level || 1 }))
    ];
    const _hasInv = (invName) => {
      if (!C?.choices) return false;
      return Object.entries(C.choices).some(([k, v]) =>
        k.replace(/^mc\d+_/, '').startsWith('warlock_invocation_') &&
        String(v).split('|')[0].trim() === invName
      );
    };
    for (const ent of _awEntities) {
      const awMap = getClassAtWillSpells(ent.name);
      if (!awMap) continue;
      for (const entry of awMap) {
        if (String(entry.spell || '').toLowerCase() !== n) continue;
        if (ent.level < (entry.minLevel || 1)) continue;
        if (_hasInv(entry.invocation)) return { label: entry.invocation, cls: 'p', ability: 'cha' };
      }
    }
  }
  const CHOICE_SOURCE = _sheetCollectChoiceSpellSourceMeta();
  if(C?.choices){
    for(const [key,val] of Object.entries(C.choices)){
      if(!val) continue;
      const vals = Array.isArray(val)?val:[val];
      if(vals.some(v=>typeof v==='string'&&_choiceSpellName(v)===n)){
        const grantAbility = _getGrantSpellAbilityFromChoiceKey(key);
        const grantSlotKey = _extractChoiceGrantSlotKey(key);
        const grantFeatName = grantSlotKey ? String(C?.choices?.[grantSlotKey] || '').trim() : '';
        if(grantAbility && grantFeatName){
          return {label: grantFeatName, cls:'g', ability: grantAbility};
        }
        if(CHOICE_SOURCE[key]) return {label:CHOICE_SOURCE[key].label, cls:'p', ability:CHOICE_SOURCE[key].ability};
        if(key.startsWith('feat_')) return {label:'Feat',cls:'g', ability:grantAbility || getSpellAbility()};
        if(key.startsWith('subclass_')) {
          const lbl = C.subclassShortName||'Subclass';
          return {label:lbl,cls:'p', ability:_inferAbilityFromSourceLabel(lbl, 'subclass')};
        }
        if(key.startsWith('species_')) {
          const lbl = C?.speciesName||'Species';
          return {label:lbl,cls:'t', ability:grantAbility || _inferAbilityFromSourceLabel(lbl, 'species')};
        }
      }
    }
  }
  return null; // class choice = no badge (it's the default)
}

function togglePactSlot(lv, n, idx){
  const used = spellSlotUsed[lv]||0;
  if(idx < used) spellSlotUsed[lv] = Math.max(0, idx);
  else spellSlotUsed[lv] = idx+1;
  localStorage.setItem('5e_slots_used', JSON.stringify(spellSlotUsed));
  const curUsed = spellSlotUsed[lv]||0;
  const pipsEl = document.getElementById('slot-pips-pact-'+lv);
  if(pipsEl) pipsEl.innerHTML = Array.from({length:n},(_,k)=>
    `<div class="slot-pip${k<curUsed?' used':''}" onclick="togglePactSlot(${lv},${n},${k})"></div>`
  ).join('');
}

function toggleSlot(lv, idx){
  const used = spellSlotUsed[lv]||0;
  if(idx < used) spellSlotUsed[lv] = Math.max(0, idx);
  else spellSlotUsed[lv] = idx+1;
  localStorage.setItem('5e_slots_used', JSON.stringify(spellSlotUsed));
  // Re-render using current DOM slot count (works for full/half/artificer/multiclass tables)
  const pipsEl = document.getElementById('slot-pips-'+lv);
  const tot = pipsEl ? pipsEl.querySelectorAll('.slot-pip').length : 0;
  const curUsed = spellSlotUsed[lv]||0;
  if(pipsEl) pipsEl.innerHTML = Array.from({length:tot},(_,k)=>
    `<div class="slot-pip${k<curUsed?' used':''}" onclick="toggleSlot(${lv},${k})"></div>`
  ).join('');
}

/* ═══════ XP ═══════ */
const XP_THRESHOLDS = [0,300,900,2700,6500,14000,23000,34000,48000,64000,85000,100000,120000,140000,165000,195000,225000,265000,305000,355000];

function updateXPDisplay(val){
  const xp = parseInt(val)||0;
  localStorage.setItem('5e_xp', xp);
  const lv = Math.min(C ? C.level : 1, 20);
  const curLvXP = XP_THRESHOLDS[lv-1]||0;
  const nextLvXP = lv >= 20 ? XP_THRESHOLDS[19] : XP_THRESHOLDS[lv]||XP_THRESHOLDS[19];
  const pct = lv >= 20 ? 100 : Math.min(100, Math.round(((xp-curLvXP)/(nextLvXP-curLvXP))*100));
  const fill = document.getElementById('xp-fill');
  const lbl  = document.getElementById('xp-label');
  if(fill) fill.style.width = Math.max(0,pct)+'%';
  if(lbl){
    if(lv>=20) lbl.textContent = 'MAX';
    else lbl.textContent = `→ Lv.${lv+1} (${nextLvXP.toLocaleString()})`;
  }
}

const ITEM_TYPE_LABELS = {
  M:'Melee Weapon',R:'Ranged Weapon',LA:'Light Armor',MA:'Medium Armor',
  HA:'Heavy Armor',S:'Shield',G:'Gear',AT:'Tools',GS:'Gaming Set',
  INS:'Instrument',MNT:'Mount',VEH:'Vehicle',SCF:'Spellcasting Focus',
  WD:'Wand',RG:'Ring',RD:'Rod',ST:'Staff',WI:'Wondrous Item',
  P:'Potion',SC:'Scroll','$':'Currency',OTH:'Other',GV:'Magic Variant',
};
const ITEM_RARITY_COLOR = {
  none:'var(--text3)',common:'var(--text2)',uncommon:'var(--green)',
  rare:'var(--blue)','very rare':'var(--purple)',legendary:'var(--gold)',artifact:'var(--red2)',
};
const SOURCE_LABELS = {
  XPHB:'XPHB',XDMG:'XDMG',FRAiF:'FRAiF',FRHoF:'FRHoF',EFA:'EFA',DMG:'DMG',PHB:'PHB',XGE:'XGE',TCE:'TCE',
};

const ITEM_TYPE_GROUP = i => {
  if(['M','R'].includes(i.type)) return 'weapon';
  if(['LA','MA','HA','S'].includes(i.type)) return 'armor';
  if(i.rarity && i.rarity!=='none') return 'magic';
  return 'gear';
};
let invLoadingState = 'idle';

function itemMatchesRequires(item, requires){
  if(!requires||!requires.length) return false;
  return requires.some(req=>{
    if(req.weapon && item.weapon) return true;
    if(req.sword && item.sword) return true;
    if(req.axe && item.axe) return true;
    if(req.bow && item.bow) return true;
    if(req.crossbow && item.crossbow) return true;
    if(req.hammer && item.hammer) return true;
    if(req.spear && item.spear) return true;
    if(req.staff && item.staff) return true;
    if(req.dagger && item.dagger) return true;
    if(req.armor && item.armor) return true;
    if(req.shield && item.type==='S') return true;
    if(req.type && item.type===req.type) return true;
    return false;
  });
}

function expandMagicVariants(variants, baseItems){
  const ITEM_SOURCES = [...ALLOWED_SOURCES,'XDMG','DMG','GV'];
  const expanded = [];
  for(const v of variants){
    if(!ITEM_SOURCES.includes(v.source)) continue;
    const inh = v.inherits||{};
    const requires = v.requires||[];
    if(!requires.length){
      expanded.push({
        name:v.name, source:v.source, type:inh.type||v.type||'WI',
        rarity:inh.rarity||v.rarity||'none',
        weight:inh.weight||v.weight||0, value:inh.value||v.value||0,
        bonusWeapon:inh.bonusWeapon||null, bonusAc:inh.bonusAc||null,
        ac:inh.ac||null, entries:inh.entries||v.entries||[], _variant:true,
      });
      continue;
    }
    for(const base of baseItems){
      if(!itemMatchesRequires(base,requires)) continue;
      const prefix = inh.namePrefix||'';
      const suffix = inh.nameSuffix||'';
      expanded.push({
        name:prefix+base.name+suffix, source:v.source,
        type:base.type||inh.type||'WI',
        rarity:inh.rarity||v.rarity||'none',
        weight:inh.weight??base.weight??0, value:inh.value??base.value??0,
        dmg1:inh.dmg1||base.dmg1||null, dmgType:base.dmgType||null,
        bonusWeapon:inh.bonusWeapon||null, bonusAc:inh.bonusAc||null,
        ac:inh.ac??base.ac??null, property:base.property||[],
        entries:inh.entries||v.entries||[], _variant:true,
      });
    }
  }
  // Fallback: XPHB base items lack weapon/armor bool flags → requires matching fails → 0 expanded.
  // Generate +1/+2/+3 synthetically from all weapon/armor base items.
  if(expanded.length===0 && baseItems.length>0){
    const rarityByBonus = {1:'uncommon',2:'rare',3:'very rare'};
    for(const base of baseItems){
      const isWeapon = ['M','R'].includes(base.type)||base.weapon;
      const isArmor  = ['LA','MA','HA'].includes(base.type)||base.armor;
      const isShield = base.type==='S'||base.shield;
      if(!isWeapon && !isArmor && !isShield) continue;
      for(const bonus of [1,2,3]){
        expanded.push({
          name: base.name+', +'+ bonus,
          source:'XDMG', type:base.type,
          rarity:rarityByBonus[bonus]||'rare',
          weight:base.weight||0, value:(base.value||0)+bonus*500,
          dmg1:base.dmg1||null, dmgType:base.dmgType||null,
          bonusWeapon:isWeapon?'+'+bonus:null,
          bonusAc:   (isArmor||isShield)?'+'+bonus:null,
          ac:base.ac??null, property:base.property||[],
          entries:[`Hai un bonus di +${bonus} ai tiri per colpire e ai tiri di danno con quest'arma magica.`],
          _variant:true,
        });
      }
    }
  }
  return expanded;
}

const normalizeItemType = (item) =>
  typeof adaptItemRecord === 'function' ? adaptItemRecord(item) : item;

async function loadItems(){
  invLoadingState='loading';
  const loadingEl = document.getElementById('inv-search-results');
  if(loadingEl) loadingEl.innerHTML='<div class="phmsg" style="font-size:var(--fs-body)">Loading item database…</div>';
  try{
    const [r1,r2,r3] = await Promise.all([
      fetch(BASE_URL+'items-base.json'),
      fetch(BASE_URL+'items.json'),
      fetch(BASE_URL+'magicvariants.json'),
    ]);
    const d1 = r1.ok ? await r1.json() : {baseitem:[]};
    const d2 = r2.ok ? await r2.json() : {item:[]};
    const d3 = r3.ok ? await r3.json() : {magicvariant:[]};
    const ITEM_SOURCES = [...ALLOWED_SOURCES,'XDMG'];
    const baseItems  = (d1.baseitem||[])
      .filter(i => {
        if(ITEM_SOURCES.includes(i.source)) return true;
        if(i.reprintedAs && Array.isArray(i.reprintedAs) && i.reprintedAs.some(r=> typeof r === 'string' && (r.includes('XPHB')||r.includes('XDMG')))) return true;
        return false;
      })
      .map(normalizeItemType);
    const magicItems = (d2.item||[]).filter(i=>ITEM_SOURCES.includes(i.source)).map(normalizeItemType);
    const variants   = d3.magicvariant||[];
    const allBaseNormalized = (d1.baseitem||[]).map(normalizeItemType);
    const expandedVariants = expandMagicVariants(variants, allBaseNormalized);
    const seen = new Set();
    // Sort XPHB/XDMG before PHB so dedup keeps the newer edition
    const _SRC_PREF = { XPHB:0, XDMG:1 };
    const _allCombined = [...baseItems,...magicItems,...expandedVariants]
      .sort((a,b)=>(_SRC_PREF[a.source]??99)-(_SRC_PREF[b.source]??99));
    allItemsDb = _allCombined
      .filter(i=>{ if(seen.has(i.name)) return false; seen.add(i.name); return true; })
      .map(i => typeof adaptItemRecord === 'function' ? adaptItemRecord(i) : i)
      .sort((a,b)=>a.name.localeCompare(b.name));
    invLoadingState='done';
    if(typeof _expandStoredPacks === 'function') _expandStoredPacks();
    renderItemSearch();
    if(typeof renderActionsTab === 'function') renderActionsTab();
    if(typeof renderInventoryList === 'function') renderInventoryList();
    if(typeof renderRightTop === 'function') renderRightTop();
  } catch(e){
    invLoadingState='idle';
    console.warn('Items DB failed to load:',e);
    const el=document.getElementById('inv-search-results');
    if(el) el.innerHTML='<div class="phmsg" style="color:var(--red2);font-size:var(--fs-body)">Error loading items.</div>';
  }
}

function renderItemSearch(){
  const el = document.getElementById('inv-search-results');
  if(!el) return;
  if(invLoadingState==='loading'){ el.innerHTML='<div class="phmsg" style="font-size:var(--fs-body)">Loading…</div>'; return; }
  const q = (document.getElementById('inv-search')?.value||'').toLowerCase().trim();
  let list = allItemsDb;
  if(invFilter!=='all') list = list.filter(i=>ITEM_TYPE_GROUP(i)===invFilter);
  if(q) list = list.filter(i=>i.name.toLowerCase().includes(q));
  list = list.slice(0,60);
  if(!list.length){ el.innerHTML='<div class="phmsg" style="font-size:var(--fs-body)">No items found.</div>'; return; }
  el.innerHTML = list.map(item=>{
    const typeLabel = ITEM_TYPE_LABELS[item.type]||item.type||'—';
    const rarity = item.rarity && item.rarity!=='none' ? item.rarity : null;
    const rc = ITEM_RARITY_COLOR[rarity]||'var(--text3)';
    const valueGP = item.value ? (item.value/100).toFixed(item.value%100===0?0:2)+' MO' : '—';
    const dmg = item.dmg1 ? ` · ${item.dmg1}${item.dmgType?' '+item.dmgType:''}` : '';
    const bonus = item.bonusWeapon ? ` · ${item.bonusWeapon}` : (item.bonusAc?` · CA${item.bonusAc}`:'');
    const ac = item.ac ? ` · CA ${item.ac}` : '';
    const srcLabel = SOURCE_LABELS[item.source]||item.source||'';
    const payload = encodeURIComponent(JSON.stringify({
      name:item.name, source:item.source,
      type:item.type||null, weight:item.weight??null, ac:item.ac??null,
      bonusWeapon:item.bonusWeapon||null, bonusAc:item.bonusAc||null,
    })).replace(/'/g,'%27');
    return `<div class="inv-search-row" onclick="addItemToInventory(decodeURIComponent('${payload}'))">
      <div class="inv-search-name">${esc(item.name)}</div>
      <div class="inv-search-meta" style="color:${rc}">${esc(rarity||typeLabel)}${dmg}${bonus}${ac}</div>
      <div class="inv-search-price" style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
        <span>${esc(valueGP)}</span>
        <span style="font-size:var(--fs-xs);color:var(--text3)">${esc(srcLabel)}</span>
      </div>
    </div>`;
  }).join('');
}

function _findInvDbItem(name, source){
  if(!name) return null;
  const lc = String(name).toLowerCase();
  const sc = source ? String(source).toLowerCase() : null;
  return (sc && allItemsDb.find(i => i.name === name && String(i.source||'').toLowerCase() === sc))
      || (sc && allItemsDb.find(i => i.name.toLowerCase() === lc && String(i.source||'').toLowerCase() === sc))
      || allItemsDb.find(i => i.name === name)
      || allItemsDb.find(i => i.name.toLowerCase() === lc)
      || null;
}

function _isAmmoBundle(db){
  if(!db) return false;
  const t = String(db.type||'').split('|')[0];
  return t === 'A' || t === 'AF' || t === 'AT';
}

function _addStoredInvItem(stored){
  if(!stored || !stored.name) return null;
  const existing = sheetInventory.find(i => i.name === stored.name && i.source === stored.source);
  if(existing){
    existing.qty = (existing.qty || 1) + (stored.qty || 1);
    return existing;
  }
  sheetInventory.push(stored);
  return stored;
}

function _storedFromDb(db, qty){
  return {
    name: db.name, source: db.source || '',
    qty: qty || 1, equipped: false, custom: false,
    type: db.type ?? null,
    ac: db.ac ?? null,
    weight: db.weight ?? null,
    value: db.value ?? null,
    rarity: db.rarity ?? null,
    property: Array.isArray(db.property) ? db.property.slice() : null,
    dmg1: db.dmg1 ?? null,
    dmgType: db.dmgType ?? null,
    bonusWeapon: db.bonusWeapon || null,
    bonusAc: db.bonusAc || null,
  };
}

function _expandPackInto(dbPack, qty){
  if(!dbPack || !Array.isArray(dbPack.packContents) || !dbPack.packContents.length) return false;
  for(const pc of dbPack.packContents){
    const ref = typeof pc === 'string' ? pc : (pc && pc.item) || '';
    const parts = ref.split('|');
    const pcName = (parts[0] || '').trim();
    const pcSrc  = (parts[1] || '').trim();
    if(!pcName) continue;
    const pcQty = (typeof pc === 'object' ? (pc.quantity || 1) : 1) * (qty || 1);
    const pcDb = _findInvDbItem(pcName, pcSrc);
    if(pcDb && Array.isArray(pcDb.packContents) && pcDb.packContents.length && !_isAmmoBundle(pcDb)){
      _expandPackInto(pcDb, pcQty);
    } else if(pcDb){
      _addStoredInvItem(_storedFromDb(pcDb, pcQty));
    } else {
      _addStoredInvItem({
        name: pcName, source: '',
        qty: pcQty, equipped: false, custom: false,
        type: 'OTH', weight: 0, value: 0, rarity: 'none',
      });
    }
  }
  return true;
}

function addItemToInventory(jsonStr){
  let item;
  try{ item = JSON.parse(jsonStr); } catch(e){ return; }
  const db = _findInvDbItem(item.name, item.source);
  if(db && Array.isArray(db.packContents) && db.packContents.length && !_isAmmoBundle(db)){
    _expandPackInto(db, 1);
  } else {
    const ref = db || {};
    _addStoredInvItem({
      name: item.name, source: item.source || '',
      qty: 1, equipped: false, custom: false,
      type:     item.type     ?? ref.type     ?? null,
      ac:       item.ac       ?? ref.ac       ?? null,
      weight:   item.weight   ?? ref.weight   ?? null,
      value:    item.value    ?? ref.value    ?? null,
      rarity:   item.rarity   ?? ref.rarity   ?? null,
      property: item.property ?? (Array.isArray(ref.property) ? ref.property.slice() : null),
      dmg1:     item.dmg1     ?? ref.dmg1     ?? null,
      dmgType:  item.dmgType  ?? ref.dmgType  ?? null,
      bonusWeapon: item.bonusWeapon || ref.bonusWeapon || null,
      bonusAc:     item.bonusAc     || ref.bonusAc     || null,
    });
  }
  persistInventory();
  renderInventoryList();
}

function _expandStoredPacks(){
  if(!allItemsDb.length || !Array.isArray(sheetInventory) || !sheetInventory.length) return;
  let dirty = false;
  for(let i = sheetInventory.length - 1; i >= 0; i--){
    const stored = sheetInventory[i];
    if(!stored || stored.custom) continue;
    if(_isAmmoBundle(stored)) continue;
    const db = _findInvDbItem(stored.name, stored.source);
    if(db && Array.isArray(db.packContents) && db.packContents.length && !_isAmmoBundle(db)){
      _expandPackInto(db, stored.qty || 1);
      sheetInventory.splice(i, 1);
      dirty = true;
    }
  }
  if(dirty){
    persistInventory();
    renderInventoryList();
  }
}

function addCustomItemSheet(){
  const inp = document.getElementById('inv-custom-name');
  const name = (inp?.value||'').trim();

  const wInp = document.getElementById('inv-custom-weight');

  sheetInventory.push({name,source:'Custom',type:'OTH',rarity:'none',qty:1,weight,value,equipped:false,custom:true});
  inp.value='';
  if(wInp) wInp.value='';
  if(vInp) vInp.value='';

  renderInventoryList();
}

function toggleEquip(idx){
  if(!sheetInventory[idx]) return;
  const item = sheetInventory[idx];
  // Backfill type from DB if missing (legacy stored items)
  const resolvedTypes = _resolvedInventory().map(r => r.type || '');
  const t = resolvedTypes[idx] || item.type || '';
  if(!item.type && t) item.type = t;
  if(['LA','MA','HA'].includes(t))
    sheetInventory.forEach((i,n)=>{ if(n!==idx&&['LA','MA','HA'].includes(resolvedTypes[n]||i.type||'')) i.equipped=false; });
  if(t==='S')
    sheetInventory.forEach((i,n)=>{ if(n!==idx&&(resolvedTypes[n]||i.type||'')==='S') i.equipped=false; });
  item.equipped = !item.equipped;
  persistInventory();
  renderStatsRow();
  renderSaves();
  renderSkills();
  renderInventoryList();
  renderActionsTab();
  renderSpellsTab();

function _resolveInvItem(stored) {
  if (stored.custom) return { ...stored, flags: Array.isArray(stored.flags) ? stored.flags.slice() : [] };
  const db = allItemsDb.length ? _findInvDbItem(stored.name, stored.source) : null;
  if (!db) return { ...stored, flags: Array.isArray(stored.flags) ? stored.flags.slice() : [] };
  return {
    ...db,
    qty: stored.qty ?? 1,
    equipped: stored.equipped ?? false,
    bonusWeapon: stored.bonusWeapon || db.bonusWeapon || null,
    bonusAc: stored.bonusAc || db.bonusAc || null,
    hand: stored.hand || null,
    weaponMod: stored.weaponMod || null,
    versatileHand: stored.versatileHand || null,
    flags: Array.isArray(stored.flags) ? stored.flags.slice() : [],
    custom: false,
  };
}

/* ─── Item Flags (pactWeapon, arcaneArmor, ...) ─── */
function _sheetCharHasInvocation(name){
  if (!C || !name) return false;
  const target = String(name).toLowerCase().replace(/[^a-z0-9]/g,'');
  for (const v of Object.values(C.choices||{})) {
    const vals = Array.isArray(v) ? v : [v];
    for (const x of vals) {
      if (typeof x === 'string' && x.toLowerCase().replace(/[^a-z0-9]/g,'') === target) return true;
    }
  }
  return false;
}
function _sheetClassEntitiesAll(){
  const out = [];
  if (!C) return out;
  out.push({ name: C.className||'', sub: C.subclassShortName||'', lv: C.classLevel||C.level||1 });
  (C.extraClasses||[]).forEach(ec => out.push({ name: ec.name||'', sub: ec.subclassShortName||'', lv: ec.level||1 }));
  return out;
}
function _sheetCharSatisfiesFlagDef(def){
  if (!def) return false;
  const ents = _sheetClassEntitiesAll();
  if (def.requireClass) {
    const ent = ents.find(e => _sheetEffNorm(e.name) === _sheetEffNorm(def.requireClass));
    if (!ent) return false;
    if (def.requireSubclass && _sheetEffNorm(ent.sub) !== _sheetEffNorm(def.requireSubclass)) return false;
    if (def.requireMinLevel && ent.lv < Number(def.requireMinLevel)) return false;
  }
  if (def.requireInvocation && !_sheetCharHasInvocation(def.requireInvocation)) return false;
  return true;
}
function _sheetGetEligibleFlagsFor(resolvedItem){
  const defs = (typeof getAllItemFlagDefs === 'function') ? getAllItemFlagDefs() : [];
  return defs.filter(def => {
    if (!_sheetCharSatisfiesFlagDef(def)) return false;
    const types = Array.isArray(def.types) ? def.types : null;
    if (types && !types.includes(resolvedItem.type)) return false;
    return true;
  });
}
function _sheetItemHasFlag(item, key){
  return Array.isArray(item?.flags) && item.flags.includes(key);
}
function _sheetCollectEquippedFlags(){
  const set = new Set();
  (sheetInventory||[]).forEach(stored => {
    if (!stored.equipped) return;
    const flags = Array.isArray(stored.flags) ? stored.flags : [];
    flags.forEach(f => set.add(f));
  });
  return set;
}
function _sheetChoiceSet(choiceKey, value){
  if (!C || !choiceKey) return;
  if (!C.choices) C.choices = {};
  C.choices[choiceKey] = value;
  try {
    const ov = JSON.parse(localStorage.getItem('5e_choice_overrides') || '{}');
    ov[choiceKey] = value;
    localStorage.setItem('5e_choice_overrides', JSON.stringify(ov));
  } catch(_) {}
  renderStatsRow();
  renderSaves();
  renderSkills();
  renderSenses();
  renderRightTop();
  renderActionsTab();
  if (typeof renderFeaturesTab === 'function') renderFeaturesTab();
}

function _sheetChoicePickerHtml(choiceKey, options, opts){
  if (!C || !choiceKey || !Array.isArray(options) || !options.length) return '';
  const label = opts?.label || choiceKey;
  const cur = C.choices?.[choiceKey];
  const norm = v => String(v||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const buttons = options.map(o => {
    const v = typeof o === 'string' ? o : (o.value);
    const lbl = typeof o === 'string' ? o : (o.label || o.value);
    const on = norm(cur) === norm(v);
    const safeKey = String(choiceKey).replace(/'/g,"\\'");
    const safeVal = String(v).replace(/'/g,"\\'");
    return `<button class="inv-equip-btn${on?' on':''}" style="${on?'background:var(--purple);border-color:var(--purple);color:#fff':'border-color:var(--purple);color:var(--purple)'}" onclick="event.stopPropagation();_sheetChoiceSet('${safeKey}','${safeVal}')">${on?luci('check')+' ':''}${esc(lbl)}</button>`;
  }).join('');
  return `<div style="margin-top:.6rem;display:flex;flex-direction:column;gap:.3rem">
    <div style="font-size:var(--fs-label);color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em">${esc(label)}</div>
    <div style="display:flex;gap:.4rem;flex-wrap:wrap">${buttons}</div>
  </div>`;
}

function _sheetItemFlagPickerHtml(flagKey, opts){
  const def = (typeof getItemFlagDef === 'function') ? getItemFlagDef(flagKey) : null;
  if (!def) return '';
  const onlyEquipped = opts?.onlyEquipped !== false;
  const types = Array.isArray(def.types) ? def.types : null;
  const cands = [];
  (sheetInventory || []).forEach((stored, idx) => {
    const item = _resolveInvItem(stored);
    if (onlyEquipped && !item.equipped) return;
    if (types && !types.includes(item.type)) return;
    cands.push({ idx, item });
  });
  if (!cands.length) {
    return `<div style="margin-top:.6rem;padding:.4rem .6rem;border:1px dashed var(--bdr2);border-radius:var(--r);font-size:var(--fs-label);color:var(--text3)">${esc(def.label||flagKey)}: no eligible ${onlyEquipped?'equipped ':''}item</div>`;
  }
  const rows = cands.map(({idx,item}) => {
    const on = Array.isArray(item.flags) && item.flags.includes(flagKey);
    return `<button class="inv-equip-btn${on?' on':''}" style="${on?'background:var(--purple);border-color:var(--purple);color:#fff':'border-color:var(--purple);color:var(--purple)'}" onclick="event.stopPropagation();toggleItemFlag(${idx},'${flagKey}')">${on?luci('check')+' ':''}${esc(item.name)}</button>`;
  }).join('');
  return `<div style="margin-top:.6rem;display:flex;flex-direction:column;gap:.3rem">
    <div style="font-size:var(--fs-label);color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em">${esc(def.label||flagKey)} — pick item</div>
    <div style="display:flex;gap:.4rem;flex-wrap:wrap">${rows}</div>
  </div>`;
}

function toggleItemFlag(idx, key){
  if (!sheetInventory[idx] || !key) return;
  const def = (typeof getItemFlagDef === 'function') ? getItemFlagDef(key) : null;
  const item = sheetInventory[idx];
  if (!Array.isArray(item.flags)) item.flags = [];
  const has = item.flags.includes(key);
  if (has) {
    item.flags = item.flags.filter(f => f !== key);
  } else {
    item.flags.push(key);
    const maxCount = def ? Number(def.maxCount || 0) : 0;
    if (maxCount > 0) {
      let count = 0;
      for (let i = sheetInventory.length - 1; i >= 0; i--) {
        if (i === idx) { count++; continue; }
        const other = sheetInventory[i];
        if (Array.isArray(other.flags) && other.flags.includes(key)) {
          if (count >= maxCount) other.flags = other.flags.filter(f => f !== key);
          else count++;
        }
      }
    }
  }
  persistInventory();
  renderStatsRow();
  renderSaves();
  renderSkills();
  renderSenses();
  renderRightTop();
  renderInventoryList();
  renderActionsTab();
}

      const magicBonus = parseInt((item.bonusWeapon||item.bonusAc||'0').replace('+',''))||0;
      // dmg: show base die + magic bonus together

      const meta = [item.weight?item.weight+'lb':null, dmgStr||null, acStr||null, propStr||null].filter(Boolean).join(' · ');
