<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Scheda Personaggio — D&D 5e</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ff-body: 'EB Garamond', Georgia, serif;
      --ff-display: 'Cinzel', Georgia, serif;
      --fs-base: 15px;
      --fs-tiny: 7px;
      --fs-micro: 8px;
      --fs-xs: 9px;
      --bg: #12100e;
      --bg2: #1a1713;
      --bg3: #23201a;
      --bg4: #2e2a22;
      --bg5: #3a342a;
      --bdr: rgba(199, 167, 99, .2);
      --bdr2: rgba(199, 167, 99, .42);
      --bdr3: rgba(199, 167, 99, .68);
      --gold: #caa550;
      --gold2: #edd48a;
      --gold3: #f7e8bf;
      --gdim: rgba(202, 165, 80, .14);
      --red: #c54a3f;
      --red2: #de5e52;
      --redbg: rgba(222, 94, 82, .14);
      --green: #3fa66c;
      --gbg: rgba(63, 166, 108, .14);
      --blue: #4d95d6;
      --bluebg: rgba(77, 149, 214, .14);
      --purple: #9d7fb8;
      --pbg: rgba(157, 127, 184, .16);
      --teal: #2ca797;
      --tbg: rgba(44, 167, 151, .14);
      --orange: #d58a3d;
      --obg: rgba(213, 138, 61, .14);
      --text: #efe6d4;
      --text2: #c4b393;
      --text3: #8f7a57;
      --r: 9px;
      --rl: 14px;
      --fs-label: 10px;
      --fs-meta: 11px;
      --fs-body: 12px;
      --fs-body-lg: 13px;
      --fs-ui-lg: 14px;
      --fs-ui-xl: 16px;
      --fs-ui-xxl: 20px;
      --fs-value-sm: 18px;
      --fs-value-md: 22px;
      --fs-value-xl: 24px;
      --fs-value-lg: 28px;
      --fs-dice: 38px;
      --lh-body: 1.58;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      font-size: var(--fs-base);
      min-height: 100vh;
      line-height: var(--lh-body);
      letter-spacing: .01em;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content:'';position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse at 18% 12%, rgba(202, 165, 80, .09) 0%, transparent 54%),
        radial-gradient(ellipse at 82% 88%, rgba(213, 138, 61, .05) 0%, transparent 54%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 1px;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      background: var(--bg2);
      border-bottom: 2px solid var(--bdr2);
      padding: .6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.5);
    }
    .char-avatar {
      width: 52px;height:52px;border-radius:50%;
      border: 2px solid var(--bdr2);
      background: var(--bg4);
      display:flex;align-items:center;justify-content:center;
      font-size:var(--fs-value-md);flex-shrink:0;
    }
    .char-identity { flex:1;min-width:0 }
    .char-name {
      font-family:var(--ff-display);font-size:var(--fs-value-sm);font-weight:700;
      color:var(--gold2);letter-spacing:.04em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .char-meta { font-size:var(--fs-body);color:var(--text2);margin-top:1px }

    .xp-block { display:flex;flex-direction:column;align-items:center;gap:3px;min-width:120px }
    .xp-bar-wrap {
      width:100%;height:6px;background:var(--bg4);
      border-radius:3px;border:1px solid var(--bdr);overflow:hidden;
    }
    .xp-bar-fill { height:100%;background:var(--gold);border-radius:3px;transition:width .4s }
    .xp-label { font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.1em;color:var(--text3) }
    #hd-label { font-size: var(--fs-meta); color: var(--text3); }

    .rest-btn {
      padding: 6px 13px;border:1px solid;border-radius:var(--r);
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .12s;
    }
    .rest-btn.short { border-color:var(--orange);color:var(--orange);background:var(--obg) }
    .rest-btn.short:hover { background:rgba(230,126,34,.2) }
    .rest-btn.long  { border-color:var(--blue);color:var(--blue);background:var(--bluebg) }
    .rest-btn.long:hover  { background:rgba(52,152,219,.2) }

    .back-btn {
      padding: 6px 12px;border:1px solid var(--bdr2);border-radius:var(--r);
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--text2);background:transparent;
      transition:all .12s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
    }
    .back-btn:hover { border-color:var(--gold);color:var(--gold) }

    /* ─── ABILITY SCORES ROW ─── */
    .scores-row {
      display:flex;align-items:stretch;gap:.6rem;
      padding:.55rem 1.1rem;background:var(--bg3);border-bottom:1px solid var(--bdr);
      flex-wrap:wrap;
    }
    .scores-left {
      display:grid;
      grid-template-columns:repeat(8,minmax(62px,1fr));
      gap:.6rem;
      flex:1 1 520px;
      min-width:0;
    }
    .score-box {
      background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r);
      display:flex;flex-direction:column;align-items:center;padding:.4rem .25rem;
      position:relative;transition:border-color .15s;
    }
    .score-box:hover { border-color:var(--gold) }
    .score-lbl {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:2px;
    }
    .score-mod {
      font-family:var(--ff-display);font-size:var(--fs-value-xl);font-weight:700;
      color:var(--gold2);line-height:1;
    }
    .score-base {
      font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      color:var(--text2);
      background:var(--bg3);border:1px solid var(--bdr);border-radius:50%;
      width:24px;height:24px;display:flex;align-items:center;justify-content:center;
      margin-top:4px;
    }

    /* ─── STATS ROW ─── */
    .stats-row { display:none; }
    .stat-box {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:.42rem .68rem;text-align:center;min-width:64px;
    }
    .stat-box-val {
      font-family:var(--ff-display);font-size:var(--fs-ui-xxl);font-weight:700;color:var(--gold2);line-height:1;
    }
    .stat-box-lbl {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:4px;
    }
    .stat-box.green .stat-box-val { color:var(--green) }
    .stat-box.blue  .stat-box-val { color:var(--blue)  }
    .stat-box.red   .stat-box-val { color:var(--red2)  }
    .stat-box.teal  .stat-box-val { color:var(--teal)  }

    /* HP section */
    .hp-block {
      flex:0 1 260px;min-width:220px;max-width:300px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:.3rem .45rem;
    }
    .hp-title {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:.2rem;
    }
    .hp-controls { display:flex;align-items:center;gap:.3rem }
    .hp-btn {
      width:24px;height:24px;padding:0;border-radius:var(--r);font-family:var(--ff-display);font-size:var(--fs-label);
      font-weight:600;cursor:pointer;border:1px solid;letter-spacing:.06em;
      display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .hp-btn.heal { border-color:var(--green);color:var(--green);background:var(--gbg) }
    .hp-btn.dmg  { border-color:var(--red2); color:var(--red2); background:var(--redbg) }
    .hp-vals { display:flex;align-items:baseline;gap:.3rem;flex:1;justify-content:center;white-space:nowrap }
    .hp-cur {
      font-family:var(--ff-display);font-size:var(--fs-value-xl);font-weight:700;color:var(--green);line-height:1;
    }
    .hp-sep { font-family:var(--ff-display);font-size:var(--fs-ui-lg);color:var(--text3) }
    .hp-max { font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:600;color:var(--text2) }
    .hp-subline { display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center;margin-top:4px; }
    .hp-mini {
      border:1px solid var(--bdr2);border-radius:var(--r);background:var(--bg2);
      color:var(--text2);font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.06em;
      display:inline-flex;align-items:center;gap:4px;padding:2px 6px;white-space:nowrap;width:100%;
    }
    .hp-mini b { color:var(--gold2);font-weight:700; margin-left:auto; }
    .hp-mini-actions { display:inline-flex;align-items:center;gap:4px; }
    .hp-mini-btn {
      width:18px;height:18px;border:1px solid var(--bdr2);border-radius:4px;
      background:transparent;color:var(--text2);cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;line-height:1;
    }
    .hp-mini-btn:hover { border-color:var(--gold);color:var(--gold2); }
    .hp-mini-btn.temp:hover { border-color:var(--teal);color:var(--teal); }
    .hp-mini-btn.max:hover { border-color:var(--purple);color:var(--purple); }
    .hp-death {
      margin-top:4px;padding-top:4px;border-top:1px dashed var(--bdr);
      display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    }
    .hp-death[hidden] { display:none; }
    .hp-ds-lbl {
      font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.06em;text-transform:uppercase;color:var(--text3);
    }
    .hp-ds-pips { display:flex;align-items:center;gap:3px; }
    .hp-ds-pip {
      width:12px;height:12px;border-radius:50%;border:1px solid var(--bdr2);background:transparent;
    }
    .hp-ds-pip.success.on { background:var(--green);border-color:var(--green); }
    .hp-ds-pip.fail.on { background:var(--red2);border-color:var(--red2); }
    .hp-amount-input {
      width:34px;height:24px;text-align:center;border:1px solid var(--bdr2);border-radius:var(--r);
      background:var(--bg2);color:var(--text2);font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      -moz-appearance:textfield;flex-shrink:0;
    }
    .hp-amount-input::-webkit-outer-spin-button,.hp-amount-input::-webkit-inner-spin-button{-webkit-appearance:none}
    .hp-amount-input:focus{outline:1px solid var(--gold);border-color:var(--gold)}

    /* ─── MAIN GRID ─── */
    .main-grid {
      display:grid;
      grid-template-columns: 200px 210px minmax(0, 1fr);
      gap:.55rem;
      padding:.55rem 1.1rem;
      align-items:start;
      min-height:calc(100vh - 220px);
    }
    @media(max-width:960px){
      :root{
        --fs-base: 16px;
        --fs-tiny: 8px;
        --fs-micro: 9px;
        --fs-xs: 10px;
        --fs-label: 11px;
        --fs-meta: 12px;
        --fs-body: 13px;
        --fs-body-lg: 14px;
        --fs-ui-lg: 15px;
        --fs-ui-xl: 17px;
        --fs-value-sm: 20px;
        --fs-value-md: 24px;
        --fs-value-xl: 26px;
      }
      .topbar {
        padding: .55rem .75rem;
        gap: .55rem;
        flex-wrap: wrap;
      }
      .char-avatar { width:46px;height:46px;font-size:var(--fs-value-sm); }
      .char-meta { font-size:var(--fs-meta); }
      .xp-block {
        order: 10;
        flex: 1 1 100%;
        min-width: 0;
        align-items: stretch;
      }
      .xp-block > div { justify-content: flex-start; }
      .rest-btn, .back-btn { padding: 6px 10px; }
      .scores-row { padding: .5rem .75rem; }
      .main-grid { padding: .5rem .75rem; gap: .5rem; }
      .panel-hdr { padding: .5rem .7rem; }
      .panel-body { padding: .6rem .7rem; }
      .tab-btn {
        padding: .66rem .9rem;
        font-size: var(--fs-meta);
        letter-spacing: .08em;
      }
      .scores-left { grid-template-columns:repeat(4,minmax(62px,1fr)); }
      .main-grid { grid-template-columns:1fr 1fr; }
      .main-col-right { grid-column:1 / -1; }
    }
    @media(max-width:600px){
      .topbar { padding: .5rem .6rem; }
      .char-identity { flex: 1 1 100%; order: 2; }
      .rest-btn, .back-btn {
        flex: 1 1 auto;
        justify-content: center;
        text-align: center;
      }
      .scores-row { gap:.45rem; padding:.45rem .6rem; }
      .scores-left { gap:.45rem; grid-template-columns:repeat(2,minmax(62px,1fr)); }
      .score-box { padding:.35rem .2rem; }
      .main-grid { grid-template-columns:1fr; padding:.45rem .6rem; gap:.45rem; }
      .right-top-row { gap:.35rem; }
      .circle-stat { width:58px;height:58px; }
      .defenses-block, .conditions-block { min-width:120px; padding:.38rem .55rem; }
      .hp-btn { width:26px; height:26px; }
      .hp-amount-input { width:40px; height:26px; }
      .tab-content { padding:.55rem; }
      .main-col-right { grid-column:1 }
    }

    /* ─── PANELS ─── */
    .panel {
      background:var(--bg2);border:1px solid var(--bdr);
      border-radius:var(--rl);overflow:hidden;margin-bottom:.6rem;
      box-shadow:0 8px 24px rgba(0,0,0,.26);
    }
    .panel-hdr {
      background:var(--bg3);border-bottom:1px solid var(--bdr);
      padding:.48rem .8rem;display:flex;align-items:center;justify-content:space-between;
    }
    .panel-title {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;
      letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    }
    .panel-body { padding:.55rem .8rem }

    /* ─── SAVING THROWS ─── */
    .save-row {
      display:flex;align-items:center;gap:7px;padding:3px 0;
    }
    .save-dot {
      width:10px;height:10px;border-radius:50%;
      border:1px solid var(--bdr2);flex-shrink:0;
      background:transparent;transition:all .1s;
    }
    .save-dot.on { background:var(--gold);border-color:var(--gold) }
    .save-stat {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:600;
      color:var(--text3);letter-spacing:.08em;width:28px;flex-shrink:0;
    }
    .save-bonus {
      font-family:var(--ff-display);font-size:var(--fs-body);font-weight:600;
      color:var(--text);margin-left:auto;
    }

    /* ─── SENSES ─── */
    .sense-row {
      display:flex;align-items:center;justify-content:space-between;
      padding:4px 8px;background:var(--bg3);border:1px solid var(--bdr);
      border-radius:var(--r);margin-bottom:3px;
    }
    .sense-val {
      font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:700;color:var(--gold2);
      flex-shrink:0;
    }
    .sense-lbl { font-size:var(--fs-meta);color:var(--text2) }

    /* ─── PROFICIENCIES ─── */
    .prof-section { margin-bottom:.7rem }
    .prof-section-title {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;
    }
    .prof-text { font-size:var(--fs-body);color:var(--text2);line-height:1.5 }

    /* ─── SKILLS ─── */
    .skills-header {
      display:grid;grid-template-columns:20px 30px 1fr auto;
      gap:4px;padding:0 .9rem .3rem;
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
    }
    .skill-row {
      display:grid;grid-template-columns:20px 30px 1fr auto auto;
      gap:4px;padding:3px .9rem;align-items:center;cursor:pointer;
      transition:background .1s;
    }
    .skill-row:hover { background:var(--bg3) }
    .skill-dot {
      width:9px;height:9px;border-radius:50%;
      border:1px solid var(--bdr2);background:transparent;
    }
    .skill-dot.prof { background:var(--gold);border-color:var(--gold) }
    .skill-dot.exp  { background:var(--teal);border-color:var(--teal) }
    .skill-dot.joat { background:rgba(200,168,75,.35);border-color:var(--gold);border-style:dashed }
    .adv-badge {
      font-size:var(--fs-xs);font-family:var(--ff-display);font-weight:700;letter-spacing:.04em;
      padding:1px 5px;border-radius:3px;flex-shrink:0;
    }
    .adv-badge.adv   { background:rgba(39,174,96,.2);color:var(--green);border:1px solid var(--green) }
    .adv-badge.disadv{ background:rgba(192,57,43,.2);color:var(--red2);border:1px solid var(--red2) }
    .skill-ability {
      font-family:var(--ff-display);font-size:var(--fs-xs);color:var(--text3);
      letter-spacing:.06em;
    }
    .skill-name { font-size:var(--fs-body);color:var(--text2) }
    .skill-bonus {
      font-family:var(--ff-display);font-size:var(--fs-body);font-weight:600;color:var(--text);
      text-align:right;
    }

    /* ─── RIGHT COLUMN ─── */
    .right-top-row {
      display:flex;gap:.45rem;margin-bottom:.5rem;flex-wrap:wrap;
    }
    .circle-stat {
      width:62px;height:62px;border-radius:50%;
      background:var(--bg3);border:2px solid var(--bdr2);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .circle-stat.clickable { cursor:pointer; transition:border-color .12s, transform .08s; }
    .circle-stat.clickable:hover { border-color:var(--gold); }
    .circle-stat.clickable:active { transform:translateY(1px); }
    .circle-stat-val {
      font-family:var(--ff-display);font-size:var(--fs-ui-xxl);font-weight:700;color:var(--gold2);line-height:1;
    }
    .circle-stat-lbl {
      font-family:var(--ff-display);font-size:var(--fs-tiny);font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:2px;
    }
    .defenses-block, .conditions-block {
      flex:1;min-width:140px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:.4rem .62rem;
    }
    .block-title {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;
    }
    .def-text { font-size:var(--fs-body);color:var(--text2) }
    .def-tag {
      display:inline-block;font-size:var(--fs-label);font-family:var(--ff-display);
      padding:2px 7px;border-radius:3px;border:1px solid var(--bdr2);
      color:var(--text2);margin:2px;
    }

    /* ─── TABS ─── */
    .tabs-bar {
      display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto;background:var(--bg2);
    }
    .tabs-bar::-webkit-scrollbar{height:2px}
    .tabs-bar::-webkit-scrollbar-thumb{background:var(--bdr2)}
    .tab-btn {
      padding:.62rem 1rem;font-family:var(--ff-display);font-size:var(--fs-label);font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
      border:none;background:transparent;cursor:pointer;white-space:nowrap;
      border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;
    }
    .tab-btn:hover { color:var(--text2) }
    .tab-btn.active { color:var(--gold2);border-bottom-color:var(--gold) }
    .tab-content { display:none;padding:.62rem }
    .tab-content.active { display:block }

    /* ─── ACTIONS TAB ─── */
    .action-filters {
      display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.75rem;
    }
    .af-btn {
      padding:4px 10px;border:1px solid var(--bdr);border-radius:999px;
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:600;letter-spacing:.09em;
      background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;
      text-transform:uppercase;
    }
    .af-btn:hover { border-color:var(--bdr2);color:var(--text2) }
    .af-btn.on { background:var(--gdim);border-color:var(--gold);color:var(--gold2) }

    .attacks-table { width:100%;border-collapse:collapse;font-size:var(--fs-body) }
    .attacks-table th {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
      border-bottom:1px solid var(--bdr);padding:4px 6px;text-align:left;
    }
    .attacks-table td {
      padding:6px 6px;border-bottom:1px solid var(--bdr);vertical-align:middle;
      color:var(--text2);
    }
    .attacks-table tr:last-child td { border-bottom:none }
    .attacks-table tr:hover td { background:var(--bg3) }
    .atk-name { color:var(--text);font-weight:600 }
    .atk-sub  { font-size:var(--fs-label);color:var(--text3) }
    .atk-hit  { font-family:var(--ff-display);font-weight:700;
      color:var(--gold2);font-size:var(--fs-ui-lg); }
    .atk-dmg  { font-family:var(--ff-display);color:var(--text);font-size:var(--fs-body) }
    .atk-icon { font-size:var(--fs-ui-lg);margin-right:4px }

    /* ─── SPELLS TAB ─── */
    .spell-level-section { margin-bottom:1rem }
    .spell-level-hdr {
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;
      letter-spacing:.1em;color:var(--blue);text-transform:uppercase;
      border-bottom:1px solid var(--bluebg);padding-bottom:4px;margin-bottom:.4rem;
    }
    .spell-entry {
      display:flex;align-items:center;gap:8px;padding:4px 8px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      margin-bottom:3px;font-size:var(--fs-body-lg);color:var(--text);cursor:pointer;
    }
    .spell-entry-body {
      display:none;font-size:var(--fs-meta);color:var(--text2);line-height:1.5;
      background:var(--bg);border:1px solid var(--bdr);border-top:none;
      border-radius:0 0 var(--r) var(--r);padding:6px 10px;margin-top:-3px;margin-bottom:3px;
    }
    .spell-entry-body.open { display:block }
    .spell-entry .sp-school { font-size:var(--fs-label);color:var(--text3);flex:1;text-align:right }
    .spell-badge {
      font-size:var(--fs-xs);font-family:var(--ff-display);padding:1px 6px;
      border-radius:3px;flex-shrink:0;
    }
    .spell-badge.auto { border:1px solid var(--teal);color:var(--teal);background:var(--tbg) }
    .spell-badge.conc { border:1px solid var(--purple);color:var(--purple);background:var(--pbg) }
    .spell-badge.rit  { border:1px solid var(--green);color:var(--green);background:var(--gbg) }

    /* ─── FEATURES TAB ─── */
    .feature-item {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      margin-bottom:4px;overflow:hidden;
    }
    .feature-hdr {
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 9px;cursor:pointer;transition:background .1s;
    }
    .feature-hdr:hover { background:var(--bg4) }
    .feature-name { font-size:var(--fs-body-lg);color:var(--text);font-weight:600 }
    .feature-src  { font-size:var(--fs-label);color:var(--text3);font-style:italic }
    .feature-arrow { font-size:var(--fs-label);color:var(--text3);transition:transform .15s }
    .feature-item.open .feature-arrow { transform:rotate(90deg) }
    .feature-body {
      display:none;padding:8px 12px;font-size:var(--fs-body-lg);color:var(--text2);
      border-top:1px solid var(--bdr);line-height:1.6;
    }
    .feature-item.open .feature-body { display:block }
    .feature-lv-badge {
      font-family:var(--ff-display);font-size:var(--fs-micro);padding:2px 6px;
      border:1px solid var(--bdr2);border-radius:3px;color:var(--text3);flex-shrink:0;
    }

    /* ─── INVENTORY TAB ─── */
    .inv-category { margin-bottom:.8rem }
    .inv-cat-title {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
      border-bottom:1px solid var(--bdr);padding-bottom:3px;margin-bottom:.4rem;
    }
    .inv-item {
      display:flex;align-items:center;gap:8px;
      padding:4px 8px;font-size:var(--fs-body-lg);color:var(--text2);
      border-bottom:1px solid var(--bdr);
    }
    .inv-item:last-child { border-bottom:none }
    .inv-icon { font-size:var(--fs-ui-lg);flex-shrink:0 }

    /* ─── BACKGROUND TAB ─── */
    .bg-section { margin-bottom:1rem }
    .bg-section-title {
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;
    }
    .bg-text { font-size:var(--fs-body-lg);color:var(--text2);line-height:1.6 }

    /* ─── NOTES TAB ─── */
    .notes-area {
      width:100%;min-height:200px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      color:var(--text);font-family:var(--ff-body);font-size:var(--fs-ui-lg);
      padding:.75rem;outline:none;resize:vertical;
    }
    .notes-area:focus { border-color:var(--gold) }

    /* ─── MISC ─── */
    .phmsg { font-size:var(--fs-body-lg);color:var(--text3);font-style:italic;padding:.5rem 0 }
    .spl-add-btn {
      background:var(--gdim);border:1px solid var(--gold);border-radius:var(--r);
      color:var(--gold);font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      letter-spacing:.06em;padding:5px 14px;cursor:pointer;transition:all .12s;
    }
    .spl-add-btn:hover { background:rgba(200,168,75,.2) }
    .spl-row {
      display:flex;align-items:center;gap:.5rem;padding:6px 9px;border-radius:var(--r);
      border:1px solid transparent;cursor:pointer;transition:all .12s;
    }
    .spl-row:hover { border-color:var(--bdr);background:var(--bg3) }
    .spl-row.on { border-color:var(--green);background:rgba(39,174,96,.08) }
    .spl-row.blocked { opacity:.45;cursor:not-allowed }
    .spl-name { flex:1;min-width:0;font-size:var(--fs-body-lg) }
    .spl-school { font-size:var(--fs-label);color:var(--text3);flex-shrink:0 }
    .spl-check { font-size:var(--fs-meta);color:var(--green);flex-shrink:0 }
    .spl-count-badge {
      font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:700;
      color:var(--gold2);background:var(--gdim);border:1px solid var(--bdr2);
      border-radius:10px;padding:1px 10px;
    }
    .divider { height:1px;background:var(--bdr);margin:.6rem 0 }
    .tag {
      display:inline-block;font-size:var(--fs-label);font-family:var(--ff-display);
      padding:2px 7px;border-radius:3px;border:1px solid;margin:2px;
    }
    .tag.g  { border-color:var(--gold);  color:var(--gold);  background:var(--gdim) }
    .tag.gr { border-color:var(--green); color:var(--green); background:var(--gbg)  }
    .tag.b  { border-color:var(--blue);  color:var(--blue);  background:var(--bluebg) }
    .tag.t  { border-color:var(--teal);  color:var(--teal);  background:var(--tbg)  }
    .tag.p  { border-color:var(--purple);color:var(--purple);background:var(--pbg)  }
    .tag.r  { border-color:var(--red2);  color:var(--red2);  background:var(--redbg) }

    /* dice tag */
    .hd-pips { display:flex;gap:4px;flex-wrap:wrap;margin-top:.3rem }
    .hd-pip {
      width:18px;height:18px;border-radius:3px;
      border:1px solid var(--bdr2);background:var(--bg3);
      display:flex;align-items:center;justify-content:center;
      font-size:var(--fs-xs);color:var(--text3);
    }
    .hd-pip.used { opacity:.3 }
    .hd-pip.full { background:var(--gdim);border-color:var(--gold);color:var(--gold) }

    /* scroll */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

    .condition-tag {
      display:inline-flex;align-items:center;gap:5px;
      padding:2px 8px;border-radius:999px;margin:0;font-size:var(--fs-label);
      font-family:var(--ff-display);border:1px solid var(--bdr2);color:var(--text3);
      background:var(--bg3);white-space:nowrap;
    }
    .condition-tag.on { color:var(--orange); border-color:var(--orange); background:var(--obg); }
    .condition-tag.empty { color:var(--text3); border-style:dashed; }
    .conditions-wrap { display:flex; flex-direction:column; gap:6px; }
    .cond-active { display:flex; flex-wrap:wrap; gap:4px; }
    .cond-details { border:1px dashed var(--bdr); border-radius:var(--r); padding:3px 6px; }
    .cond-summary {
      list-style:none; cursor:pointer; font-family:var(--ff-display);
      font-size:var(--fs-label); color:var(--text2); letter-spacing:.06em;
      display:inline-flex; align-items:center; gap:5px; user-select:none;
    }
    .cond-summary::-webkit-details-marker { display:none; }
    .cond-picker {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(108px,1fr));
      gap:4px; margin-top:6px;
    }
    .cond-btn {
      border:1px solid var(--bdr2); border-radius:var(--r); background:var(--bg3);
      color:var(--text2); padding:4px 6px; cursor:pointer; transition:all .12s;
      display:flex; align-items:center; gap:5px; justify-content:flex-start;
      font-family:var(--ff-display); font-size:var(--fs-xs); letter-spacing:.03em;
    }
    .cond-btn:hover { border-color:var(--gold); color:var(--gold2); }
    .cond-btn.on { border-color:var(--orange); color:var(--orange); background:var(--obg); }
    .cond-clear {
      border:1px solid var(--bdr2); border-radius:var(--r); background:transparent;
      color:var(--text3); padding:2px 7px; cursor:pointer;
      font-family:var(--ff-display); font-size:var(--fs-xs); letter-spacing:.06em; text-transform:uppercase;
      width:max-content;
    }
    .cond-clear:hover { border-color:var(--red2); color:var(--red2); }
    .ac-shield {
      position:relative;display:flex;align-items:center;justify-content:center;
      width:62px;height:68px;flex-shrink:0;
    }
    .ac-shield svg { position:absolute;inset:0;width:100%;height:100% }
    .ac-shield-val {
      position:relative;z-index:1;
      font-family:var(--ff-display);font-size:var(--fs-value-md);font-weight:700;color:var(--gold2);
    }
    .ac-shield-lbl {
      position:relative;z-index:1;
      font-family:var(--ff-display);font-size:var(--fs-tiny);font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
      display:block;margin-top:18px;
    }

    /* Typography normalization */
    .panel-title,
    .block-title,
    .stat-box-lbl,
    .score-lbl,
    .skill-ability,
    .save-stat,
    .circle-stat-lbl,
    .xp-label,
    .hp-sublbl,
    .tab-btn,
    .af-btn,
    .inv-chip,
    .rest-btn,
    .back-btn,
    .spell-level-hdr,
    .feature-lv-badge,
    .inv-cat-title,
    .bg-section-title,
    .prof-section-title {
      font-size: var(--fs-label);
    }

    .prof-text,
    .def-text,
    .sense-lbl,
    .skill-name,
    .skill-bonus,
    .attacks-table,
    .atk-dmg,
    .action-card-body,
    .action-desc,
    .spell-entry,
    .feature-name,
    .feature-body,
    .inv-item,
    .inv-row-name,
    .inv-row-meta,
    .bg-text,
    .notes-area {
      font-size: var(--fs-body);
    }

    .action-card-name,
    .spl-name,
    .inv-search-name {
      font-size: var(--fs-body-lg);
    }

    .slot-pips { display:flex;gap:4px;flex-wrap:wrap }
    .slot-pip {
      width:14px;height:14px;border-radius:50%;
      border:1px solid var(--bdr);background:transparent;
      transition:all .1s;cursor:pointer;
    }
    .slot-pip.used { background:var(--blue);border-color:var(--blue) }

    /* ─── XP INTERACTIVE ─── */
    .xp-block { position:relative }
    .xp-edit-input {
      background:transparent;border:none;border-bottom:1px solid var(--gold);
      color:var(--gold2);font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      text-align:center;outline:none;width:100px;padding:2px 0;
    }

    /* ─── INVENTORY STYLES ─── */
    .inv-search-box {
      width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:8px 12px;color:var(--text);font-family:var(--ff-body);font-size:var(--fs-base);
      outline:none;transition:border-color .15s;margin-bottom:.5rem;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }
    .inv-search-box:focus { border-color:var(--gold) }
    .inv-search-box::placeholder { color:var(--text3) }
    .inv-filter-row { display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.6rem }
    .inv-chip {
      padding:3px 10px;border:1px solid var(--bdr);border-radius:999px;
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:600;letter-spacing:.08em;
      cursor:pointer;background:transparent;color:var(--text3);transition:all .12s;
      text-transform:uppercase;
    }
    .inv-chip:hover { border-color:var(--bdr2);color:var(--text2) }
    .inv-chip.on { background:var(--gdim);border-color:var(--gold);color:var(--gold2) }
    .inv-search-list {
      display:flex;flex-direction:column;gap:2px;
      max-height:180px;overflow-y:auto;margin-bottom:.75rem;
    }
    .inv-search-row {
      display:flex;align-items:center;gap:8px;padding:6px 10px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      cursor:pointer;transition:all .1s;
    }
    .inv-search-row:hover { border-color:var(--gold);background:var(--bg4) }
    .inv-search-name { flex:1;font-size:var(--fs-body-lg);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .inv-search-meta { font-size:var(--fs-meta);color:var(--text3);flex-shrink:0 }
    .inv-search-price { font-size:var(--fs-label);color:var(--text2);flex-shrink:0 }
    .inv-row {
      display:flex;align-items:center;gap:7px;padding:6px 10px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:3px;
    }
    .inv-row:hover { border-color:var(--bdr2) }
    .inv-row.equipped { border-color:var(--teal);background:rgba(26,188,156,.06) }
    .inv-entry-body {
      display:none;font-size:var(--fs-meta);color:var(--text2);line-height:1.45;
      background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);
      padding:6px 10px;margin:-2px 0 4px;
    }
    .inv-entry-body.open { display:block }
    .inv-row-name { flex:1;font-size:var(--fs-body-lg);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .inv-row-meta { font-size:var(--fs-meta);color:var(--text3);flex-shrink:0 }
    .inv-badge {
      font-size:var(--fs-micro);font-family:var(--ff-display);padding:1px 5px;border-radius:3px;
      border:1px solid var(--bdr2);flex-shrink:0;
    }
    .inv-qty-wrap { display:flex;align-items:center;gap:4px;flex-shrink:0 }
    .inv-qty-btn {
      width:20px;height:20px;border:1px solid var(--bdr2);border-radius:3px;
      background:transparent;color:var(--text2);font-size:var(--fs-body-lg);cursor:pointer;
      display:flex;align-items:center;justify-content:center;line-height:1;transition:all .1s;
    }
    .inv-qty-btn:hover { border-color:var(--gold);color:var(--gold) }
    .inv-qty-btn.del:hover { border-color:var(--red2);color:var(--red2) }
    .inv-qty-val { font-family:var(--ff-display);font-size:var(--fs-body);font-weight:600;color:var(--gold2);min-width:18px;text-align:center }
    .inv-equip-btn {
      padding:2px 7px;border:1px solid var(--bdr2);border-radius:3px;
      font-size:var(--fs-xs);font-family:var(--ff-display);cursor:pointer;background:transparent;
      color:var(--text3);transition:all .1s;flex-shrink:0;
    }
    .inv-equip-btn:hover { border-color:var(--teal);color:var(--teal) }
    .inv-equip-btn.on { border-color:var(--teal);color:var(--teal);background:var(--tbg) }

    /* ─── CURRENCY ─── */
    .currency-row {
      display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:.75rem;
    }
    .currency-cell {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:5px 4px;text-align:center;
    }
    .currency-lbl { font-family:var(--ff-display);font-size:var(--fs-micro);letter-spacing:.08em;margin-bottom:3px }
    .currency-inp {
      width:100%;background:transparent;border:none;border-bottom:1px solid var(--bdr2);
      color:var(--gold2);font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:700;
      text-align:center;outline:none;padding:2px 0;
    }
    .currency-inp:focus { border-bottom-color:var(--gold) }
    .inv-section-hdr {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--bdr);
      padding-bottom:3px;margin:.6rem 0 .4rem;
    }
    .inv-stat-row {
      display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem;
    }
    .inv-stat-pill {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:4px 10px;font-size:var(--fs-body);color:var(--text2);
    }
    .inv-stat-pill b { color:var(--gold2);font-family:var(--ff-display) }
    .item-detail-popup {
      position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
      display:flex;align-items:center;justify-content:center;padding:1rem;
    }
    .item-detail-card {
      background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--rl);
      max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:1.2rem;
    }

    /* ─── ACTION CARDS ─── */
    .action-section-hdr {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;letter-spacing:.14em;
      text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--bdr);
      padding-bottom:4px;margin:.9rem 0 .45rem;
    }
    .action-section-hdr:first-child { margin-top:0 }
    .action-card {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      margin-bottom:4px;overflow:hidden;
      box-shadow:0 6px 18px rgba(0,0,0,.2);
    }
    .action-card-hdr {
      display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;
      transition:background .1s;
    }
    .action-card-hdr:hover { background:var(--bg4) }
    .action-card-icon { font-size:var(--fs-base);flex-shrink:0 }
    .action-card-name {
      flex:1;font-size:var(--fs-body-lg);font-weight:600;color:var(--text);overflow:hidden;
    }
    .action-card-name .sub {
      display:block;font-size:var(--fs-label);font-weight:400;color:var(--text3);
      font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .action-card-tags { display:flex;gap:3px;align-items:center;flex-shrink:0 }
    .action-tag {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;letter-spacing:.04em;
      padding:2px 5px;border-radius:3px;border:1px solid;white-space:nowrap;
    }
    .action-tag.atk   { border-color:var(--red2);  color:var(--red2);  background:var(--redbg)  }
    .action-tag.save  { border-color:var(--orange); color:var(--orange);background:var(--obg)    }
    .action-tag.util  { border-color:var(--blue);   color:var(--blue);  background:var(--bluebg) }
    .action-tag.bonus { border-color:var(--teal);   color:var(--teal);  background:var(--tbg)    }
    .action-tag.react { border-color:var(--purple); color:var(--purple);background:var(--pbg)    }
    .action-tag.cls   { border-color:var(--gold);   color:var(--gold);  background:var(--gdim)   }
    .action-stat {
      font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:700;color:var(--gold2);
      flex-shrink:0;min-width:32px;text-align:right;
    }
    .action-card-body {
      display:none;padding:6px 10px 8px;border-top:1px solid var(--bdr);
      font-size:var(--fs-body);color:var(--text2);line-height:1.5;
    }
    .action-card.open .action-card-body { display:block }
    .action-dmg-row { display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.35rem }
    .action-info-row {
      display:flex;flex-wrap:wrap;gap:5px;align-items:center;
      padding:6px 0 5px;border-bottom:1px solid var(--bdr);margin-bottom:6px;
    }
    .action-dmg-pill {
      background:var(--bg4);border:1px solid var(--bdr2);border-radius:3px;

}
function rE(e){
  if(!e)return'';
  if(typeof e==='string')return clean(e);
  if(typeof e==='number')return String(e);
  if(Array.isArray(e))return e.map(rE).join('<br>');
  if(typeof e==='object'){
    if(e.type==='list')return`<ul style="margin:.3rem 0 .3rem 1.2rem">${(e.items||[]).map(i=>`<li>${rE(i)}</li>`).join('')}</ul>`;
    if(e.type==='table'){
      let h=`<table style="width:100%;border-collapse:collapse;font-size:var(--fs-body);margin:.4rem 0">`;
      if(e.colLabels)h+=`<thead><tr>${e.colLabels.map(l=>`<th style="font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.08em;color:var(--text3);padding:3px 6px;border-bottom:1px solid var(--bdr)">${clean(l)}</th>`).join('')}</tr></thead>`;
      h+=`<tbody>${(e.rows||[]).map(r=>`<tr>${r.map(c=>`<td style="padding:2px 6px;color:var(--text2);border-bottom:1px solid var(--bdr)">${rE(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      return h;
    }
    if(e.type==='entries'||e.type==='section')return`<div style="margin-bottom:5px">${e.name?`<b>${clean(e.name)}.</b> `:''} ${rE(e.entries)}</div>`;
    if(e.type==='inset')return`<div style="border-left:2px solid var(--bdr2);padding:5px 10px;margin:5px 0;font-style:italic">${rE(e.entries)}</div>`;
    if(e.name&&e.entries)return`<div style="margin-bottom:5px"><b><i>${clean(e.name)}.</i></b> ${rE(e.entries)}</div>`;
    if(e.entries)return rE(e.entries);
    if(e.entry)return rE(e.entry);
  }
  return'';
}

let currentHP = 0;
let maxHP = 0;
let tempHP = 0;
let hpAdjustAmt = 1;
let maxHPBonus = 0;
let deathSaves = { success: 0, fail: 0 };
let usedHD = 0;
let spellSlotUsed = {}; // {lvl: count}
let sheetInventory = []; // live inventory for this session
let sheetCurrency = { cp:0, sp:0, ep:0, gp:10, pp:0 };
let allItemsDb = []; // loaded from 5etools
let invFilter = 'all';
let activeConditions = [];
const BASE_URL = 'https://raw.githubusercontent.com/5etools-mirror-3/5etools-src/main/data/';
const ALLOWED_SOURCES = ['XPHB','FRAiF','FRHoF','EFA'];

function loadChar(){
  try {
    const raw = localStorage.getItem('5e_current_char');
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e){ return null; }
}

function getBase(stat){
  if(!C) return 10;
  const m = C.scoreMethod;
  if(m==='pointbuy') return (C.pbScores||{})[stat] || 8;
  if(m==='standard') { const v = (C.arrAssign||{})[stat]; return v!==null&&v!==undefined ? v : 8; }
  const v = (C.diceAssign||{})[stat]; return v!==null&&v!==undefined ? v : 8;
}
function bgBonus(stat){
  if(!C||!C.bgAbility||!C.bgAbility.length) return 0;
  // bgAbility is an array of stat keys; weights are +2 for first, +1 for second
  const idx = C.bgAbility.indexOf(stat);
  if(idx<0) return 0;
  return idx===0 ? 2 : 1;
}
function getFinal(stat){ return getBase(stat)+bgBonus(stat); }
function getMod(v){ return Math.floor((v-10)/2); }
function getPB(){ return C ? (PB_TABLE[C.level]||2) : 2; }
function fmod(v){ const m=getMod(v); return(m>=0?'+':'')+m; }

function hasSaveProficiency(stat){
  return C && (C.clsSnapshot?.proficiency||[]).includes(stat);
}
function getSaveBonus(stat){
  const m = getMod(getFinal(stat));
  return m + (hasSaveProficiency(stat)?getPB():0);
}
function fbonus(n){ return (n>=0?'+':'')+n; }

function _normSkill(s){
  if(!s||typeof s!=='string') return '';
  return s.toLowerCase().replace(/[^a-z]/g,'');
}

function getSkillProficiency(skillName){
  const nsk = _normSkill(skillName);
  // Builder saves selectedSkills as {proficient:[...], expert:[...]} or legacy array
  const skillData = C?.selectedSkills || {};
  const profList = Array.isArray(skillData) ? skillData : (skillData.proficient || []);
  const expList  = Array.isArray(skillData) ? [] : (skillData.expert || []);
  if(expList.some(s=>_normSkill(s)===nsk)) return 'exp';
  if(profList.some(s=>_normSkill(s)===nsk)) return 'prof';
  // Background fixed skills
  const bgFixed = (C?.bgSnapshot?.skillProficiencies||[]).flatMap(sp=>Object.keys(sp).filter(k=>k!=='choose'));
  if(bgFixed.some(s=>_normSkill(s)===nsk)) return 'prof';
  // Class starting skill choices
  if(C?.choices){
    for(const [key,val] of Object.entries(C.choices)){
      if(!val) continue;
      if(key.includes('skill')||key.startsWith('start_skills')){
        const vals = Array.isArray(val)?val:[val];
        if(vals.some(v=>_normSkill(v)===nsk)) return 'prof';
      }
      if(key.includes('exp')||key.includes('expertise')){
        const vals = Array.isArray(val)?val:[val];
        if(vals.some(v=>_normSkill(v)===nsk)) return 'exp';
      }
    }
  }
  return null;
}
function getSkillBonus(sk){
  const m = getMod(getFinal(sk.a));
  const p = getSkillProficiency(sk.n);
  if(p==='exp') return m+getPB()*2;
  if(p==='prof') return m+getPB();
  // Adapter-driven untrained check modifiers (e.g. Jack of All Trades)
  let addHalfPb = false;
  _sheetClassEntities().forEach(ent => {
    const classCfg = _sheetGetClassRuntimeConfig(ent.className);
    const subCfg = _sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName);
    const classMin = Number(classCfg?.skillRules?.jackOfAllTradesMinLevel || 0);
    const subMin = Number(subCfg?.skillRules?.jackOfAllTradesMinLevel || 0);
    if ((classMin > 0 && ent.level >= classMin) || (subMin > 0 && ent.level >= subMin)) addHalfPb = true;
  });
  if(addHalfPb) return m+Math.floor(getPB()/2);
  return m;
}

function _getClassLevelByName(name){
  const target = String(name || "").toLowerCase();
  if (!target) return 0;
  if ((C?.className || "").toLowerCase() === target) return C?.classLevel || C?.level || 1;
  const ec = (C?.extraClasses || []).find(x => String(x?.name || "").toLowerCase() === target);
  return ec ? (ec.level || 1) : 0;
}
function _sheetFindUnarmedStrikeRule(equippedArmor, equippedShield){
  for(const ent of _sheetClassEntities()){
    const subCfg = _sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName);
    const rule = subCfg?.unarmedStrike;
    if(!rule || typeof rule !== 'object') continue;
    if(Number(ent.level || 0) < Number(rule.minLevel || 1)) continue;
    if(rule.requiresNoArmor && !!equippedArmor) continue;
    if(rule.requiresNoShield && !!equippedShield) continue;
    return { rule, entity: ent };
  }
  return null;
}

function calcMaxHP(){
  if(!C) return 10;
  const hd = C.clsSnapshot?.hd;
  let faces = 8;
  if(hd){ if(hd.faces) faces=hd.faces; else if(Array.isArray(hd)&&hd[0]?.faces) faces=hd[0].faces; }
  const conMod = getMod(getFinal('con'));
  let total = faces+conMod;
  const lv = C.level;
  if(lv>1){ const avg=Math.floor(faces/2)+1; total+=(avg+conMod)*(lv-1); }
  return Math.max(1, total);
}

function calcAC(){
  if(!C) return 10;
  const dex = getMod(getFinal('dex'));
  const con = getMod(getFinal('con'));
  const wis = getMod(getFinal('wis'));
  const cha = getMod(getFinal('cha'));
  const inv = sheetInventory || C.inventory || [];
  const equippedArmor  = inv.find(i => i.equipped && ['LA','MA','HA'].includes(i.type));
  const equippedShield = inv.find(i => i.equipped && i.type === 'S');
  const shieldBonus = equippedShield ? (2 + (equippedShield.bonusAc ? parseInt(equippedShield.bonusAc)||0 : 0)) : 0;
  let ac;
  if(equippedArmor){
    const baseAC = equippedArmor.ac || 10;
    const magicBonus = equippedArmor.bonusAc ? parseInt(equippedArmor.bonusAc)||0 : 0;
    if(equippedArmor.type==='LA') ac = baseAC + dex + magicBonus;
    else if(equippedArmor.type==='MA') ac = baseAC + Math.min(2,dex) + magicBonus;
    else ac = baseAC + magicBonus; // HA
    return ac + shieldBonus;
  }

  // No armor: evaluate all legal formulas and use the best one.
  const candidates = [10 + dex + shieldBonus];
  const modByAbility = { str:getMod(getFinal('str')), dex, con, wis, int:getMod(getFinal('int')), cha };
  const evalRules = (rules, level) => {
    (Array.isArray(rules) ? rules : []).forEach(rule => {
      if (!rule || typeof rule !== 'object') return;
      const minLevel = Number(rule.minLevel || 1);
      if (Number(level || 0) < minLevel) return;
      if (rule.requiresNoArmor !== false && !!equippedArmor) return;
      const allowShield = !!rule.allowShield;
      if (!allowShield && !!equippedShield) return;
      const base = Number(rule.base || 10);
      const abilities = Array.isArray(rule.abilities) ? rule.abilities : [];
      const abMod = abilities.reduce((sum, ab) => sum + Number(modByAbility[String(ab || '').toLowerCase()] || 0), 0);
      const withShield = allowShield ? shieldBonus : 0;
      candidates.push(base + abMod + withShield);
    });
  };
  _sheetClassEntities().forEach(ent => {
    evalRules(_sheetGetClassRuntimeConfig(ent.className)?.unarmoredDefense, ent.level);
    evalRules(_sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName)?.unarmoredDefense, ent.level);
  });
  evalRules(_sheetGetSpeciesRuntimeConfig(C?.speciesName || '', C?.speciesSource || '')?.unarmoredDefense, C?.level || 1);
  ac = Math.max(...candidates);
  return ac;
}

function renderAll(){
  if(!C){ showNoChar(); return; }

  maxHPBonus = parseInt(localStorage.getItem('5e_hp_max_bonus') || 0) || 0;

  try { sheetCurrency = JSON.parse(localStorage.getItem('5e_currency') || JSON.stringify(C.currency||{cp:0,sp:0,ep:0,gp:10,pp:0})); } catch(e){ sheetCurrency = {cp:0,sp:0,ep:0,gp:10,pp:0}; }

function _saveHpState(){
  localStorage.setItem('5e_hp_current', String(currentHP));
  localStorage.setItem('5e_hp_temp', String(tempHP));
  localStorage.setItem('5e_hp_max_bonus', String(maxHPBonus));
}

function _saveDeathSaves(){
  localStorage.setItem('5e_death_saves', JSON.stringify(deathSaves));
}

function loadDeathSaves(){
  try {
    const v = JSON.parse(localStorage.getItem('5e_death_saves') || '{}');
    const s = Math.max(0, Math.min(3, parseInt(v.success) || 0));
    const f = Math.max(0, Math.min(3, parseInt(v.fail) || 0));
    deathSaves = { success: s, fail: f };
  } catch(e){
    deathSaves = { success: 0, fail: 0 };
  }
  if (currentHP > 0 && (deathSaves.success || deathSaves.fail)) {
    deathSaves = { success: 0, fail: 0 };
    _saveDeathSaves();
  }
}

function resetDeathSaves(){
  deathSaves = { success: 0, fail: 0 };
  _saveDeathSaves();
}

function _setCurrentHp(next){
  currentHP = Math.max(0, Math.min(maxHP, parseInt(next) || 0));
  if (currentHP > 0) resetDeathSaves();
  _saveHpState();
}

function loadConditionsState(){
  try {
    const raw = JSON.parse(localStorage.getItem('5e_conditions_active') || '[]');
    if (!Array.isArray(raw)) { activeConditions = []; return; }
    const valid = new Set(CONDITION_OPTIONS.map(c => c.key));
    activeConditions = raw.filter(k => valid.has(k));
  } catch(e){
    activeConditions = [];
  }
}

function saveConditionsState(){
  localStorage.setItem('5e_conditions_active', JSON.stringify(activeConditions));
}

function toggleCondition(key){
  const i = activeConditions.indexOf(key);
  if(i >= 0) activeConditions.splice(i, 1);
  else activeConditions.push(key);
  saveConditionsState();
  renderConditions();
}

function clearConditions(){
  activeConditions = [];
  saveConditionsState();
  renderConditions();
}

function renderConditions(){
  const el = document.getElementById('conditions-content');
  if(!el) return;

  const active = CONDITION_OPTIONS.filter(c => activeConditions.includes(c.key));
  const activeHtml = active.length
    ? active.map(c =>
        `<button class="condition-tag on" onclick="toggleCondition('${c.key}')" title="Remove ${esc(c.label)}">
          ${luci(c.icon)} ${esc(c.label)}
        </button>`
      ).join('')
    : `<span class="condition-tag empty">${luci('circle')} None</span>`;

  const pickerHtml = CONDITION_OPTIONS.map(c => {
    const on = activeConditions.includes(c.key);
    return `<button class="cond-btn${on?' on':''}" onclick="toggleCondition('${c.key}')" title="${on?'Remove':'Apply'} ${esc(c.label)}">
      ${luci(c.icon)} <span>${esc(c.label)}</span>
    </button>`;
  }).join('');

  el.innerHTML = `
    <div class="conditions-wrap">
      <div class="cond-active">${activeHtml}</div>
      <details class="cond-details">
        <summary class="cond-summary">${luci('list-checks')} Manage (${active.length})</summary>
        <div class="cond-picker">${pickerHtml}</div>
      </details>
      ${active.length ? `<button class="cond-clear" onclick="clearConditions()">${luci('x')} Clear</button>` : ''}
    </div>
  `;
  refreshIcons();
}

function showNoChar(){
  document.getElementById('top-name').textContent = 'No character found';
  document.getElementById('top-meta').textContent = 'Go back to the builder to create a character';
}

function renderTopBar(){
  const extra = C.extraClasses||[];
  const pLv   = C.classLevel || C.level - extra.reduce((s,ec)=>s+(ec.level||1),0);
  const sc     = C.subclassShortName ? ` (${C.subclassShortName})` : '';
  const race   = C.speciesName||'';
  const bg     = C.bgName||'';
  let clsDisplay;
  if(extra.length){
    const parts = [`${C.className||'—'}${sc} ${pLv}`];

    clsDisplay = parts.join(' / ') + ` [Lv.${C.level}]`;

function renderScores(){

}

function buildHPBlock(){
  const dsSuccess = Math.max(0, Math.min(3, deathSaves.success || 0));
  const dsFail = Math.max(0, Math.min(3, deathSaves.fail || 0));
  const maxBonusLabel = maxHPBonus ? `${maxHPBonus > 0 ? '+' : ''}${maxHPBonus}` : '0';
  return `<div class="hp-block">
    <div class="hp-title">HP</div>
    <div class="hp-controls">
      <div class="hp-vals">
        <div class="hp-cur" id="hp-cur-display">${currentHP}</div>
        <div class="hp-sep">/</div>
        <div class="hp-max" id="hp-max-display">${maxHP}</div>
      </div>
      <button class="hp-btn heal" onclick="adjustHP(1)" title="Heal"></button>
      <input class="hp-amount-input" id="hp-amount-input" type="number" min="1" value="${hpAdjustAmt}" title="Amount" oninput="hpAdjustAmt=Math.max(1,parseInt(this.value)||1)" />
      <button class="hp-btn dmg" onclick="adjustHP(-1)" title="Damage"></button>
    </div>
    <div class="hp-subline">
      <span class="hp-mini"><i data-lucide="sparkles" class="lucide-emoji"></i> TEMP <b id="hp-temp-display">${tempHP}</b></span>
      <span class="hp-mini-actions">
        <button class="hp-mini-btn temp" onclick="adjustTempHP(-1)" title="Decrease Temp HP"></button>
        <button class="hp-mini-btn temp" onclick="adjustTempHP(1)" title="Increase Temp HP"></button>
      </span>
    </div>
    <div class="hp-subline">
      <span class="hp-mini"><i data-lucide="heart-pulse" class="lucide-emoji"></i> MAX MOD <b id="hp-max-bonus-display">${maxBonusLabel}</b></span>
      <span class="hp-mini-actions">
        <button class="hp-mini-btn max" onclick="adjustMaxHpBonus(-1)" title="Decrease Max HP"></button>
        <button class="hp-mini-btn max" onclick="adjustMaxHpBonus(1)" title="Increase Max HP"></button>
      </span>
    </div>
    <div class="hp-death" ${currentHP===0?'':'hidden'}>
      <span class="hp-ds-lbl">Death Saves</span>
      <span class="hp-ds-pips">${Array.from({length:3},(_,i)=>`<span class="hp-ds-pip success${i<dsSuccess?' on':''}"></span>`).join('')}</span>
      <span class="hp-ds-pips">${Array.from({length:3},(_,i)=>`<span class="hp-ds-pip fail${i<dsFail?' on':''}"></span>`).join('')}</span>
      <button class="roll-btn" onclick="rollDeathSave()">${luci('dice-5')} Roll</button>
      <button class="roll-btn" onclick="resetDeathSaves();renderStatsRow();">${luci('rotate-ccw')} Reset</button>
    </div>
  </div>`;
}

function adjustHP(dir){
  const amt = hpAdjustAmt;
  if(dir > 0){
    _setCurrentHp(currentHP + amt);
  } else if (dir < 0){
    let dmg = amt;
    if(tempHP > 0){
      const absorbed = Math.min(tempHP, dmg);
      tempHP -= absorbed;
      dmg -= absorbed;
    }
    _setCurrentHp(currentHP - dmg);
  }
  _saveHpState();
  renderStatsRow();
}

function adjustTempHP(dir){
  const amt = 1;
  tempHP = Math.max(0, tempHP + dir * amt);
  _saveHpState();
  renderStatsRow();
}

function adjustMaxHpBonus(dir){
  const amt = 1;
  maxHPBonus += dir * amt;
  maxHP = Math.max(1, calcMaxHP() + maxHPBonus);
  if (currentHP > maxHP) _setCurrentHp(maxHP);
  _saveHpState();
  renderStatsRow();
}

function rollDeathSave(){
  if (currentHP > 0) {
    showDiceToast('Death Save', [], 0, 0, 'Available only at 0 HP');
    return;
  }
  if (deathSaves.success >= 3) {
    showDiceToast('Death Save', [], 0, 0, 'Already stable');
    return;
  }
  if (deathSaves.fail >= 3) {
    showDiceToast('Death Save', [], 0, 0, 'Character is dead');
    return;
  }
  const roll = _rollDie(20);
  if (roll === 1) deathSaves.fail = Math.min(3, deathSaves.fail + 2);
  else if (roll === 20) {
    resetDeathSaves();
    _setCurrentHp(1);
    showDiceToast('Death Save', [{ v: roll, faces: 20 }], 0, roll, 'Critical success: regain 1 HP');
    renderStatsRow();
    return;
  } else if (roll >= 10) deathSaves.success = Math.min(3, deathSaves.success + 1);
  else deathSaves.fail = Math.min(3, deathSaves.fail + 1);

  _saveDeathSaves();
  let extra = '';
  if (deathSaves.success >= 3) extra = 'Stable (0 HP, unconscious).';
  if (deathSaves.fail >= 3) extra = 'Dead.';
  showDiceToast('Death Save', [{ v: roll, faces: 20 }], 0, roll, extra || `${deathSaves.success} success / ${deathSaves.fail} fail`);
  renderStatsRow();
}

function renderSaves(){
  const el = document.getElementById('saves-body');
  el.innerHTML = STATS.map(st => {
    const bonus = getSaveBonus(st);
    const prof  = hasSaveProficiency(st);
    return `<div class="save-row" onclick="rollSave('${st}')" title="Roll ${FULL_LBL[st]} saving throw">
      <div class="save-dot${prof?' on':''}"></div>
      <span class="save-stat">${SLBL[st]}</span>
      <span style="font-size:var(--fs-body);color:var(--text2)">${FULL_LBL[st]}</span>
      <span class="save-bonus">${fbonus(bonus)}</span>
    </div>`;
  }).join('');
}

  const bonus = getSaveBonus(stat);

function renderProficiencies(){
  const el = document.getElementById('profs-body');
  const sp = C.clsSnapshot?.startingProficiencies||{};
  const bsp= C.bgSnapshot||{};
  const normalize = (v) => {
    if (!v || typeof v !== 'string') return '';
    let base = String(v)
      .replace(/\{@[a-z]+ ([^|}]+)(?:\|[^}]*)?\}/gi, '$1')
      .replace(/\{@[a-z]+\s*/gi, '')
      .replace(/[{}]/g, '')
      .split('|')[0]
      .trim();
    if (!base) return '';
    base = base.replace(/\.$/, '').replace(/\s+/g, ' ').trim();

    // Ignore placeholder descriptors (not concrete proficiencies).
    if (/^one type of /i.test(base)) return '';
    if (/ of your choice$/i.test(base)) return '';
    if (/^any/i.test(base)) return '';

    const lc = base.toLowerCase();
    const alias = {
      "thieves' tools": "Thieves' Tools",
      "thieves' tool": "Thieves' Tools",
      "tinker's tools": "Tinker's Tools",
      "tinker's tool": "Tinker's Tools",
      "artisan's tools": "Artisan's Tools",
      "herbalism kit": "Herbalism Kit",
      "navigator's tools": "Navigator's Tools",
      "poisoner's kit": "Poisoner's Kit",
      "forgery kit": "Forgery Kit",
      "disguise kit": "Disguise Kit",
    };
    if (alias[lc]) return alias[lc];

    // If multiple values are packed in one string, caller should split first.
    if (base.includes(',')) return '';
    if (!base) return '';
    return base.charAt(0).toUpperCase() + base.slice(1);
  };
  const fixedKeysFromBlock = (block, excluded) => {
    if (!block || typeof block !== 'object' || Array.isArray(block)) return [];
    return Object.keys(block)
      .filter(k => !excluded.includes(k) && block[k] !== false)
      .map(normalize)
      .filter(Boolean);
  };
  const splitAndNormalize = (raw) => {
    if (!raw || typeof raw !== 'string') return [];
    return raw.split(/[;,]/).map(s => normalize(s)).filter(Boolean);
  };
  const collectFixedFeatureProfs = (field, excluded) => {
    const out = new Set();
    const buckets = [{
      maxLv: C.classLevel || C.level || 1,
      features: [
        ...(C.allClassFeatures || []),
        ...(C.subclassShortName
          ? (C.allSubFeatures || []).filter(f => f.subclassShortName === C.subclassShortName)
          : []),
      ],
    }];
    for (const ec of (C.extraClasses || [])) {
      if (!ec?.name) continue;
      buckets.push({
        maxLv: ec.level || 1,
        features: [
          ...(ec.allClassFeatures || []),
          ...(ec.subclassShortName
            ? (ec.allSubFeatures || []).filter(f => f.subclassShortName === ec.subclassShortName)
            : []),
        ],
      });
    }
    buckets.forEach(({ maxLv, features }) => {
      (features || [])
        .filter(f => !f?.isReprinted && (f?.level || 0) <= maxLv)
        .forEach(feat => {
          (feat?.[field] || []).forEach(block => {
            if (typeof block === 'string') {
              const n = normalize(block);
              if (n) out.add(n);
              return;
            }
            fixedKeysFromBlock(block, excluded).forEach(v => out.add(v));
          });
        });
    });
    return out;
  };
  const selectedFeatSnapshots = Array.isArray(C?.allFeatSnapshots) ? C.allFeatSnapshots : [];
  const collectFixedFeatProfs = (field, excluded) => {
    const out = new Set();
    selectedFeatSnapshots.forEach(feat => {
      (feat?.[field] || []).forEach(block => {
        if (typeof block === 'string') {
          const n = normalize(block);
          if (n) out.add(n);
          return;
        }
        fixedKeysFromBlock(block, excluded).forEach(v => out.add(v));
      });
    });
    return out;
  };
  const adapterProfGrants = [];
  const appendAdapterGrants = (grants, lv) => {
    (Array.isArray(grants) ? grants : []).forEach(g => {
      if (!g || typeof g !== 'object') return;
      const minLevel = Number(g.minLevel || 1);
      if ((lv || 1) < minLevel) return;
      adapterProfGrants.push(g);
    });
  };
  const collectEntityAdapterGrants = (className, subclassShortName, lv) => {
    if (typeof getClassSheetProficiencies === 'function') {
      appendAdapterGrants(getClassSheetProficiencies(className), lv);
    }
    if (typeof getSubclassSheetProficiencies === 'function') {
      appendAdapterGrants(getSubclassSheetProficiencies(className, subclassShortName), lv);
    }
  };
  collectEntityAdapterGrants(C?.className || '', C?.subclassShortName || '', C?.classLevel || C?.level || 1);
  for (const ec of (C?.extraClasses || [])) {
    collectEntityAdapterGrants(ec?.name || '', ec?.subclassShortName || '', ec?.level || 1);
  }
  if (typeof getSpeciesSheetProficiencies === 'function') {
    appendAdapterGrants(getSpeciesSheetProficiencies(C?.speciesName || '', C?.speciesSource || ''), C?.level || 1);
  }

  const armorSet = new Set();
  const weaponSet = new Set();
  const addFixedProfsFromBlocks = (src, set) => {
    const arr = Array.isArray(src) ? src : [src];
    arr.forEach(entry => {
      if (!entry) return;
      if (typeof entry === 'string') {
        splitAndNormalize(entry).forEach(v => set.add(v));
        return;
      }
      fixedKeysFromBlock(entry, ['choose', 'any']).forEach(v => set.add(v));
    });
  };
  addFixedProfsFromBlocks(sp.armor, armorSet);
  addFixedProfsFromBlocks(sp.weapons, weaponSet);
  const weaponMasterySet = new Set();
  collectFixedFeatureProfs('armorProficiencies', ['choose', 'any']).forEach(v => armorSet.add(v));
  collectFixedFeatureProfs('weaponProficiencies', ['choose', 'any']).forEach(v => weaponSet.add(v));
  collectFixedFeatProfs('armorProficiencies', ['choose', 'any']).forEach(v => armorSet.add(v));
  collectFixedFeatProfs('weaponProficiencies', ['choose', 'any']).forEach(v => weaponSet.add(v));
  if (C?.choices) {
    for (const [key, val] of Object.entries(C.choices)) {
      if (!val) continue;
      const lk = key.toLowerCase();
      const vals = Array.isArray(val) ? val : [val];
      if (lk.includes('mastery') && lk.includes('weapon')) {
        vals.forEach(v => {
          const nv = normalize(v);
          if (nv) weaponMasterySet.add(nv);
        });
        continue;
      }
      if (lk.includes('armor')) {
        vals.forEach(v => {
          const nv = normalize(v);
          if (nv) armorSet.add(nv);
        });
      }
      if (lk.includes('weapon')) {
        vals.forEach(v => {
          const nv = normalize(v);
          if (nv) weaponSet.add(nv);
        });
      }
    }
  }
  adapterProfGrants
    .filter(g => g.type === 'armor' || g.type === 'weapon')
    .forEach(g => {
      const vals = Array.isArray(g.values) ? g.values : [g.values];
      vals.map(normalize).filter(Boolean).forEach(v => {
        if (g.type === 'armor') armorSet.add(v);
        else weaponSet.add(v);
      });
    });
  const armor   = armorSet.size ? Array.from(armorSet).join(', ') : '—';
  const weapons = weaponSet.size ? Array.from(weaponSet).join(', ') : '—';
  const weaponMasteries = weaponMasterySet.size ? Array.from(weaponMasterySet).join(', ') : '—';

  // Tools: class starting + bg + adapter choices (monk_tool_proficiency, subclass_bm_student_tool, etc.)
  const toolSet = new Set();
  const addTool = (raw) => splitAndNormalize(String(raw || '')).forEach(v => toolSet.add(v));
  const classToolBlocks = [];
  if (sp.tools) classToolBlocks.push(...(Array.isArray(sp.tools) ? sp.tools : [sp.tools]));
  if (sp.toolProficiencies) classToolBlocks.push(...(Array.isArray(sp.toolProficiencies) ? sp.toolProficiencies : [sp.toolProficiencies]));
  classToolBlocks.forEach(t => {
    if (typeof t === 'string') {
      addTool(t);
      return;
    }
    fixedKeysFromBlock(t, ['choose', 'anyArtisansTool', 'anyMusicalInstrument', 'any']).forEach(addTool);
  });
  (bsp.toolProficiencies||[]).forEach(t => fixedKeysFromBlock(t, ['choose', 'anyArtisansTool', 'anyMusicalInstrument', 'any']).forEach(addTool));
  collectFixedFeatureProfs('toolProficiencies', ['choose', 'anyArtisansTool', 'anyMusicalInstrument', 'any']).forEach(addTool);
  collectFixedFeatProfs('toolProficiencies', ['choose', 'anyArtisansTool', 'anyMusicalInstrument', 'any']).forEach(addTool);
  (C.selectedTools || []).forEach(t => {
    addTool(t);
  });
  if(C?.choices){
    for(const [key,val] of Object.entries(C.choices)){
      if(!val) continue;
      if(key.includes('tool')||key.includes('instrument')){
        const vals = Array.isArray(val)?val:[val];
        vals.forEach(v=>{
          addTool(v);
        });
      }
    }
  }
  adapterProfGrants
    .filter(g => g.type === 'tool')
    .forEach(g => {
      const vals = Array.isArray(g.values) ? g.values : [g.values];
      vals.forEach(addTool);
    });
  const tools = toolSet.size ? Array.from(toolSet).join(', ') : '—';

  const langSet = new Set((C.selectedLanguages || []).map(normalize).filter(Boolean));
  collectFixedFeatureProfs('languageProficiencies', ['choose', 'anyStandard', 'anyExotic', 'any']).forEach(v => langSet.add(v));
  collectFixedFeatProfs('languageProficiencies', ['choose', 'anyStandard', 'anyExotic', 'any']).forEach(v => langSet.add(v));
  adapterProfGrants
    .filter(g => g.type === 'language')
    .forEach(g => {
      const vals = Array.isArray(g.values) ? g.values : [g.values];
      vals.map(normalize).filter(Boolean).forEach(v => langSet.add(v));
    });
  if (!langSet.size) langSet.add('Common');
  const langs = Array.from(langSet).join(', ') || 'Common';

  el.innerHTML = `
    <div class="prof-section">
      <div class="prof-section-title">${luci('shield')} Armor</div>
      <div class="prof-text">${esc(armor)}</div>
    </div>
    <div class="prof-section">
      <div class="prof-section-title">${luci('swords')} Weapons</div>
      <div class="prof-text">${esc(weapons)}</div>
    </div>
    <div class="prof-section">
      <div class="prof-section-title">${luci('target')} Weapon Mastery</div>
      <div class="prof-text">${esc(weaponMasteries)}</div>
    </div>
    <div class="prof-section">
      <div class="prof-section-title">${luci('wrench')} Tools</div>
      <div class="prof-text">${esc(tools)}</div>
    </div>
    <div class="prof-section" style="margin-bottom:0">
      <div class="prof-section-title">${luci('languages')} Languages</div>
      <div class="prof-text">${esc(langs)}</div>
    </div>`;
  refreshIcons();
}

function renderHitDice(){
  if(!C) return;
  const hd = C.clsSnapshot?.hd;
  let faces = 8;
  if(hd){ if(hd.faces) faces=hd.faces; else if(Array.isArray(hd)&&hd[0]?.faces) faces=hd[0].faces; }
  const total = C.level;
  document.getElementById('hd-label').textContent = `${total-usedHD}/${total} d${faces}`;
  let h = '<div class="hd-pips">';
  for(let i=0;i<total;i++){
    const used = i >= (total-usedHD);
    h+=`<div class="hd-pip${used?' used':' full'}" title="d${faces}" onclick="toggleHD(${i})">${used?'':luci('hexagon')}</div>`;
  }
  h+='</div>';
  h+=`<div style="margin-top:.5rem;font-size:var(--fs-meta);color:var(--text3)">
    <i>Click to use/recover a hit die</i>
  </div>`;
  document.getElementById('hd-body').innerHTML = h;
  refreshIcons();
}

function toggleHD(idx){
  const total = C.level;
  // Simple toggle: add/remove 1 used die
  if(idx >= (total-usedHD)){
    // currently used → restore
    usedHD = Math.max(0, usedHD-1);
  } else {
    usedHD = Math.min(total, usedHD+1);
    // Roll the die
    const hd = C.clsSnapshot?.hd;
    let faces = 8;
    if(hd){ if(hd.faces) faces=hd.faces; else if(Array.isArray(hd)&&hd[0]?.faces) faces=hd[0].faces; }
    const roll = Math.floor(Math.random()*faces)+1;
    const conMod = getMod(getFinal('con'));
    const heal = Math.max(1, roll+conMod);
    _setCurrentHp(Math.min(maxHP, currentHP + heal));
    _saveHpState();
    renderStatsRow();
    showDiceToast(
      'Hit Die',
      [{ v: roll, faces }],
      conMod,
      heal,
      `HP recuperati: +${heal}`
    );
  }
  localStorage.setItem('5e_hd_used', usedHD);
  renderHitDice();
}

// Skill advantage/disadvantage per skill: 'adv'|'disadv'|null
let skillAdv = JSON.parse(localStorage.getItem('5e_skill_adv')||'{}');

function cycleSkillAdv(name){
  const cur = skillAdv[name]||null;
  const next = cur===null?'adv':cur==='adv'?'disadv':null;
  if(next===null) delete skillAdv[name]; else skillAdv[name]=next;
  localStorage.setItem('5e_skill_adv', JSON.stringify(skillAdv));
  renderSkills();
}

function renderSkills(){
  const el = document.getElementById('skills-body');
  const isJoat = _sheetClassEntities().some(ent => {
    const classMin = Number(_sheetGetClassRuntimeConfig(ent.className)?.skillRules?.jackOfAllTradesMinLevel || 0);
    const subMin = Number(_sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName)?.skillRules?.jackOfAllTradesMinLevel || 0);
    return (classMin > 0 && ent.level >= classMin) || (subMin > 0 && ent.level >= subMin);
  });
  el.innerHTML = SKILLS_LIST.map(sk => {
    const bonus = getSkillBonus(sk);
    const ptype = getSkillProficiency(sk.n);
    const dotCls = ptype==='exp'?' exp':ptype==='prof'?' prof':(isJoat&&!ptype)?' joat':'';
    const adv = skillAdv[sk.n]||null;
    const advBadge = adv==='adv'
      ? `<span class="adv-badge adv" title="Advantage">ADV</span>`
      : adv==='disadv'
      ? `<span class="adv-badge disadv" title="Disadvantage">DIS</span>`
      : '';
    const safeN = sk.n.replace(/'/g,"\\'");
    return `<div class="skill-row"
      onclick="rollSkill('${safeN}',${bonus},'${adv||''}')"
      oncontextmenu="event.preventDefault();cycleSkillAdv('${safeN}')"
      title="Click: roll | Right-click: advantage/disadvantage">
      <div class="skill-dot${dotCls}"></div>
      <span class="skill-ability">${SLBL[sk.a]}</span>
      <span class="skill-name">${esc(sk.n)}</span>
      ${advBadge}
      <span class="skill-bonus">${fbonus(bonus)}</span>
    </div>`;
  }).join('');
}
function rollSkill(name, bonus, adv){
  const a = adv==='adv'?true:adv==='disadv'?false:undefined;
  rollD20(bonus, name, a);
}

function rollInitiative(){
  const initMod = getMod(getFinal('dex'));
  rollD20(initMod, 'Initiative');
}

function renderRightTop(){
  const initMod = getMod(getFinal('dex'));
  document.getElementById('init-val').textContent = fbonus(initMod);
  document.getElementById('ac-val').textContent = calcAC();

  // Defenses (resistances/immunities from species/feats)
  const defEl = document.getElementById('def-content');
  const items = [];
  const DMGTYPE_EN = {fire:'Fire',cold:'Cold',lightning:'Lightning',thunder:'Thunder',
    acid:'Acid',poison:'Poison',psychic:'Psychic',radiant:'Radiant',necrotic:'Necrotic',
    force:'Force',bludgeoning:'Bludgeoning',piercing:'Piercing',slashing:'Slashing'};
  const resist = C.speciesSnapshot?.resist||[];
  const immune = C.speciesSnapshot?.immune||[];
  function _dmgLabel(r){
    const raw = typeof r==='string' ? r : (r.special||'');
    if(!raw||raw==='—') return raw||'—';
    const stripped = raw.replace(/^(resistance|immunity)[-:]\s*/i,'').trim();
    return DMGTYPE_EN[stripped.toLowerCase()] || DMGTYPE_EN[raw.toLowerCase()] || stripped || raw;
  }
  for(const r of resist){
    const lbl = _dmgLabel(r);
    if(lbl&&lbl!=='—') items.push({l:`Resistance: ${lbl}`,c:'b'});
  }
  for(const r of immune){
    const lbl = _dmgLabel(r);
    if(lbl&&lbl!=='—') items.push({l:`Immunity: ${lbl}`,c:'r'});
  }
  if(C.speciesSnapshot?.darkvision) items.push({l:`Darkvision ${C.speciesSnapshot.darkvision} ft`,c:'t'});
  // Unarmored Defense badge (adapter-driven)
  const hasArmor = !!(sheetInventory||[]).find(i=>i.equipped&&['LA','MA','HA'].includes(i.type));
  const hasShield = !!(sheetInventory||[]).find(i=>i.equipped&&i.type==='S');
  if(!hasArmor){
    const labels = new Set();
    const pushRules = (rules, level) => {
      (Array.isArray(rules) ? rules : []).forEach(rule => {
        if (!rule || typeof rule !== 'object') return;
        if (Number(level || 0) < Number(rule.minLevel || 1)) return;
        if (!rule.allowShield && hasShield) return;
        const abilities = Array.isArray(rule.abilities) ? rule.abilities : [];
        if (!abilities.length) return;
        const txt = `Unarmored Defense (${abilities.map(a => String(a || '').toUpperCase()).join('+')})`;
        labels.add(txt);
      });
    };
    _sheetClassEntities().forEach(ent => {
      pushRules(_sheetGetClassRuntimeConfig(ent.className)?.unarmoredDefense, ent.level);
      pushRules(_sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName)?.unarmoredDefense, ent.level);
    });
    pushRules(_sheetGetSpeciesRuntimeConfig(C?.speciesName || '', C?.speciesSource || '')?.unarmoredDefense, C?.level || 1);
    labels.forEach(txt => items.push({l:txt,c:'g'}));
  }
  if(!items.length){ defEl.innerHTML='<span style="font-size:var(--fs-body);color:var(--text3);font-style:italic">None</span>'; }
  else { defEl.innerHTML = items.map(i=>`<div class="tag ${i.c}">${esc(i.l)}</div>`).join(''); }
  renderConditions();
}

function _sheetSpellcastingProfile(className, subclassShortName, clsSnapshot){
  const classCfg = _sheetGetClassRuntimeConfig(className);
  const subCfg = _sheetGetSubclassRuntimeConfig(className, subclassShortName);
  const classSp = classCfg?.spellcasting && typeof classCfg.spellcasting === 'object' ? classCfg.spellcasting : {};
  const subSp = subCfg?.spellcasting && typeof subCfg.spellcasting === 'object' ? subCfg.spellcasting : {};
  const merged = { ...classSp, ...subSp };
  if (!merged.casterProgression && clsSnapshot?.casterProgression) merged.casterProgression = clsSnapshot.casterProgression;
  return merged;
}
function _sheetCasterProgression(v){
  const s = String(v || '').toLowerCase().trim();
  if (!s) return null;
  if (s === 'full') return 'full';
  if (s === 'half' || s === '1/2') return 'half';
  if (s === 'artificer') return 'artificer';
  if (s === 'pact') return 'pact';
  if (s === '1/3' || s === 'third') return '1/3';
  return s;
}
function _sheetCasterContribution(prog, level){
  const lv = Number(level || 0);
  if (!Number.isFinite(lv) || lv <= 0) return 0;
  if (prog === 'full') return lv;
  if (prog === 'half') return Math.floor(lv / 2);
  if (prog === 'artificer') return Math.ceil(lv / 2);
  if (prog === '1/3') return Math.floor(lv / 3);
  return 0;
}
function _sheetCollectChoiceSpellSourceMeta(){
  const out = {};
  const merge = (obj) => {
    if (!obj || typeof obj !== 'object') return;
    for (const [k, v] of Object.entries(obj)) {
      if (!k || !v || typeof v !== 'object') continue;
      out[k] = { ...v };
    }
  };
  _sheetClassEntities().forEach(ent => {
    const classCfg = _sheetGetClassRuntimeConfig(ent.className);
    merge(classCfg?.spellcasting?.choiceSpellSources);
    const subCfg = _sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName);
    merge(subCfg?.spellcasting?.choiceSpellSources);

}
function _sheetFeatureDieFaces(className, featureKey, level){
  const cfg = _sheetGetClassRuntimeConfig(className);
  const dieCfg = cfg?.featureDice?.[featureKey];
  if (!Array.isArray(dieCfg) || !dieCfg.length) return null;
  const lv = Number(level || 0);
  for (const row of dieCfg) {
    const minLv = Number(row?.minLevel || 1);
    if (lv >= minLv && Number.isFinite(Number(row?.faces))) return Number(row.faces);
  }
  return null;
}
function _sheetPreparedCountFromFormula(spellProfile, level){
  const f = spellProfile?.preparedFormula;
  if (!f || typeof f !== 'object') return null;
  const ab = String(f.ability || '').toLowerCase();
  if (!STATS.includes(ab)) return null;
  const sm = getMod(getFinal(ab));
  const divisor = Number(f.levelDivisor || 1) || 1;
  const rawLv = Number(level || 1) / divisor;
  const lvTerm = String(f.levelRound || 'floor') === 'ceil' ? Math.ceil(rawLv) : Math.floor(rawLv);
  const addLv = f.addLevel ? lvTerm : 0;
  const min = Number(f.min || 0);
  const total = sm + addLv;
  return Number.isFinite(min) ? Math.max(min, total) : total;
}

function _applySheetFeatureFilters(className, subclassShortName, features, ctx){
  let out = Array.isArray(features) ? features : [];

  const classFilters = typeof getClassSheetFeatureFilters === 'function'
    ? getClassSheetFeatureFilters(className)
    : (_sheetGetAdapterValue(typeof ClassSheetFeatureFilters !== 'undefined' ? ClassSheetFeatureFilters : {}, className) || []);
  for(const fn of classFilters){
    if(typeof fn !== 'function') continue;
    out = fn({ ...(ctx||{}), className, subclassShortName }, out) || out;
  }

  const subclassFilters = typeof getSubclassSheetFeatureFilters === 'function'
    ? getSubclassSheetFeatureFilters(className, subclassShortName)
    : (() => {
        const subKey = className && subclassShortName ? `${className}_${subclassShortName}` : '';
        const canonical = `${_normSheetAdapterKey(className)}_${_normSheetAdapterKey(subclassShortName)}`;
        const store = typeof SubclassSheetFeatureFilters !== 'undefined' ? SubclassSheetFeatureFilters : {};
        return _sheetGetAdapterValue(store, subKey) || _sheetGetAdapterValue(store, canonical) || [];
      })();
  for(const fn of subclassFilters){
    if(typeof fn !== 'function') continue;
    out = fn({ ...(ctx||{}), className, subclassShortName }, out) || out;
  }

  return out;
}

function _applySpeciesSheetFeatureFilters(speciesName, speciesSource, features, ctx){
  let out = Array.isArray(features) ? features : [];
  const filters = typeof getSpeciesSheetFeatureFilters === 'function'
    ? getSpeciesSheetFeatureFilters(speciesName, speciesSource)
