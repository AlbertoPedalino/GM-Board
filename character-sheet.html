        <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;min-width:52px">
          <div class="inv-badge" style="color:${rc};border-color:${rc}">${esc(rarity||typeLabel)}</div>
          ${magicBonus>0?`<div class="inv-badge" style="color:var(--gold);border-color:var(--gold);font-weight:700">${luci('sparkles')} +${magicBonus}</div>`:''}
        </div>
        <div style="flex:1;min-width:0;cursor:pointer" onclick="document.getElementById('${iid}').classList.toggle('open')">
          <div class="inv-row-name">${_itemNameHtml}${item.custom?' <span style="font-size:var(--fs-xs);color:var(--text3)">[custom]</span>':''}</div>
          ${meta?`<div style="font-size:var(--fs-label);color:var(--text3);margin-top:1px">${esc(meta)}</div>`:''}
        </div>
        ${canEquip?`<button class="inv-equip-btn${item.equipped?' on':''}" onclick="toggleEquip(${idx})">${item.equipped?`${luci('check')} Equip.`:'Equip'}</button>`:''}
        ${(()=>{ const elig=_sheetGetEligibleFlagsFor(item); if(!elig.length) return ''; return elig.map(function(def){const on=_sheetItemHasFlag(item,def.key); return `<button class="inv-equip-btn${on?' on':''}" style="${on?'background:var(--purple);border-color:var(--purple);color:#fff':'border-color:var(--purple);color:var(--purple)'}" onclick="toggleItemFlag(${idx},'${def.key}')" title="${esc(def.label||def.key)}">${def.icon?luci(def.icon)+' ':''}${esc(def.label||def.key)}</button>`;}).join(''); })()}
        ${(()=>{ if(!item.equipped) return ''; const ovr=_getActiveWeaponOverrides().filter(function(o){return (!o.weaponTypes||o.weaponTypes.includes(item.type)) && !o.itemFlag;}); return ovr.map(function(o){return `<button class="inv-equip-btn${item.weaponMod===o.key?' on':''}" onclick="setWeaponOverride(${idx},'${o.key}')" title="Usa ${o.ability.toUpperCase()} per attacco e danno">${esc(o.label)}</button>`;}).join(''); })()}
        <div class="inv-qty-wrap">
          <button class="inv-qty-btn" onclick="changeSheetInvQty(${idx},-1)">−</button>
          <div class="inv-qty-val">${item.qty||1}</div>
          <button class="inv-qty-btn" onclick="changeSheetInvQty(${idx},1)">+</button>
        </div>
        <button class="inv-qty-btn del" onclick="changeSheetInvQty(${idx},-(${item.qty||1}))" title="Remove">${luci('trash-2')}</button>
      </div>
      ${entryText?`<div id="${iid}" class="inv-entry-body">${entryText}</div>`:''}`;
    } catch(err) {
      console.warn('[inv] render failed for item', item?.name, err);
      h += `<div class="inv-row" style="color:var(--red2)">⚠ ${esc(item?.name||'Unknown')} (render error)</div>`;
    }
    }
  }
  el.innerHTML = h;
  refreshIcons();
}

function renderFeaturesTab(){
  const el = document.getElementById('features-wrap');
  const lv = C.classLevel || C.level; // primary class level, not total
  const allF = (C.allClassFeatures||[]).filter(f=>f.level<=lv&&!f.isReprinted);
  const allSFRaw= C.subclassShortName
    ? (C.allSubFeatures||[]).filter(f=>f.subclassShortName===C.subclassShortName&&f.level<=lv&&!f.isReprinted)
    : [];
  const allSF = _applySheetFeatureFilters(C.className, C.subclassShortName, allSFRaw, { character:C, choices:C?.choices||{}, choicePrefix:'', classLevel:lv });
  const feats = C.allFeatSnapshots||[];

  // Determine which feat slot gave each feat (choice keys like feat_asi_lv4, bg_feat_origin, etc.)
  function getFeatSlot(featName){
    if(!C?.choices) return null;
    const slotMeta = (C?.featSlotMeta && typeof C.featSlotMeta === 'object') ? C.featSlotMeta : {};
    for(const [key,val] of Object.entries(C.choices)){
      const vals = Array.isArray(val) ? val : [val];
      if(vals.includes(featName)){
        const metaLbl = String(slotMeta?.[key]?.label || '').trim();
        if(metaLbl) return metaLbl;
        if(/^species_.*feat/i.test(key)) return 'Origin (Species)';
        if(/^feat_origin/i.test(key) || /^bg_feat/i.test(key)) return 'Origin (BG)';
        const lvMatch = key.match(/lv(\d+)/i);
        if(lvMatch) return `Feat Lv.${lvMatch[1]}`;
        return 'Feat';
      }
    }
    return 'Feat';
  }

  function _normFeatureKey(v){
    return clean(String(v || '')).toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function _canonArmorerModelKey(v){
    const key = _normFeatureKey(v);
    if(!key) return '';
    if(key === 'dreadnaught') return 'dreadnought';
    if(key.includes('dreadnought')) return 'dreadnought';
    if(key.includes('guardian')) return 'guardian';
    if(key.includes('infiltrator')) return 'infiltrator';
    return key;
  }

  function _extractArmorerModelDetailHtml(subFeatures, modelName){
    const target = _canonArmorerModelKey(modelName);
    if(!target || !Array.isArray(subFeatures) || !subFeatures.length) return '';

    const ordered = [...subFeatures].sort((a,b)=>(a?.level||0)-(b?.level||0));
    const byName = new Map();
    for(const f of ordered){
      const key = _canonArmorerModelKey(f?.name);
      if(key && !byName.has(key)) byName.set(key, f);
    }

    const armorModelFeature = ordered.find(f => _normFeatureKey(f?.name) === 'armormodel');

    function _resolveRefFeature(node){
      if(!node || typeof node !== 'object') return null;
      const raw = node.subclassFeature || node.classFeature;
      if(!raw) return null;
      const refName = String(raw).split('|')[0].trim();
      return byName.get(_canonArmorerModelKey(refName)) || null;
    }

    function _walk(node){
      if(!node) return null;
      if(Array.isArray(node)){
        for(const item of node){
          const found = _walk(item);
          if(found) return found;
        }
        return null;
      }
      if(typeof node !== 'object') return null;

      const maybeRef = _resolveRefFeature(node);
      if(maybeRef && _canonArmorerModelKey(maybeRef.name) === target) return maybeRef;

      if(node.name && _canonArmorerModelKey(node.name) === target) return node;

      const candidates = [node.entries, node.entry, node.items, node.rows];
      for(const c of candidates){
        const found = _walk(c);
        if(found) return found;
      }
      return null;
    }

    let found = byName.get(target) || null;
    if(!found && armorModelFeature) found = _walk(armorModelFeature.entries || armorModelFeature);
    if(!found) found = _walk(ordered.map(f => f.entries));
    if(!found) return '';

    const entries = found.entries || found.entry;
    if(!entries) return '';
    const detailName = found.name || modelName;
    return `<div style="margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--bdr)">
      <div style="font-size:var(--fs-label);color:var(--teal);opacity:.75;margin-bottom:.2rem">Armor Model Detail</div>
      <div style="font-size:var(--fs-body);font-weight:700;color:var(--text)">${esc(clean(detailName))}</div>
      <div style="margin-top:.25rem">${rE(entries)}</div>
    </div>`;
  }

  function _featItem(id, name, badge, badgeStyle, body){
    return `<div class="feature-item" id="${id}">
      <div class="feature-hdr" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div style="flex:1;min-width:0">
          <div class="feature-name" style="${badgeStyle?'color:'+badgeStyle:''}">
            ${badge?`<span style="font-size:var(--fs-xs);margin-right:5px;opacity:.7">${badge}</span>`:''}
            ${esc(clean(name||''))}
          </div>
        </div>
        <span class="feature-arrow">${luci('chevron-right')}</span>
      </div>
      <div class="feature-body">${body||'<i style="color:var(--text3)">No description.</i>'}</div>
    </div>`;
  }

  let h = '';

  if(C.className){
    h+=`<div style="font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem">${luci('swords')} ${esc(C.className)}</div>`;
    const byLv = {};
    for(const f of allF){ (byLv[f.level]||(byLv[f.level]=[])).push({...f,_type:'cls'}); }
    for(const f of allSF){ (byLv[f.level]||(byLv[f.level]=[])).push({...f,_type:'sub'}); }
    for(const lvNum of Object.keys(byLv).map(Number).sort((a,b)=>a-b)){
      for(const f of byLv[lvNum]){
        const id='feat_'+Math.random().toString(36).slice(2);
        const isSub = f._type==='sub';
        const srcLabel = isSub
          ? `◆ ${C.subclassShortName||'Subclass'} · Lv.${lvNum}`
          : `${C.className} · Lv.${lvNum}`;
        h+=`<div class="feature-item" id="${id}">
          <div class="feature-hdr" onclick="document.getElementById('${id}').classList.toggle('open')">
            <div style="flex:1;min-width:0">
              <div class="feature-name${isSub?' sub':''}">
                ${esc(clean(f.name||''))}
              </div>
              <div style="font-size:var(--fs-xs);color:${isSub?'var(--purple)':'var(--text3)'};margin-top:1px">${esc(srcLabel)}</div>
            </div>
            <span class="feature-arrow">${luci('chevron-right')}</span>
          </div>
          <div class="feature-body">${rE(f.entries)||'<i style="color:var(--text3)">No description.</i>'}</div>
        </div>`;
      }
    }
  }

  // Extra classes features
  for(const ec of (C.extraClasses||[])){
    if(!ec.name) continue;
    const ecAllF  = (ec.allClassFeatures||[]).filter(f=>f.level<=(ec.level||1));
    const ecAllSFRaw = ec.subclassShortName ? (ec.allSubFeatures||[]).filter(f=>f.subclassShortName===ec.subclassShortName&&f.level<=(ec.level||1)) : [];
    const ecIdx = (C.extraClasses || []).indexOf(ec);
    const ecPrefix = ecIdx >= 0 ? `mc${ecIdx}_` : '';
    const ecAllSF = _applySheetFeatureFilters(ec.name, ec.subclassShortName, ecAllSFRaw, { character:C, choices:C?.choices||{}, choicePrefix:ecPrefix, classLevel:ec.level||1 });
    if(!ecAllF.length && !ecAllSF.length) continue;
    const ecSc = ec.subclassShortName ? ` (${ec.subclassShortName})` : '';
    h+=`<div style="font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:.75rem 0 .5rem">${luci('swords')} ${esc(ec.name)}${esc(ecSc)}</div>`;
    const byLvE={};
    for(const f of ecAllF)  { (byLvE[f.level]||(byLvE[f.level]=[])).push({...f,_type:'cls'}); }
    for(const f of ecAllSF) { (byLvE[f.level]||(byLvE[f.level]=[])).push({...f,_type:'sub'}); }
    for(const lvNum of Object.keys(byLvE).map(Number).sort((a,b)=>a-b)){
      for(const f of byLvE[lvNum]){
        const id='feat_'+Math.random().toString(36).slice(2);
        const isSub=f._type==='sub';
        const srcLabel=isSub?`◆ ${ec.subclassShortName} · Lv.${lvNum}`:`${ec.name} · Lv.${lvNum}`;
        h+=`<div class="feature-item" id="${id}">
          <div class="feature-hdr" onclick="document.getElementById('${id}').classList.toggle('open')">
            <div style="flex:1;min-width:0">
              <div class="feature-name${isSub?' sub':''}">${esc(clean(f.name||''))}</div>
              <div style="font-size:var(--fs-xs);color:${isSub?'var(--purple)':'var(--text3)'};margin-top:1px">${esc(srcLabel)}</div>
            </div>
            <span class="feature-arrow">${luci('chevron-right')}</span>
          </div>
          <div class="feature-body">${rE(f.entries)||'<i style="color:var(--text3)">No description.</i>'}</div>
        </div>`;
      }
    }
  }

  if(C.speciesName){
    const speciesEntriesRaw = C.speciesSnapshot?.entries || [];
    const speciesEntries = _applySpeciesSheetFeatureFilters(C.speciesName, C?.speciesSource || '', speciesEntriesRaw, {
      character:C,
      choices:C?.choices||{},
      speciesKey:_sheetGetSpeciesAdapterKey(C.speciesName, C?.speciesSource || ''),
    });
    h+=`<div style="font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin:.75rem 0 .5rem">${luci('sparkles')} ${esc(C.speciesName)}</div>`;
    for(const e of speciesEntries){
      if(typeof e==='object'&&e.name){
        const id='feat_'+Math.random().toString(36).slice(2);
        h+=`<div class="feature-item" id="${id}">
          <div class="feature-hdr" onclick="document.getElementById('${id}').classList.toggle('open')">
            <div style="flex:1;min-width:0">
              <div class="feature-name">${esc(e.name)}</div>
              <div style="font-size:var(--fs-xs);color:var(--teal);margin-top:1px">${luci('sparkles')} ${esc(C.speciesName)}</div>
            </div>
            <span class="feature-arrow">${luci('chevron-right')}</span>
          </div>
          <div class="feature-body">${rE(e.entries||'')||'—'}</div>
        </div>`;
      }
    }
  }

  if(feats.length){
    h+=`<div style="font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin:.75rem 0 .5rem">${luci('star')} Talenti</div>`;
    for(const f of feats){
      const id='feat_'+Math.random().toString(36).slice(2);
      const slot = getFeatSlot(f.name);
      const catLabel = f.category ? ` · Cat. ${f.category}` : '';
      h+=`<div class="feature-item" id="${id}">
        <div class="feature-hdr" onclick="document.getElementById('${id}').classList.toggle('open')">
          <div style="flex:1;min-width:0">
            <div class="feature-name" style="color:var(--orange)">${esc(f.name)}</div>
            <div style="font-size:var(--fs-xs);color:var(--orange);opacity:.7;margin-top:1px">${luci('star')} ${esc(slot||'Feat')}${catLabel}</div>
          </div>
          <span class="feature-arrow">${luci('chevron-right')}</span>
        </div>
        <div class="feature-body">${rE(f.entries)||'—'}</div>
      </div>`;
    }
  }

  // Adapter-driven class/subclass choices (labels + normalization)
  {
    const rows = [];
    for (const [choiceKey, choiceVal] of Object.entries(C.choices || {})) {
      if (!choiceVal) continue;
      if (choiceKey.endsWith('_entry')) continue;
      if (/^feat_origin$/i.test(choiceKey)) continue;

      let k = choiceKey;
      let scope = '';
      let ownerClass = C.className || '';
      let ownerSubclass = C.subclassShortName || '';
      let ownerLevel = C.classLevel || C.level || 1;
      let ownerPrefix = '';
      let ownerSubFeaturesRaw = (C.allSubFeatures || []).filter(f => f.subclassShortName === ownerSubclass && !f.isReprinted && (f.level || 0) <= ownerLevel);

      const mcMatch = /^mc(\d+)_/.exec(choiceKey);
      if (mcMatch) {
        k = choiceKey.replace(/^mc\d+_/, '');
        const ecIdx = parseInt(mcMatch[1], 10);
        const ec = C.extraClasses?.[ecIdx];
        const ecName = ec?.name;
        if (ecName) scope = '[' + ecName + '] ';
        ownerClass = ec?.name || '';
        ownerSubclass = ec?.subclassShortName || '';
        ownerLevel = ec?.level || 1;
        ownerPrefix = `mc${ecIdx}_`;
        ownerSubFeaturesRaw = (ec?.allSubFeatures || []).filter(f => f.subclassShortName === ownerSubclass && !f.isReprinted && (f.level || 0) <= ownerLevel);
      }

      const clsMeta = _sheetGetClassChoiceMeta(ownerClass);
      const subMeta = _sheetGetSubclassChoiceMeta(ownerClass, ownerSubclass);
      const labels = { ...(clsMeta.labels || {}), ...(subMeta.labels || {}) };
      const choiceCtx = { choiceKey:k, ownerClass, ownerSubclass, ownerLevel, choicePrefix:ownerPrefix };

      const isChoice = [clsMeta.isChoiceKey, subMeta.isChoiceKey]
        .some(fn => typeof fn === 'function' && fn(k, choiceCtx));
      if (!isChoice) continue;

      const normalizers = [clsMeta.normalizeChoiceValue, subMeta.normalizeChoiceValue]
        .filter(fn => typeof fn === 'function');

      const vals = (Array.isArray(choiceVal) ? choiceVal : [choiceVal])
        .map(v => String(v || '').trim())
        .filter(Boolean)
        .map(v => {
          let out = v;
          for (const fn of normalizers) out = fn(out, k, choiceCtx);
          return String(out || '').trim();
        })
        .filter(Boolean);
      if (!vals.length) continue;

      let label = labels[k] || '';
      if (!label) {
        for (const fn of [clsMeta.getLabel, subMeta.getLabel]) {
          if (typeof fn !== 'function') continue;
          label = fn(k, choiceCtx) || '';
          if (label) break;
        }
      }
      if (!label) label = k.replace(/^.*?_/, '').replace(/_/g, ' ');

      const detailHtml = '';

      rows.push({ label: scope + label, values: vals, detailHtml, sectionTitle: subMeta.sectionTitle || clsMeta.sectionTitle || 'Class Choices' });
    }

    if (rows.length) {
      const title = rows[0].sectionTitle || 'Class Choices';
      h += `<div style="font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin:.75rem 0 .5rem">${luci('wrench')} ${esc(title)}</div>`;
      for (const row of rows) {
        const id = 'choice_' + Math.random().toString(36).slice(2);
        const body = `<ul style="margin:0;padding-left:18px">${row.values.map(v => `<li>${esc(v)}</li>`).join('')}</ul>${row.detailHtml || ''}`;
        h += `<div class="feature-item" id="${id}">
          <div class="feature-hdr" onclick="document.getElementById('${id}').classList.toggle('open')">
            <div style="flex:1;min-width:0">
              <div class="feature-name" style="color:var(--teal)">${esc(row.label)}</div>
              <div style="font-size:var(--fs-xs);color:var(--teal);opacity:.75;margin-top:1px">${row.values.length} selected</div>
            </div>
            <span class="feature-arrow">${luci('chevron-right')}</span>
          </div>
          <div class="feature-body">${body}</div>
        </div>`;
      }
    }
  }

  // Adapter-driven species choices (labels + normalization)
  if (C.speciesName) {
    const speciesMeta = _sheetGetSpeciesChoiceMeta(C.speciesName, C?.speciesSource || '');
    const labels = { ...(speciesMeta.labels || {}) };
    const rows = [];
    for (const [choiceKey, choiceVal] of Object.entries(C.choices || {})) {
      if (!choiceVal || choiceKey.endsWith('_entry')) continue;
      if (choiceKey.startsWith('mc')) continue;

      const choiceCtx = {
        choiceKey,
        speciesName: C.speciesName,
        speciesSource: C?.speciesSource || '',
      };

      if (typeof speciesMeta.isChoiceKey !== 'function' || !speciesMeta.isChoiceKey(choiceKey, choiceCtx)) continue;

      const vals = (Array.isArray(choiceVal) ? choiceVal : [choiceVal])
        .map(v => String(v || '').trim())
        .filter(Boolean)
        .map(v => typeof speciesMeta.normalizeChoiceValue === 'function' ? speciesMeta.normalizeChoiceValue(v, choiceKey, choiceCtx) : v)
        .map(v => String(v || '').trim())
        .filter(Boolean);
      if (!vals.length) continue;

      let label = labels[choiceKey] || '';
      if (!label && typeof speciesMeta.getLabel === 'function') label = speciesMeta.getLabel(choiceKey, choiceCtx) || '';
      if (!label) label = String(choiceKey || '').replace(/^species_/i, '').replace(/_+/g, ' ').trim();
      if (!label) continue;

      rows.push({ label, values: vals });
    }

    if (rows.length) {
      const title = speciesMeta.sectionTitle || 'Species Choices';
      h += `<div style="font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin:.75rem 0 .5rem">${luci('sparkles')} ${esc(title)}</div>`;
      for (const row of rows) {
        const id = 'species_choice_' + Math.random().toString(36).slice(2);
        const body = `<ul style="margin:0;padding-left:18px">${row.values.map(v => `<li>${esc(v)}</li>`).join('')}</ul>`;
        h += `<div class="feature-item" id="${id}">
          <div class="feature-hdr" onclick="document.getElementById('${id}').classList.toggle('open')">
            <div style="flex:1;min-width:0">
              <div class="feature-name" style="color:var(--teal)">${esc(row.label)}</div>
              <div style="font-size:var(--fs-xs);color:var(--teal);opacity:.75;margin-top:1px">${row.values.length} selected</div>
            </div>
            <span class="feature-arrow">${luci('chevron-right')}</span>
          </div>
          <div class="feature-body">${body}</div>
        </div>`;
      }
    }
  }

  if(!h) h='<div class="phmsg">No features available.</div>';
  el.innerHTML = h;
  refreshIcons();
}

function renderBackgroundTab(){
  const el = document.getElementById('background-wrap');
  if(!C.bgName){ el.innerHTML='<div class="phmsg">No background selected.</div>'; return; }
  const snap = C.bgSnapshot||{};

  let h = `<div class="bg-section">
    <div class="bg-section-title">${luci('scroll-text')} ${esc(C.bgName)}</div>`;

  const skills = (snap.skillProficiencies||[]).flatMap(sp=>Object.keys(sp).filter(k=>k!=='choose'));
  if(skills.length) h+=`<p class="bg-text"><strong>Skills:</strong> ${skills.join(', ')}</p>`;

  const tools = (snap.toolProficiencies||[]).flatMap(t=>Object.keys(t).filter(k=>!['choose','any','anyTool','anyArtisansTool','anyMusicalInstrument','anyGamingSet'].includes(k)));
  if(tools.length) h+=`<p class="bg-text"><strong>Tools:</strong> ${tools.join(', ')}</p>`;

  const langs = (snap.languageProficiencies||[]).map(lp=>lp.anyStandard?`${lp.anyStandard} language of your choice`:Object.keys(lp).filter(k=>lp[k]===true).join(', ')).filter(Boolean);
  if(langs.length) h+=`<p class="bg-text"><strong>Languages:</strong> ${langs.join(', ')}</p>`;

  const bgMeta = typeof getGenericBackgroundChoiceMeta === 'function' ? getGenericBackgroundChoiceMeta() : null;
  const bgChoiceRows = [];
  if (bgMeta && C?.choices) {
    for (const [choiceKey, choiceVal] of Object.entries(C.choices)) {
      if (!choiceVal || choiceKey.endsWith('_entry')) continue;
      if (typeof bgMeta.isChoiceKey !== 'function' || !bgMeta.isChoiceKey(choiceKey, { character:C })) continue;
      const vals = (Array.isArray(choiceVal) ? choiceVal : [choiceVal])
        .map(v => typeof bgMeta.normalizeChoiceValue === 'function' ? bgMeta.normalizeChoiceValue(v, choiceKey, { character:C }) : v)
        .map(v => String(v || '').trim())
        .filter(Boolean);
      if (!vals.length) continue;
      const label = typeof bgMeta.getLabel === 'function' ? bgMeta.getLabel(choiceKey, { character:C }) : choiceKey.replace(/^bg_/i, '').replace(/_+/g, ' ');
      bgChoiceRows.push({ label, vals });
    }
  }
  if (bgChoiceRows.length) {
    h += `<div style="margin-top:.65rem">`;
    for (const row of bgChoiceRows) {
      h += `<p class="bg-text"><strong>${esc(row.label)}:</strong> ${esc(row.vals.join(', '))}</p>`;
    }
    h += `</div>`;
  }

  h+=`</div>`;

  for(const e of (snap.entries||[])){
    if(typeof e==='object'&&e.name){
      const id='bg_'+Math.random().toString(36).slice(2);
      h+=`<div class="feature-item" id="${id}">

/* ═══ Generic Slot Recovery Modal (Arcane Recovery, etc.) ═══ */
let _slotRec = { budget: 0, maxLv: 5, sel: {}, title: '' };

function _sheetRegularSpellSlotCaps(){
  if(!C) return [];
  const lv = C.level || 1;
  const extra = C.extraClasses || [];
  const pLvSheet = C.classLevel || lv - extra.reduce((s, ec) => s + (ec.level || 1), 0);
  const pProfile = _sheetSpellcastingProfile(C.className || '', C.subclassShortName || '', C.clsSnapshot || {});
  const prog = _sheetCasterProgression(pProfile?.casterProgression || C.clsSnapshot?.casterProgression);
  if(extra.length){
    const casterLvFor = (clsName, clsLv, scName, clsSnap) => {
      const profile = _sheetSpellcastingProfile(clsName, scName, clsSnap || null);
      return _sheetCasterContribution(_sheetCasterProgression(profile?.casterProgression), clsLv);
    };
    let cLv = casterLvFor(C.className || '', pLvSheet, C.subclassShortName || '', C.clsSnapshot || {});
    extra.forEach(ec => {
      cLv += casterLvFor(ec.name || '', ec.level || 1, ec.subclassShortName || '', ec.clsSnapshot || {});
    });
    cLv = Math.floor(cLv);
    return cLv > 0 ? (FULL_SLOTS[Math.min(cLv, 20)] || []) : [];
  }
  if(prog === 'full') return FULL_SLOTS[lv] || [];
  if(prog === '1/2' || prog === 'half') return HALF_SLOTS[lv] || [];
  if(prog === '1/3') return THIRD_SLOTS[lv] || [];
  if(prog === 'artificer') return FULL_SLOTS[Math.min(Math.ceil(lv / 2), 20)] || [];
  return [];
}

function _showSlotRecoveryModal(budget, maxSlotLevel, title) {
  _slotRec = { budget, maxLv: maxSlotLevel || 5, sel: {}, title: title || 'Slot Recovery' };
  let m = document.getElementById('slot-rec-modal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'slot-rec-modal';
    m.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;align-items:center;justify-content:center;padding:1rem';

  }
  m.style.display = 'flex';
  _renderSlotRecoveryModal();
}

function _renderSlotRecoveryModal() {
  const m = document.getElementById('slot-rec-modal');
  if (!m) return;
  const { budget, maxLv, sel, title } = _slotRec;
  const spent = Object.entries(sel).reduce((s, [lv, c]) => s + Number(lv) * c, 0);
  const remaining = budget - spent;
  const hasSelection = spent > 0;
  const slotCaps = _sheetRegularSpellSlotCaps();
  let rows = '';
  for (let lv = 1; lv <= Math.min(maxLv, slotCaps.length); lv++) {
    const total = slotCaps[lv - 1] || 0;
    if (!total) continue;
    const used = Math.min(spellSlotUsed[lv] || 0, total);
    const selCnt = sel[lv] || 0;
    const canAdd = remaining >= lv && selCnt < used;
    const canSub = selCnt > 0;
    const addTitle = used
      ? (remaining >= lv ? 'Recover one expended slot' : 'Not enough recovery budget')
      : 'No expended slots at this level';
    rows += `<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem">
      <span style="color:var(--text2);font-size:var(--fs-body);min-width:52px">Level ${lv}</span>
      <span style="color:var(--text3);font-size:var(--fs-xs);flex:1">${used} used / ${total} · costs ${lv}</span>
      <button ${canSub?'':'disabled'} onclick="_slotRecAdj(${lv},-1)" title="${canSub?'Remove one recovered slot':'Nothing selected'}" style="width:24px;height:24px;border-radius:50%;border:1px solid var(--bdr2);background:var(--bg3);color:var(--text);cursor:${canSub?'pointer':'not-allowed'};opacity:${canSub?1:.35};font-size:16px;line-height:1">−</button>
      <span style="min-width:18px;text-align:center;font-family:var(--ff-display);color:var(--gold2);font-weight:700">${selCnt}</span>
      <button ${canAdd?'':'disabled'} onclick="_slotRecAdj(${lv},1)" title="${addTitle}" style="width:24px;height:24px;border-radius:50%;border:1px solid var(--bdr2);background:var(--bg3);color:var(--text);cursor:${canAdd?'pointer':'not-allowed'};opacity:${canAdd?1:.35};font-size:16px;line-height:1">+</button>
    </div>`;
  }
  if (!rows) rows = `<div style="color:var(--text3);font-size:var(--fs-body);text-align:center;padding:.75rem 0">No recoverable spell slots for this character.</div>`;
  m.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--rl);padding:1.5rem;max-width:320px;width:100%">
    <div style="font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:700;color:var(--gold);margin-bottom:.25rem">${luci('book-open')} ${esc(title)}</div>
    <div style="font-size:var(--fs-body);color:var(--text3);margin-bottom:.85rem">Budget: <b style="color:var(--gold2)">${remaining}</b> / ${budget} levels remaining</div>
    ${rows}
    ${!hasSelection?`<div style="font-size:var(--fs-xs);color:var(--text3);margin-top:.75rem">Mark spell slots as used in the Spells tab before recovering them.</div>`:''}
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button ${hasSelection?'':'disabled'} onclick="_applySlotRecovery()" style="flex:1;padding:8px;background:var(--bg3);border:1px solid var(--gold);border-radius:var(--r);color:var(--gold2);cursor:${hasSelection?'pointer':'not-allowed'};opacity:${hasSelection?1:.45};font-family:var(--ff-display);font-size:var(--fs-body);font-weight:700">${luci('sparkles')} Recover</button>
      <button onclick="_closeSlotRecoveryModal()" style="padding:8px 16px;background:none;border:1px solid var(--bdr);border-radius:var(--r);color:var(--text3);cursor:pointer;font-family:inherit">Cancel</button>
    </div>
  </div>`;
  refreshIcons();
}

function _slotRecAdj(lv, delta) {
  const { budget, sel } = _slotRec;
  const slotCaps = _sheetRegularSpellSlotCaps();
  const used = Math.min(spellSlotUsed[lv] || 0, slotCaps[lv - 1] || 0);
  const cur = sel[lv] || 0;
  const spent = Object.entries(sel).reduce((s, [l, c]) => s + Number(l) * c, 0);
  if (delta > 0 && (budget - spent) >= lv && cur < used) {
    _slotRec.sel[lv] = cur + 1;
  } else if (delta < 0 && cur > 0) {
    _slotRec.sel[lv] = cur - 1;
  }
  _renderSlotRecoveryModal();
}

function _applySlotRecovery() {
  for (const [lv, cnt] of Object.entries(_slotRec.sel)) {
    if (cnt > 0) spellSlotUsed[Number(lv)] = Math.max(0, (spellSlotUsed[Number(lv)] || 0) - cnt);
  }
  localStorage.setItem('5e_slots_used', JSON.stringify(spellSlotUsed));
  _closeSlotRecoveryModal();
  renderSpellsTab();
}

function _updateSrPreview(){
  const el = document.getElementById('sr-preview');
  const countEl = document.getElementById('sr-count');
  if(!el||!countEl) return;
  const n = parseInt(countEl.textContent)||1;
  const conMod = getMod(getFinal('con'));
  if(n===0){ el.textContent = 'Resources recovered, no HP healed.'; return; }
  const avgRoll = Math.ceil(_srFaces/2);
  const avgHeal = Math.max(n, n*avgRoll + n*conMod);

function _applyShortRest(count, faces){
  _closeShortRestModal();
  const conMod = getMod(getFinal('con'));
  const rolls = [];
  let totalHeal = 0;
  for(let i=0;i<count;i++){
    const r = Math.floor(Math.random()*faces)+1;
    rolls.push(r);
    totalHeal += Math.max(1, r+conMod);
  }
  if(count>0){
    _setCurrentHp(Math.min(maxHP, currentHP+totalHeal));
    usedHD += count;
    _saveHpState();
    localStorage.setItem('5e_hd_used', usedHD);
    renderStatsRow();
    renderHitDice();
  }
  // Recover SR resources (class features, maneuvers, etc.)
  recoverResources('SR');
  // Reset Warlock pact slots (recharge on SR)
  _resetPactSlots();
  renderSpellsTab();
  renderActionsTab();
  const rollDesc = rolls.length ? rolls.map(r=>`d${faces}(${r})`).join('+') + (conMod?' +'+conMod+'/dado':'') : '';
  showDiceToast('Short Rest',
    rolls.map(r=>({v:r,faces})),
    count>0?conMod:0,
    count>0?totalHeal:0,
    count>0 ? `${rollDesc} = +${totalHeal} HP` : 'Risorse recuperate');
}

function _resetPactSlots(){
  const extra = C?.extraClasses||[];
  const pLv = C?.classLevel || C?.level || 1;
  const isPact = p => p==='pact';
  const resetPact = lv => {
    const ps = PACT_SLOTS[Math.min(lv,20)];
    if(ps) spellSlotUsed[ps.l] = 0;
  };
  if(isPact(C?.clsSnapshot?.casterProgression)) resetPact(pLv);
  extra.forEach(ec => {
    if(isPact(ec.clsSnapshot?.casterProgression)) resetPact(ec.level||1);
  });
  localStorage.setItem('5e_slots_used', JSON.stringify(spellSlotUsed));
}

/* ════════════════════ WIZARD SPELLBOOK MANAGEMENT ════════════════════ */
function toggleWizardPreparedSpell(name, level, targetKey){
  if(!C) return;
  if(typeof WizardSpellbookAPI === 'undefined') return;
  ensureWizardSpellbookInitialized();

  let bucket = C;
  let wizardLv = C.classLevel || C.level || 1;
  const key = String(targetKey || 'primary');
  if(key && key !== 'primary'){
    const m = key.match(/^ec:(\d+)$/);
    if(!m) return;
    const idx = Number(m[1]);
    const ec = (C.extraClasses || [])[idx];
    if(!ec || String(ec.name || '').toLowerCase() !== 'wizard') return;
    bucket = ec;
    wizardLv = ec.level || 1;
  } else if(String(C.className || '').toLowerCase() !== 'wizard'){
    return;
  }

  const intMod = getMod(getFinal('int')) || 0;
  const clsName = (key === 'primary') ? (C.className || 'Wizard') : (bucket?.name || 'Wizard');
  const subclassName = (key === 'primary') ? (C.subclassShortName || '') : (bucket?.subclassShortName || '');
  const maxPrepared = _sheetWizardPreparedCap(wizardLv, clsName, subclassName, bucket?.clsSnapshot || {}, intMod);
  const alreadyPrepared = !!(bucket.selectedSpells && bucket.selectedSpells[level] && bucket.selectedSpells[level].includes(name));

  if(!alreadyPrepared && !WizardSpellbookAPI.isInSpellbook(bucket, name, level)){
    alert('You can only prepare spells that are in your spellbook.');
    return;
  }

  const ok = WizardSpellbookAPI.togglePreparedSpell(bucket, name, level, wizardLv, intMod, maxPrepared);
  if(!ok && !alreadyPrepared){
    alert(`You have already prepared the maximum of ${maxPrepared} spells!`);
    return;
  }

  localStorage.setItem('5e_current_char', JSON.stringify(C));
  renderSpellsTab();
  renderActionsTab();
}

/* ════════════════════ DICE ROLLER ════════════════════ */
function _parseFormula(formula){
  const m = formula.match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if(!m) return null;
  return { count:+m[1], faces:+m[2], mod:parseInt(m[3]||0) };
}

function _rollDie(faces){ return Math.floor(Math.random()*faces)+1; }

function rollD20(bonus, label, advantage){
  const r1 = _rollDie(20);
  const r2 = advantage!==undefined ? _rollDie(20) : null;
  let roll = r1;
  let detail = '';
  if(advantage===true){  roll=Math.max(r1,r2); detail=`Advantage: ${r1} / ${r2}`; }
  if(advantage===false){ roll=Math.min(r1,r2); detail=`Disadvantage: ${r1} / ${r2}`; }
  const total = roll + bonus;
  const isCrit = roll===20, isFumble = roll===1;
  showDiceToast(label, [{v:roll,faces:20}], bonus, total,
    detail || (isCrit?'CRITICO!':(isFumble?'FUMBLE!':'')));
  return total;
}

function rollDamage(formula, label){
  const p = _parseFormula(formula);
  if(!p){ showDiceToast(label,[],0,0,'Formula non valida'); return; }
  const rolls = Array.from({length:p.count}, ()=>_rollDie(p.faces));
  const total = rolls.reduce((a,b)=>a+b,0) + p.mod;
  showDiceToast(label, rolls.map(v=>({v,faces:p.faces})), p.mod, total);
  return total;
}

function rollDamagePrompt(label, defaultFormula){
  const seed = String(defaultFormula || '1d6').trim() || '1d6';
  const modal = _ensureFormulaPromptModal();
  const inp = document.getElementById('formula-prompt-input');
  const title = document.getElementById('formula-prompt-title');
  if(title) title.textContent = `Damage formula · ${label}`;
  if(inp){
    inp.value = seed;
    inp.select();
  }
  modal._submit = function () {
    const formula = String(inp?.value || '').trim();
    if(!formula){ _closeFormulaPromptModal(); return; }
    if(!_parseFormula(formula)){
      showDiceToast(label, [], 0, 0, 'Formula non valida');
      return;
    }
    _closeFormulaPromptModal();
    rollDamage(formula, label);
  };
  modal.style.display = 'flex';
  return null;
}

function _closeFormulaPromptModal(){
  const modal = document.getElementById('formula-prompt-modal');
  if(!modal) return;
  modal.style.display = 'none';
}

function _ensureFormulaPromptModal(){
  let modal = document.getElementById('formula-prompt-modal');
  if(modal) return modal;
  modal = document.createElement('div');
  modal.id = 'formula-prompt-modal';
  modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:3000;align-items:center;justify-content:center;padding:1rem';
  modal.innerHTML = `
    <div style="width:min(460px,100%);background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--rl);padding:1rem">
      <div id="formula-prompt-title" style="font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:700;color:var(--gold);margin-bottom:.6rem">Damage formula</div>
      <input id="formula-prompt-input" class="search-box" style="margin:0" placeholder="e.g. 2d6+3" />
      <div style="display:flex;justify-content:flex-end;gap:.5rem;margin-top:.75rem">
        <button class="chip" onclick="_closeFormulaPromptModal()">Cancel</button>
        <button class="chip on" onclick="document.getElementById('formula-prompt-modal')._submit && document.getElementById('formula-prompt-modal')._submit()">Roll</button>
      </div>
    </div>`;
  modal.addEventListener('click', (e)=>{ if(e.target===modal) _closeFormulaPromptModal(); });
  document.body.appendChild(modal);
  const inp = modal.querySelector('#formula-prompt-input');
  if(inp){
    inp.addEventListener('keydown', (e)=>{
      if(e.key === 'Escape') { _closeFormulaPromptModal(); return; }
      if(e.key === 'Enter'){ e.preventDefault(); if(modal._submit) modal._submit(); }
    });
  }
  return modal;
}

function rollFormula(formula, label){
  const p = _parseFormula(formula);
  if(!p) return;
  const rolls = Array.from({length:p.count}, ()=>_rollDie(p.faces));
  const total = rolls.reduce((a,b)=>a+b,0) + p.mod;
  showDiceToast(label, rolls.map(v=>({v,faces:p.faces})), p.mod, total);
  return total;
}

function showDiceToast(label, rolls, mod, total, extra){
  let el = document.getElementById('dice-toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'dice-toast';
    el.className = 'dice-toast';
    el.innerHTML = `<div class="dice-toast-close" onclick="this.parentElement.classList.remove('show')">${luci('x')}</div>`;
    document.body.appendChild(el);
    refreshIcons();
  }
  const isCrit = rolls.length===1 && rolls[0].faces===20 && rolls[0].v===20;
  const isFumble = rolls.length===1 && rolls[0].faces===20 && rolls[0].v===1;
  const totalCls = isCrit?'crit':isFumble?'fail':'normal';
  const modStr = mod>0?` +${mod}`:mod<0?` ${mod}`:'';
  const rollsHtml = rolls.map(r=>{
    const cls = r.v===r.faces?'max':r.v===1?'min':'';
    return `<div class="dice-pip-val ${cls}">${r.v}</div>`;
  }).join('<span style="color:var(--text3);padding:0 2px">+</span>');
  el.innerHTML = `
    <div class="dice-toast-close" onclick="this.parentElement.classList.remove('show')">${luci('x')}</div>
    <div class="dice-toast-label">${esc(label)}</div>
    ${rolls.length ? `<div class="dice-toast-rolls">${rollsHtml}${modStr?`<span class="dice-mod-str">${modStr}</span>`:''}</div>` : ''}
    <div class="dice-toast-total ${totalCls}">${total}</div>
    ${extra ? `<div class="dice-toast-extra">${esc(extra)}</div>` : ''}
  `;
  refreshIcons();
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 5000);
}

/* ════════════════════ RESOURCES ════════════════════ */
let charResources = {};

// Resource definitions moved to class/subclass adapters.

function getAllResDefs(){
  const cls=C?.className||'';
  const speciesName=C?.speciesName||'';
  const speciesSource=C?.speciesSource||'';
  const defs = [];
  const pushDefs = (arr, meta) => {
    (Array.isArray(arr) ? arr : []).forEach(r => {
      if (!r || !r.key) return;
      defs.push({
        ...r,
        _ownerClass: meta?.ownerClass || '',
        _ownerLevel: Number(meta?.ownerLevel || 1),
        _ownerToken: String(meta?.ownerToken || 'pc'),
      });
    });
  };

  const pLv = Number(C?.classLevel || C?.level || 1);
  pushDefs(_sheetGetClassResources(cls), { ownerClass: cls, ownerLevel: pLv, ownerToken: 'pc' });
  pushDefs(_sheetGetSubclassResources(cls, C?.subclassShortName||''), { ownerClass: cls, ownerLevel: pLv, ownerToken: 'pc' });

  (C?.extraClasses || []).forEach((ec, idx) => {
    if (!ec?.name) return;
    const ecLv = Number(ec.level || 1);
    const tok = `mc${idx}`;
    pushDefs(_sheetGetClassResources(ec.name), { ownerClass: ec.name, ownerLevel: ecLv, ownerToken: tok });
    pushDefs(_sheetGetSubclassResources(ec.name, ec.subclassShortName || ''), { ownerClass: ec.name, ownerLevel: ecLv, ownerToken: tok });
  });

  pushDefs(_sheetGetSpeciesResources(speciesName, speciesSource), {
    ownerClass: speciesName,
    ownerLevel: Number(C?.level || 1),
    ownerToken: 'species',
  });

  (C?.allFeatSnapshots || []).forEach(function(feat) {
    if (!feat?.name) return;
    const featRes = typeof getFeatSheetResources === 'function' ? getFeatSheetResources(feat.name) : [];
    pushDefs(featRes, { ownerClass: '', ownerLevel: Number(C?.level || 1), ownerToken: 'feat' });
  });

  const byKeyOwners = new Map();
  defs.forEach(r => {
    const k = String(r.key || '');
    if (!byKeyOwners.has(k)) byKeyOwners.set(k, new Set());
    byKeyOwners.get(k).add(String(r._ownerToken || 'pc'));
  });
  defs.forEach(r => {
    const owners = byKeyOwners.get(String(r.key || ''));
    r._stateKey = owners && owners.size > 1 ? `${r._ownerToken}_${r.key}` : String(r.key || '');
  });
  return defs;
}

function _getResStateKey(res){
  return String(res?._stateKey || res?.key || '');
}

function _normResActionName(v){
  return String(v || '').toLowerCase().replace(/[^a-z0-9]/g, '');
}
function _resourceMatchesAction(res, actionRef){
  if(!res || !actionRef) return false;
  const actionObj = typeof actionRef === 'object' ? actionRef : { name: String(actionRef || '') };
  const actionOwner = String(actionObj._cls || C?.className || '');
  if (actionOwner && res._ownerClass && actionOwner !== res._ownerClass) return false;
  const resKey = String(actionObj.resKey || '').trim();
  if (resKey && res.key === resKey) return true;
  const target = _normResActionName(actionObj.name || actionRef);
  if(!target) return false;
  const candidates = [
    res.actionName,
    res.name,
    res.key,
  ].map(_normResActionName).filter(Boolean);
  return candidates.includes(target);
}

function getResMax(res){
  const lv = Number(res?._ownerLevel || C?.classLevel || C?.level || 1);
  return Math.min(res.max(lv), 20); // cap at 20 for pip display
}

function loadResources(){
  try {
    const stored = JSON.parse(localStorage.getItem('5e_resources')||'{}');
    charResources = {};
    for(const r of getAllResDefs()){
      const rk = _getResStateKey(r);
      charResources[rk] = stored[rk] ?? stored[r.key] ?? getResMax(r);
    }
  } catch(e){ charResources = {}; }
}

function saveResources(){
  localStorage.setItem('5e_resources', JSON.stringify(charResources));
}

function recoverResourceByKey(key, amount=1){
  const target = String(key || '');
  const gain = Math.max(1, Number(amount) || 1);
  let changed = false;
  for(const r of getAllResDefs()){
    const rk = _getResStateKey(r);
    if(String(r.key || '') !== target && rk !== target) continue;
    const max = getResMax(r);
    const cur = charResources[rk] ?? max;
    const next = Math.min(max, cur + gain);
    if(next !== cur){
      charResources[rk] = next;
      changed = true;
    }
  }
  if(changed){
    saveResources();
    renderActionsTab();
  }
  return changed;
}

function spendResource(key, cost=1){
  const oldCur = charResources[key] ?? 0;
  charResources[key] = Math.max(0, oldCur - cost);
  saveResources();
  renderActionsTab();
  if (charResources[key] < oldCur) {
    const _sideEffect = typeof getResourceSideEffect === 'function' ? getResourceSideEffect(key) : null;
    if (typeof _sideEffect === 'function') _sideEffect();
  }
}

function setResourcePip(key, idx, max){
  const oldCur = charResources[key]??max;
  const consumed = max - oldCur;
  // left-to-right: clicking a consumed pip (idx < consumed) → restore; clicking available → consume
  charResources[key] = idx < consumed ? max - idx : max - idx - 1;
  charResources[key] = Math.max(0, Math.min(max, charResources[key]));
  saveResources();
  const newCur = charResources[key];
  document.querySelectorAll(`.res-pip-group[data-key="${key}"]`).forEach(el => {
    const m = parseInt(el.dataset.max);
    el.innerHTML = Array.from({length:m},(_,i)=>
      `<div class="res-pip${i<m-newCur?' used':''}" onclick="event.stopPropagation();setResourcePip('${key}',${i},${m})" title="${i<m-newCur?'Used':'Available'}"></div>`
    ).join('');
  });
  if (newCur < oldCur) {
    const _sideEffect = typeof getResourceSideEffect === 'function' ? getResourceSideEffect(key) : null;
    if (typeof _sideEffect === 'function') _sideEffect();
  }
}

function recoverResources(type){
  for(const r of getAllResDefs()){
    const max = getResMax(r);
    const rk = _getResStateKey(r);
    if(type==='LR'){
      charResources[rk] = max;
      continue;
    }
    if(r.recharge==='SR'){
      charResources[rk] = max;
      continue;
    }
    if(type==='SR' && r.srRecover){
      const ownerLv = Number(r?._ownerLevel || C?.classLevel || C?.level || 1);
      const gain = typeof r.srRecover === 'function' ? Number(r.srRecover(ownerLv)) : Number(r.srRecover);
      if (gain > 0) {
        const cur = charResources[rk] ?? max;
        charResources[rk] = Math.min(max, cur + gain);
      }
    }
  }
  saveResources();
}

function _getResourceRechargeLabel(res){
  if (res.recharge === 'SR') return 'RS';
  if (res.srRecover) {
    const ownerLv = Number(res?._ownerLevel || C?.classLevel || C?.level || 1);
    const gain = typeof res.srRecover === 'function' ? Number(res.srRecover(ownerLv)) : Number(res.srRecover);
    if (gain > 0) return `RL+${gain}RS`;
  }
  return 'RL';
}

function buildResourceBlock(actionRef){
  const defs = getAllResDefs();
  const res = defs.find(r => _resourceMatchesAction(r, actionRef));
  if(!res) return '';
  const max = getResMax(res);
  if(max===0) return '';
  const rk = _getResStateKey(res);
  const cur = charResources[rk]??max;
  const rechargeLabel = _getResourceRechargeLabel(res);

  if(res.pool){
    // Show as number +/- for pools (Ki, Lay on Hands, etc.)
    return `<div class="res-block">
      <div class="res-block-label">${esc(res.name)} <span class="res-recharge">${rechargeLabel}</span></div>
      <button class="res-badge" onclick="spendResource('${rk}',1)">−</button>
      <span style="font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:700;color:var(--gold2);min-width:24px;text-align:center">${cur}</span>
      <span style="font-size:var(--fs-meta);color:var(--text3)">/ ${max}</span>
      <button class="res-badge" onclick="charResources['${rk}']=Math.min(${max},${cur}+1);saveResources();renderActionsTab()">+</button>
    </div>`;
  } else {
    // Show as pips
    let pipsHtml = '';
    for(let i=0;i<max;i++){
      pipsHtml += `<div class="res-pip${i<max-cur?' used':''}" onclick="setResourcePip('${rk}',${i},${max})" title="${i<max-cur?'Used':'Available'}"></div>`;
    }
    return `<div class="res-block">
      <div class="res-block-label">${esc(res.name)} <span class="res-recharge">${rechargeLabel}</span></div>
      <div class="res-pip-group" data-key="${rk}" data-max="${max}">${pipsHtml}</div>
    </div>`;
  }
}
