function getWeaponMasteries(){
  const out = new Set();
  if(!C?.choices) return out;
  for(const [key, val] of Object.entries(C.choices)){
    if(!val) continue;
    const lk = key.toLowerCase();
    if(!(lk.includes('mastery') && lk.includes('weapon'))) continue;
    const vals = Array.isArray(val) ? val : [val];
    vals.forEach(v => {
      const n = String(v||'').split('|')[0].replace(/\{@\w+\s*/g,'').replace(/[{}]/g,'').trim().toLowerCase();
      if(n) out.add(n);
    });
  }
  return out;
}

function buildWeaponCard(item, invIdx){
  const strMod=getMod(getFinal('str')), dexMod=getMod(getFinal('dex')), pb=getPB();
  const props=item.property||[];
  const isRanged=item.type==='R', isFinesse=_sheetItemHasProperty(item, ['F', 'finesse']);
  const isOffHand=item.hand==='off';
  const isVersatile=_sheetItemHasProperty(item, ['V', 'versatile'])&&!!item.dmg2;
  const isTwoHanded=isVersatile&&item.versatileHand==='2h';
  const bonus=parseInt((item.bonusWeapon||'0').replace('+',''))||0;
  const activeOverrides=_getActiveWeaponOverrides();
  const _flagOverride = activeOverrides.find(function(o){return o.itemFlag && Array.isArray(item.flags) && item.flags.includes(o.itemFlag);});
  const weaponOverride = _flagOverride
    || (item.weaponMod ? activeOverrides.find(function(o){return o.key===item.weaponMod;}) : null);
  const profInfo = _sheetWeaponProficiencyInfo(item, weaponOverride);
  const profBonus = profInfo.proficient ? pb : 0;
  let atkMod,dmgMod,abilityMod;
  let attackAbility='str';
  if(weaponOverride){
    attackAbility=String(weaponOverride.ability || 'str').toLowerCase();
    abilityMod=getMod(getFinal(attackAbility)); atkMod=abilityMod+profBonus+bonus;
  } else if(isRanged){  attackAbility='dex'; abilityMod=dexMod; atkMod=dexMod+profBonus+bonus;
  } else if(isFinesse){ attackAbility=dexMod>strMod?'dex':'str'; abilityMod=Math.max(strMod,dexMod); atkMod=abilityMod+profBonus+bonus;
  } else{               attackAbility='str'; abilityMod=strMod; atkMod=strMod+profBonus+bonus; }
  dmgMod = isOffHand ? Math.min(0, abilityMod)+bonus : abilityMod+bonus;
  const propStr=props.map(p=>WEAPON_PROP_LABELS[p]||p).filter(Boolean).join(', ');
  const range=isRanged?(item.range||'varia'):'5 ft'+(_sheetItemHasProperty(item, ['T', 'thrown'])?' / lancio':'');
  const dmgDie=(isTwoHanded?item.dmg2:item.dmg1)||'1d4', dmgType=item.dmgType||'';
  const dmgSign=dmgMod>=0?'+':'';
  const dmgFormula=`${dmgDie}${dmgSign}${dmgMod}`;
  const dmgLabel=`${dmgDie}${dmgSign}${dmgMod} ${dmgType}`.trim();
  const rarity=item.rarity&&item.rarity!=='none'?item.rarity:null;
  const rc=ITEM_RARITY_COLOR[rarity]||null;
  const src=SOURCE_LABELS[item.source]||item.source||'';
  const icon=isRanged?luci('crosshair'):luci('swords');
  const id='ac_'+Math.random().toString(36).slice(2);
  const wName=esc(item.name);
  const hasMastery = getWeaponMasteries().has((item.name||'').toLowerCase());
  const _dbItem = hasMastery && !item.mastery && Array.isArray(allItemsDb)
    ? allItemsDb.find(i => i.name === item.name) : null;
  const masteryProp = hasMastery ? (item.mastery || _dbItem?.mastery || '') : '';
  const attackDis = _sheetHasNonProficientArmor() && (attackAbility === 'str' || attackAbility === 'dex');
  const attackAdvArg = attackDis ? ',false' : '';
  const tagHtml=`<span class="action-tag atk">ATK</span>`
    +(isOffHand?`<span class="action-tag" style="border-color:var(--text3);color:var(--text3)">OFF</span>`:'')
    +(isTwoHanded?`<span class="action-tag" style="border-color:var(--text3);color:var(--text3)">2H</span>`:'')
    +(weaponOverride?`<span class="action-tag" style="border-color:var(--purple);color:var(--purple)">${esc((weaponOverride.label||weaponOverride.key).toUpperCase())}</span>`:'')
    +(!profInfo.proficient?`<span class="action-tag" style="border-color:var(--red);color:var(--red)" title="No proficiency bonus to attack roll">NO PROF</span>`:'')
    +(attackDis?`<span class="action-tag" style="border-color:var(--red);color:var(--red)" title="Disadvantage: untrained armor">DIS</span>`:'')
    +(hasMastery?`<span class="action-tag" style="border-color:var(--gold);color:var(--gold)">${luci('star')} ${masteryProp?esc(masteryProp):'MASTERY'}</span>`:'')
    +(rc?`<span class="action-tag" style="border-color:${rc};color:${rc}">${esc(rarity)}</span>`:'');
  const sub=[src, bonus>0?'Magica +'+bonus:'', propStr, isOffHand?'no ability mod to dmg':'', weaponOverride?weaponOverride.ability.toUpperCase()+' mod':''].filter(Boolean).join(' · ');
  const profSub = !profInfo.proficient ? 'no PB to hit' : '';
  const idxAttr = invIdx != null ? invIdx : -1;
  const handBtn=`<button class="inv-equip-btn on" onclick="toggleWeaponHand(${idxAttr})" style="font-size:var(--fs-xs);padding:2px 7px">${isOffHand?'Off':'Main'}</button>`;
  const versBtn=isVersatile?`<button class="inv-equip-btn on" onclick="toggleVersatile(${idxAttr})" style="font-size:var(--fs-xs);padding:2px 7px">${isTwoHanded?'2H':'1H'}</button>`:'';
  return `<div class="action-card" id="${id}">
    <div class="action-card-hdr">
      <span class="action-card-icon">${icon}</span>
      <div style="flex:1;min-width:0">
        <div class="action-card-name">${wName}${sub?`<span class="sub">${esc(sub)}</span>`:''}${profSub?`<span class="sub">${esc(profSub)}</span>`:''}</div>
      </div>
      <div class="action-card-tags">${tagHtml}</div>
      <div style="display:flex;gap:3px;align-items:center;flex-shrink:0">${handBtn}${versBtn}</div>
      <div class="action-stat">${fbonus(atkMod)}</div>
    </div>
    <div class="action-card-bar">
      <button class="roll-btn" onclick="rollD20(${atkMod},'Attack: ${wName}'${attackAdvArg})">${luci('dice-5')} Hits ${fbonus(atkMod)}</button>
      <button class="roll-btn dmg" onclick="rollDamage('${dmgFormula}','Damage: ${wName}')">${luci('sword')} ${esc(dmgLabel)}</button>
      <div class="action-dmg-pill">${luci('ruler')} <b>${esc(range)}</b></div>
      ${propStr?`<div class="action-dmg-pill">${esc(propStr)}</div>`:''}
      ${bonus>0?`<div class="action-dmg-pill" style="color:var(--gold)">${luci('sparkles')} +${bonus}</div>`:''}
      ${masteryProp?`<div class="action-dmg-pill" style="color:var(--gold)">${luci('star')} ${esc(masteryProp)}</div>`:''}
    </div>
  </div>`;
}

function _jsEsc(v){
  return String(v || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

function _normalizeDiceFormula(formula){
  return String(formula || '')
    .replace(/[−–—]/g,'-')
    .replace(/\s+/g,'')
    .trim();
}

function _extractFirstDamageFormulaFromEntries(entries){
  const txt = JSON.stringify(entries || []);
  if(!txt || txt === '[]') return null;
  const tagMatch = txt.match(/\{@(?:damage|scaledamage)\s+([^}|]+)[^}]*\}/i);
  if(tagMatch){
    const f = _normalizeDiceFormula(tagMatch[1]);
    const p = _parseFormula(f);
    if(p && !(p.faces === 20 && p.count <= 2)) return f;
  }
  const plain = txt.match(/\b(?:takes?|deal(?:s|ing)?|damage)\b[^.]{0,220}?\b(\d+d\d+(?:\s*[+-]\s*\d+)?)\b/i);
  if(plain){
    const f = _normalizeDiceFormula(plain[1]);
    const p = _parseFormula(f);
    if(p && !(p.faces === 20 && p.count <= 2)) return f;
  }
  return null;
}

function _scaleCantripFormula(baseFormula, lv){
  const p = _parseFormula(_normalizeDiceFormula(baseFormula));
  if(!p) return _normalizeDiceFormula(baseFormula);
  const mult = cantripDice(lv || 1);
  return `${p.count * mult}d${p.faces}${p.mod ? (p.mod >= 0 ? '+' : '') + p.mod : ''}`;
}

function _getActionOwnerLevel(a){
  const totalLv = Number(C?.level || 1);
  if(!a || !a._cls) return Number(C?.classLevel || totalLv || 1);
  if(String(C?.className || '') === String(a._cls)) return Number(C?.classLevel || totalLv || 1);
  const ec = (C?.extraClasses || []).find(x => String(x?.name || '') === String(a._cls));
  if(ec) return Number(ec.level || 1);
  return totalLv;
}
function _getActionOwnerCtx(a){
  return { character: C, action: a, ownerLevel: _getActionOwnerLevel(a) };
}

function _extractActionDamageFormula(a){
  const ctx = _getActionOwnerCtx(a);
  const fromField = (() => {
    if(typeof a?.healFormula === 'function'){
      try { return a.healFormula(ctx); }
      catch(_) { return null; }
    }
    if(typeof a?.healFormula === 'string') return a.healFormula;
    if(typeof a?.damageFormula === 'function'){
      try { return a.damageFormula(ctx); }
      catch(_) { return null; }
    }
    if(typeof a?.damageFormula === 'string') return a.damageFormula;
    if(typeof a?.rollDamage === 'string') return a.rollDamage;
    if(typeof a?.damage === 'string') return a.damage;
    if(Array.isArray(a?.damageRolls) && a.damageRolls.length){
      const first = a.damageRolls.find(r => r && (typeof r === 'string' || typeof r.formula === 'string'));
      if(typeof first === 'string') return first;
      if(first && typeof first.formula === 'string') return first.formula;
    }
    return null;
  })();
  if(fromField){
    const f = _normalizeDiceFormula(fromField);
    return _parseFormula(f) ? f : null;
  }

  const desc = String(a?.desc || '');
  const ownerLv = _getActionOwnerLevel(a);
  const pb = getPB();
  const modOf = (ab) => getMod(getFinal(String(ab || '').toLowerCase()));
  const sign = (n) => (n >= 0 ? `+${n}` : String(n));

  let m = desc.match(/(\d+d\d+)\s*\+\s*your\s*(STR|DEX|CON|INT|WIS|CHA)\s*modifier\s*\+\s*(?:your\s+)?[A-Za-z' ]*level/i);
  if(m){
    const v = modOf(m[2]) + ownerLv;
    return _normalizeDiceFormula(`${m[1]}${sign(v)}`);
  }
  m = desc.match(/(\d+d\d+)\s*\+\s*your\s*(STR|DEX|CON|INT|WIS|CHA)\s*modifier/i);
  if(m){
    const v = modOf(m[2]);
    return _normalizeDiceFormula(`${m[1]}${sign(v)}`);
  }
  m = desc.match(/(\d+d\d+)\s*\+\s*your\s*proficiency\s*bonus/i);
  if(m) return _normalizeDiceFormula(`${m[1]}${sign(pb)}`);
  m = desc.match(/(\d+d\d+)\s*\+\s*half\s+your\s+[A-Za-z' ]*level/i);
  if(m) return _normalizeDiceFormula(`${m[1]}${sign(Math.floor(ownerLv/2))}`);
  m = desc.match(/(\d+d\d+)\s*\+\s*(?:your\s+)?[A-Za-z' ]*level/i);
  if(m) return _normalizeDiceFormula(`${m[1]}${sign(ownerLv)}`);
  m = desc.match(/\b(\d+d\d+(?:\s*[+-]\s*\d+)?)\b/i);
  if(m){
    const f = _normalizeDiceFormula(m[1]);
    const p = _parseFormula(f);
    if(p && !(p.faces === 20 && p.count <= 2)) return f;
  }
  return null;
}
function _getActionDamageKind(a){
  const kind = String(a?.damageKind || '').toLowerCase();
  if(kind === 'heal' || kind === 'utility' || kind === 'damage') return kind;
  if(a?.healFormula !== undefined) return 'heal';
  const text = `${String(a?.name || '')} ${String(a?.desc || '')}`.toLowerCase();
  if(/\bheal|healing|regain|temporary hp|temp hp\b/.test(text)) return 'heal';
  return 'damage';
}
function _buildActionInlinePills(a){
  const ctx = _getActionOwnerCtx(a);
  let pills = a?.inlinePills;
  if(typeof pills === 'function'){
    try { pills = pills(ctx); } catch(_) { pills = []; }
  }
  if(!Array.isArray(pills) || !pills.length) return '';
  return pills.map(p => {
    if(!p || typeof p !== 'object') return '';
    const icon = String(p.icon || 'info');
    const label = p.label != null ? `${esc(String(p.label))}: ` : '';
    const value = p.value != null ? `<b>${esc(String(p.value))}</b>` : '';
    return `<div class="action-dmg-pill">${luci(icon)} ${label}${value}</div>`;
  }).join('');
}

function _inferActionAttackBonus(a){
  const pb = getPB();
  const strMod = getMod(getFinal('str'));
  const dexMod = getMod(getFinal('dex'));
  const text = `${a?.name || ''} ${a?.desc || ''}`.toLowerCase();

  if(typeof a?.attackBonus === 'number') return a.attackBonus;
  if(typeof a?.attackAbility === 'string'){
    const ab = a.attackAbility.toLowerCase().trim();
    if(['str','dex','con','int','wis','cha'].includes(ab)){
      return getMod(getFinal(ab)) + pb + Number(a?.attackBonusExtra || 0);
    }
  }
  if(a?.attackRoll === 'spell' || /\bspell\b|\bcantrip\b|\bmagic\b/.test(text)) return getSpellAttackBonus();
  if(/\branged\b/.test(text)) return dexMod + pb;
  if(/\bunarmed\b/.test(text)) return Math.max(strMod, dexMod) + pb;
  return Math.max(strMod, dexMod) + pb;
}

function _buildGenericActionRollButtons(a){
  if(a?.noRoll) return '';
  const dmgFormula = _extractActionDamageFormula(a);
  const dmgKind = _getActionDamageKind(a);
  const hasAttackSignal =
    a?.attackRoll !== undefined ||
    a?.attackAbility !== undefined ||
    typeof a?.attackBonus === 'number';
  const hasDamageSignal =
    a?.healFormula !== undefined ||
    a?.damageFormula !== undefined ||
    a?.rollDamage !== undefined ||
    a?.damage !== undefined ||
    (Array.isArray(a?.damageRolls) && a.damageRolls.length > 0) ||
    !!dmgFormula;
  if(!hasAttackSignal && !hasDamageSignal) return '';

  const atkBonus = _inferActionAttackBonus(a);
  const safeLabel = _jsEsc(a?.name || 'Action');
  const ownerCtx = _getActionOwnerCtx(a);
  const atkBtn = hasAttackSignal
    ? `<button class="roll-btn" onclick="event.stopPropagation();rollD20(${atkBonus},'Attack: ${safeLabel}')">${luci('dice-5')} Attack ${fbonus(atkBonus)}</button>`
    : '';
  const dmgBtnClass = dmgKind === 'heal' ? ' heal' : (dmgKind === 'utility' ? '' : ' dmg');
  const dmgBtnIcon = dmgKind === 'heal' ? 'heart' : (dmgKind === 'utility' ? 'dice-5' : 'flame');
  const labelPrefix = String(a?.rollLabelPrefix || (dmgKind === 'heal' ? 'Heal' : (dmgKind === 'utility' ? 'Roll' : 'Damage')));
  const resolvedRollLabel = (() => {
    if(typeof a?.rollLabel === 'function'){
      try { return String(a.rollLabel({ ...ownerCtx, formula: dmgFormula || '' }) || ''); } catch(_) {}
    }
    if(typeof a?.rollLabel === 'string') return a.rollLabel;
    return `${labelPrefix}: ${a?.name || 'Action'}`;
  })();
  const resolvedButtonLabel = (() => {
    if(typeof a?.damageButtonLabel === 'function'){
      try { return String(a.damageButtonLabel({ ...ownerCtx, formula: dmgFormula || '' }) || ''); } catch(_) {}
    }
    if(typeof a?.damageButtonLabel === 'string') return a.damageButtonLabel;
    return dmgFormula || '?';
  })();
  const dmgBtn = dmgFormula
    ? `<button class="roll-btn${dmgBtnClass}" onclick="event.stopPropagation();rollDamage('${_jsEsc(dmgFormula)}','${_jsEsc(resolvedRollLabel)}')">${luci(dmgBtnIcon)} ${esc(resolvedButtonLabel)}</button>`
    : (hasDamageSignal
      ? `<button class="roll-btn${dmgBtnClass}" onclick="event.stopPropagation();rollDamagePrompt('${_jsEsc(resolvedRollLabel)}','${_jsEsc(String(a?.damagePromptDefault || (dmgKind === 'heal' ? '1d8' : '1d6')))}')">${luci(dmgBtnIcon)} ${esc(String(a?.damagePromptLabel || `${labelPrefix} ?`))}</button>`
      : '');
  return atkBtn + dmgBtn;
}

function _getEffectiveCantripData(name) {
  const base = typeof getCantripData === 'function' ? getCantripData(name) : null;
  const mods = typeof getCantripDataModifiers === 'function' ? getCantripDataModifiers(name) : [];
  if (!mods.length) return base;
  let out = base ? Object.assign({}, base) : {};
  for (const fn of mods) {
    try { out = fn(out, C) || out; } catch(e) { console.warn('[CantripMod]', e); }
  }
  return out;
}

function buildCantripCard(name){
  const known = _getEffectiveCantripData(name);
  const lv = C?.level || 1;
  const sm = getSpellMod();
  const pb = getPB();
  const atkBonus = sm + pb;
  const saveDC = 8 + pb + sm;
  const id = 'ac_' + Math.random().toString(36).slice(2);
  const full = Array.isArray(sheetSpellDb)
    ? sheetSpellDb.find(s => String(s?.name || '').toLowerCase() === String(name || '').toLowerCase())
    : null;
  const entries = full?.entries || [];
  const safeName = _jsEsc(name);

  const toHit = known
    ? !!known.toHit
    : !!(full?.spellAttack?.length || JSON.stringify(entries).includes('{@atk '));
  const hasSave = known
    ? !!known.hasSave
    : !!(full?.savingThrow?.length || JSON.stringify(entries).includes('{@dc '));
  const range = known?.range
    || (full?.range?.distance?.amount != null
      ? `${full.range.distance.amount} ${full.range.distance.type || ''}`.trim()
      : (full?.range?.type || 'varies'));
  const dmgType = known?.dmgType || '';
  const school = full ? (SCHOOL_LABELS[full.school] || full.school || '') : '';

  let dmgFormula = null;
  const knownDie = _normalizeDiceFormula(known?.die || '');
  const knownDieMatch = knownDie.match(/^(\d+)d(\d+)$/i);
  if (known && knownDieMatch) {
    dmgFormula = `${cantripDice(lv) * parseInt(knownDieMatch[1])}d${knownDieMatch[2]}`;
  } else {
    const base = _extractFirstDamageFormulaFromEntries(entries);
    if (base) dmgFormula = _scaleCantripFormula(base, lv);
  }
  // dmgBonusPerBeam: set by cantrip data modifier (e.g. Agonizing Blast → 'cha')
  if (known?.dmgBonusPerBeam && dmgFormula) {
    const bonus = cantripDice(lv) * getMod(getFinal(known.dmgBonusPerBeam));
    dmgFormula += bonus >= 0 ? `+${bonus}` : `${bonus}`;
  }
  const dmgLabel = dmgFormula ? `${dmgFormula} ${dmgType}`.trim() : 'Damage ?';
  const icon = known?.icon || 'sparkles';
  const badgeType  = toHit ? 'atk' : hasSave ? 'save' : 'util';
  const badgeLabel = toHit ? 'ATK' : hasSave ? 'SAV' : 'UTIL';
  const hitStr = toHit ? fbonus(atkBonus) : hasSave ? `CD ${saveDC}` : '';
  const notes = known?.notes || '';
  const lv5note = dmgFormula ? 'x5/11/17' : '';

  return `<div class="action-card" id="${id}">
    <div class="action-card-hdr">
      <span class="action-card-icon">${luci(icon)}</span>
      <div style="flex:1;min-width:0">
        <div class="action-card-name">${esc(name)}<span class="sub">Cantrip | ${esc(dmgType || school || 'utility')} | ${esc(range)}</span></div>
      </div>
      <div class="action-card-tags"><span class="action-tag ${badgeType}">${badgeLabel}</span></div>
      ${hitStr ? `<div class="action-stat">${hitStr}</div>` : ''}
    </div>
    <div class="action-card-bar">
      ${toHit ? `<button class="roll-btn" onclick="rollD20(${atkBonus},'Attack: ${safeName}')">${luci('dice-5')} Attack ${fbonus(atkBonus)}</button>` : ''}
      ${dmgFormula
        ? `<button class="roll-btn dmg" onclick="rollDamage('${_jsEsc(dmgFormula)}','Damage: ${safeName}')">${luci('flame')} ${esc(dmgLabel)}</button>`
        : ''}
      ${hasSave ? `<div class="action-dmg-pill">${luci('dice-5')} Save DC: <b>${saveDC}</b></div>` : ''}
      <div class="action-dmg-pill">${luci('ruler')} <b>${esc(range)}</b></div>
      ${lv5note ? `<div class="action-dmg-pill">${luci('trending-up')} ${lv5note}</div>` : ''}
      ${notes ? `<div class="action-dmg-pill" style="color:var(--text3)">${esc(notes)}</div>` : ''}
    </div>
  </div>`;
}

function buildSpellActionCard(name) {
  const snap = (C?.spellSnapshots || []).find(s =>
    String(s?.name || '').toLowerCase() === name.toLowerCase()
  );
  const full = Array.isArray(sheetSpellDb)
    ? sheetSpellDb.find(s => String(s?.name || '').toLowerCase() === name.toLowerCase())
    : null;
  if (!full && !snap) return '';

  const entries  = snap?.entries || full?.entries || [];
  const spellLevel = Number(snap?.level ?? full?.level ?? 0);
  const school   = SCHOOL_LABELS[snap?.school || full?.school || ''] || '';
  const spellMod = getSpellMod();
  const pb       = getPB();
  const spellAtk = spellMod + pb;
  const saveDC   = 8 + pb + spellMod;
  const hasAttack = !!(full?.spellAttack?.length);
  const hasSave   = !!(full?.savingThrow?.length);
  const dmgFormula = _extractFirstDamageFormulaFromEntries(entries);
  const range = full?.range?.distance?.amount != null
    ? `${full.range.distance.amount} ${full.range.distance.type || ''}`.trim()
    : (full?.range?.type || snap?.range?.type || '');
  const castTime  = full?.time?.[0] || snap?.time?.[0];
  const castUnit  = castTime?.unit || 'action';
  const isConc    = snap?.concentration ?? full?.concentration;
  const levelLabel = ['Cantrip','1st','2nd','3rd','4th','5th','6th','7th','8th','9th'][spellLevel] || `${spellLevel}th`;
  const tagCls   = {action:'util', bonus:'bonus', reaction:'react'}[castUnit] || 'util';
  const catLabel  = {action:'ACTION', bonus:'BONUS', reaction:'REACT.'}[castUnit] || 'ACTION';
  const atkTag   = hasAttack ? 'atk' : 'save';
  const atkLabel  = hasAttack ? 'ATK' : 'SAV';
  const safeName = _jsEsc(name);
  const id = 'ac_' + Math.random().toString(36).slice(2);

  return `<div class="action-card" id="${id}">
    <div class="action-card-hdr">
      <div style="flex:1;min-width:0">
        <div class="action-card-name">${esc(name)}<span class="sub">${esc(levelLabel)} | ${esc(school)}${range ? ' | ' + esc(range) : ''}</span></div>
      </div>
      <div class="action-card-tags">
        <span class="action-tag ${atkTag}">${atkLabel}</span>
        <span class="action-tag ${tagCls}">${catLabel}</span>
        ${isConc ? `<span class="action-tag util">C</span>` : ''}
      </div>
      ${hasAttack ? `<div class="action-stat">${fbonus(spellAtk)}</div>` : `<div class="action-stat">CD ${saveDC}</div>`}
    </div>
    <div class="action-card-bar">
      ${hasAttack ? `<button class="roll-btn" onclick="rollD20(${spellAtk},'ATK: ${safeName}')">${luci('dice-5')} Attack ${fbonus(spellAtk)}</button>` : ''}
      ${dmgFormula ? `<button class="roll-btn dmg" onclick="rollDamage('${_jsEsc(dmgFormula)}','${safeName}')">${luci('flame')} ${esc(dmgFormula)}</button>` : ''}
      ${hasSave ? `<div class="action-dmg-pill">${luci('dice-5')} CD: <b>${saveDC}</b></div>` : ''}
      ${range ? `<div class="action-dmg-pill">${luci('ruler')} <b>${esc(range)}</b></div>` : ''}
      <div class="action-dmg-pill">${luci('sparkles')} Lv.${spellLevel}</div>
    </div>
  </div>`;
}

function _stripSheetTags(text){
  return String(text||'')
    .replace(/\{@\w+[^}]*\|([^|{}]+)\}/g,'$1')
    .replace(/\{@\w+\s+([^}]+)\}/g,'$1')
    .replace(/\{@\w+\}/g,'');
}

function buildClassActionCard(a){
  const catLabel={action:'ACTION',bonus:'BONUS',reaction:'REACT.',react:'REACT.',attack:'ATK'};
  const tagCls={action:'util',bonus:'bonus',reaction:'react',react:'react',attack:'atk'};
  const id='ac_'+Math.random().toString(36).slice(2);

  const _ctx = C || {};
  const _name = typeof a.name === 'function' ? a.name(_ctx) : a.name;
  const _uses = typeof a.uses === 'function' ? a.uses(_ctx) : a.uses;
  const _desc = typeof a.desc === 'function' ? a.desc(_ctx) : (a.desc || '');
  const _nameHtml = a.nameHtml || null;

  // Build resource + adapter-driven roll controls
  const resInline = buildResourceBlockInline(a);
  const inlinePills = _buildActionInlinePills(a);
  const genericRollRow = _buildGenericActionRollButtons(a);
  const barHtml = (resInline || inlinePills || genericRollRow) ? (resInline + inlinePills + genericRollRow) : '';

  let _extra = '';
  if (typeof a.extraBodyHtml === 'function') {
    try { _extra = String(a.extraBodyHtml(_ctx) || ''); } catch(_) { _extra = ''; }
  }

  return `<div class="action-card" id="${id}">
    <div class="action-card-hdr" onclick="toggleCard('${id}')">
      <span class="action-card-icon">${a.icon?luci(a.icon):''}</span>
      <div style="flex:1;min-width:0">
        <div class="action-card-name">${_nameHtml||esc(_name)}${_uses?`<span class="sub">${esc(_uses)}</span>`:''}</div>
      </div>
      <div class="action-card-tags">
        <span class="action-tag ${tagCls[a.cat]||'util'}">${catLabel[a.cat]||'ACTION'}</span>
        <span class="action-tag cls">${a._cls ? esc(a._cls).toUpperCase() : 'CLASS'}</span>
      </div>
    </div>
    ${barHtml ? `<div class="action-card-bar">${barHtml}</div>` : ''}
    <div class="action-card-body">
      <div class="action-desc">${esc(_stripSheetTags(_desc))}</div>
      ${_extra}
    </div>
  </div>`;
}

function buildUnarmedCard(opt){
  const strMod=getMod(getFinal('str')), dexMod=getMod(getFinal('dex')), pb=getPB();
  const inv = _resolvedInventory();
  const equippedArmor  = inv.find(i => i.equipped && ['LA','MA','HA'].includes(i.type));
  const equippedShield = inv.find(i => i.equipped && i.type === 'S');
  const rt = _sheetFindUnarmedStrikeRule(equippedArmor, equippedShield);
  const rtRule = rt?.rule || null;
  let atkAbility = strMod;
  if (rtRule?.attackAbility) {
    const ab = String(rtRule.attackAbility || '').toLowerCase();
    atkAbility = getMod(getFinal(ab));
  }
  const unarmedAttackAbility = rtRule?.attackAbility ? String(rtRule.attackAbility || 'str').toLowerCase() : 'str';
  const unarmedDis = _sheetHasNonProficientArmor() && (unarmedAttackAbility === 'str' || unarmedAttackAbility === 'dex');
  const unarmedAdvArg = unarmedDis ? ',false' : '';

  let specialDmgFormula = '';
  let specialDmgLabel = '';
  let specialBadge = '';
  if (rtRule?.damage && typeof rtRule.damage === 'object') {
    const dmgCfg = rtRule.damage;
    if (dmgCfg.kind === 'featureDie') {
      const clsName = String(dmgCfg.className || rt?.entity?.className || '');
      const clsLv = _getClassLevelByName(clsName);
      const faces = _sheetFeatureDieFaces(clsName, String(dmgCfg.feature || ''), clsLv);
      const modAb = String(dmgCfg.ability || 'str').toLowerCase();
      const mod = getMod(getFinal(modAb));
      if (Number.isFinite(faces) && faces > 0) {
        specialDmgFormula = `1d${faces}${mod>=0?'+':''}${mod}`;
        specialDmgLabel = String(dmgCfg.label || 'Unarmed Damage');
      }
    } else if (typeof dmgCfg.formula === 'string') {
      specialDmgFormula = String(dmgCfg.formula || '').trim();
      specialDmgLabel = String(dmgCfg.label || 'Unarmed Damage');
    }
    if (rtRule.badge) specialBadge = String(rtRule.badge || '');
  }
  const id='ac_'+Math.random().toString(36).slice(2);
  const isGrSh=opt.name==='Grapple'||opt.name==='Shove';
  const dc=8+pb+strMod;
  const tag=opt.cat==='attack'?'atk':'util';
  const catLbl=opt.cat==='attack'?'ATK':'ACTION';
  const stat=opt.cat==='attack'?fbonus(atkAbility+pb):isGrSh?`DC ${dc}`:null;
  let barContent='';
  if(opt.cat==='attack'){
    const normalDmg = Math.max(1,1+strMod);
    barContent=`
      <button class="roll-btn" onclick="rollD20(${atkAbility+pb},'Unarmed Strike'${unarmedAdvArg})">${luci('dice-5')} Hits ${fbonus(atkAbility+pb)}</button>
      ${specialDmgFormula
        ? `<button class="roll-btn dmg" onclick="rollDamage('${_jsEsc(specialDmgFormula)}','${_jsEsc(specialDmgLabel)}')">${luci('sword')} ${specialDmgFormula} bludg.</button>`
        : `<button class="roll-btn dmg" onclick="showDiceToast('Damage',[], ${normalDmg},${normalDmg},'1 + STR')">${luci('sword')} ${normalDmg} bludg.</button>`
      }
      <div class="action-dmg-pill">${luci('ruler')} 5 ft</div>
      ${unarmedDis ? `<div class="action-dmg-pill" style="color:var(--red)">${luci('triangle-alert')} DIS</div>` : ''}
      ${specialBadge ? `<div class="action-dmg-pill">${luci('music')} ${esc(specialBadge)}</div>` : ''}`;
  } else if(isGrSh){
    barContent=`
      <div class="action-dmg-pill">STR or DEX save · DC <b>${dc}</b></div>
      <div class="action-dmg-pill">${luci('ruler')} 5 ft (reach)</div>`;
  }
  const grShExtra = opt.name === 'Unarmed Strike' ? `
    <div style="margin-top:.6rem;border-top:1px solid var(--bdr2);padding-top:.5rem;display:flex;flex-direction:column;gap:.35rem">
      <div style="font-size:var(--fs-label);color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em">Replace an attack with:</div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center">
        <span style="font-weight:600;font-size:var(--fs-body)">${luci('users-round')} Grapple</span>
        <span class="action-dmg-pill">STR or DEX save · DC <b>${dc}</b></span>
        <span style="font-size:var(--fs-label);color:var(--text3)">${esc(UNARMED_OPTIONS[1].desc)}</span>
      </div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center">
        <span style="font-weight:600;font-size:var(--fs-body)">${luci('arrow-right')} Shove</span>
        <span class="action-dmg-pill">STR or DEX save · DC <b>${dc}</b></span>
        <span style="font-size:var(--fs-label);color:var(--text3)">${esc(UNARMED_OPTIONS[2].desc)}</span>
      </div>
    </div>` : '';
  return `<div class="action-card" id="${id}">
    <div class="action-card-hdr" onclick="toggleCard('${id}')">
      <span class="action-card-icon">${luci(opt.icon)}</span>
      <div style="flex:1;min-width:0"><div class="action-card-name">${esc(opt.name)}</div></div>
      <div class="action-card-tags"><span class="action-tag ${tag}">${catLbl}</span></div>
      ${stat!==null?`<div class="action-stat">${stat}</div>`:''}
    </div>
    ${barContent?`<div class="action-card-bar">${barContent}</div>`:''}
    <div class="action-card-body">
      <div class="action-desc">${esc(opt.desc)}</div>
      ${grShExtra}
    </div>
  </div>`;
}

function buildStdActionCard(a){
  const tagCls={action:'util',bonus:'bonus',reaction:'react',react:'react'};
  const catLbl=a.cat==='bonus'?'BONUS':a.cat==='reaction'||a.cat==='react'?'REACT.':'ACTION';
  const id='ac_'+Math.random().toString(36).slice(2);
  return `<div class="action-card" id="${id}">
    <div class="action-card-hdr" onclick="toggleCard('${id}')">
      <span class="action-card-icon">${a.icon?luci(a.icon):''}</span>
      <div style="flex:1;min-width:0"><div class="action-card-name">${esc(a.name)}</div></div>
      <div class="action-card-tags"><span class="action-tag ${tagCls[a.cat]||'util'}">${catLbl}</span></div>
    </div>
    <div class="action-card-body">
      <div class="action-desc">${esc(a.desc)}</div>
    </div>
  </div>`;
}

// Inline resource block (for inside action-info-row)
function buildResourceBlockInline(actionRef){
  const defs=getAllResDefs();
  const res=defs.find(r=>_resourceMatchesAction(r, actionRef));
  if(!res) return '';
  const max=getResMax(res);
  if(max===0) return '';
  const rk = _getResStateKey(res);
  const cur=charResources[rk]??max;
  const rechargeLabel=_getResourceRechargeLabel(res);
  if(res.pool){
    return `<div class="res-inline">
      <span class="res-inline-label">${esc(res.name)}</span>
      <button class="res-badge" onclick="event.stopPropagation();spendResource('${rk}',1)">−</button>
      <span style="font-family:var(--ff-display);font-size:var(--fs-body-lg);font-weight:700;color:var(--gold2)">${cur}</span>
      <span style="font-size:var(--fs-label);color:var(--text3)">/${max}</span>
      <button class="res-badge" onclick="event.stopPropagation();charResources['${rk}']=Math.min(${max},(charResources['${rk}']||0)+1);saveResources();renderActionsTab()">+</button>
      <span class="res-recharge">${rechargeLabel}</span>
    </div>`;
  } else {
    let pipsHtml='';
    for(let i=0;i<max;i++){
      pipsHtml+=`<div class="res-pip${i<max-cur?' used':''}" onclick="event.stopPropagation();setResourcePip('${rk}',${i},${max})" title="${i<max-cur?'Used':'Available'}"></div>`;
    }
    return `<div class="res-inline">
      <span class="res-inline-label">${esc(res.name)}</span>
      <div class="res-pip-group" data-key="${rk}" data-max="${max}">${pipsHtml}</div>
      <span class="res-recharge">${rechargeLabel}</span>
    </div>`;
  }
}


/* ═════════════════════ SPELL PICKER (sheet-side) ═════════════════════ */

let sheetSpellDb = null;
let _sheetClassSpellSets = null; // className_lc → Set<spellKey_lc> (no special chars)
let _sheetSubclassSpellSets = null; // "className_lc|subclassName_lc" → Set<spellKey_lc>
let _splFilter = { level: 0, classIdx: 0 };
const _SPL_BASE = 'https://raw.githubusercontent.com/5etools-mirror-3/5etools-src/main/data/';
const _SPL_FILES = ['spells/spells-xphb.json','spells/spells-fraif.json','spells/spells-frhof.json','spells/spells-efa.json'];
const _SPL_ALLOWED = new Set(['XPHB','FRAiF','FRHoF','EFA']);

function _normSpellKey(n){ return String(n||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

async function _loadSheetSpells(){
  if(sheetSpellDb) return;
  sheetSpellDb = [];
  _sheetClassSpellSets = {};
  _sheetSubclassSpellSets = {};

  // Load class→spell lookup from CDN
  try {
    const lr = await fetch(BASE_URL + 'generated/gendata-spell-source-lookup.json');
    if(lr.ok){
      const lookup = await lr.json();
      for(const spellsBySrc of Object.values(lookup)){
        for(const [spellLc, data] of Object.entries(spellsBySrc)){
          // class entries: data.class[src][ClassName] = true
          const normKey = _normSpellKey(spellLc);
          if(data.class && typeof data.class === 'object'){
            for(const classMap of Object.values(data.class)){
              for(const className of Object.keys(classMap)){
                const lc = className.toLowerCase();
                if(!_sheetClassSpellSets[lc]) _sheetClassSpellSets[lc] = new Set();
                _sheetClassSpellSets[lc].add(normKey);
              }
            }
          }
          // subclass entries: data.subclass[src][className][src][subclassName]
          if(data.subclass && typeof data.subclass === 'object'){
            for(const subSrcMap of Object.values(data.subclass)){
              for(const [className, subclassMap] of Object.entries(subSrcMap)){
                const classLc = className.toLowerCase();
                for(const subclassSrcMap of Object.values(subclassMap)){
                  for(const subclassName of Object.keys(subclassSrcMap)){
                    const key = `${classLc}|${subclassName.toLowerCase()}`;
                    if(!_sheetSubclassSpellSets[key]) _sheetSubclassSpellSets[key] = new Set();
                    _sheetSubclassSpellSets[key].add(normKey);
                  }
                }
              }
            }
          }
        }
      }
    }
  } catch(e){ console.warn('[sheet] spell lookup failed:', e); }

  // Load spell data
  for(const f of _SPL_FILES){
    try{
      const r = await fetch(_SPL_BASE+f);
      if(!r.ok) continue;
      const d = await r.json();
      (d.spell||[]).forEach(s=>{
        if(_SPL_ALLOWED.has(s.source) && !sheetSpellDb.find(x=>x.name===s.name))
          sheetSpellDb.push(typeof adaptSpellRecord === 'function' ? adaptSpellRecord(s) : s);
      });
    } catch(e){}
  }
}

// Returns ordered list of caster classes for the picker [{clsName,scName,clsSnap,lv,isPrimary,ec,prog}]
function _getCasterClasses(){
  if(!C) return [];
  const out = [];
  const tryAdd = (clsName, scName, clsSnap, lv, isPrimary, ec) => {
    if(!clsName) return;
    const profile = _sheetSpellcastingProfile(clsName, scName || '', clsSnap || {});
    const prog = _sheetCasterProgression(profile?.casterProgression || clsSnap?.casterProgression);
    if(!prog) return;
    out.push({ clsName, scName: scName||'', clsSnap: clsSnap||{}, lv, isPrimary, ec, prog });
  };
  tryAdd(C.className, C.subclassShortName, C.clsSnapshot, C.classLevel||C.level||1, true, null);
  (C.extraClasses||[]).forEach(ec => tryAdd(ec.name, ec.subclassShortName, ec.clsSnapshot, ec.level||1, false, ec));
  return out;
}

function _clsMaxCastLevel(cls){ return getMaxCastableLevel(cls.prog, cls.lv); }

// Per-class spell/cantrip limit for picker
function _clsSpellLimit(cls, isCantrip){
  const p = getSpellcastingProfile(cls.clsName, cls.scName, cls.clsSnap);
  if(!p.casterProgression) return { max: null, current: 0 };
  let m = null;
  if(isCantrip){
    // Mirror charbuilder priority: fixed progression table → runtime config
    m = cls.clsSnap?.cantripProgression?.[cls.lv-1] ?? p.cantripKnown?.[cls.lv-1] ?? null;
  } else {
    // Priority: snapshot table → runtime-config table → spellsKnown → preparedFormula
    m = cls.clsSnap?.preparedSpellsProgression?.[cls.lv-1] ||
        p.preparedSpellsProgression?.[cls.lv-1] ||
        null;
    if(!m){
      if(Array.isArray(p.spellsKnown)) m = p.spellsKnown[cls.lv-1]??null;
      else if(p.preparedFormula){
        const ab = String(p.preparedFormula.ability||'').toLowerCase();
        if(typeof STATS!=='undefined'&&STATS.includes(ab))
          m = applyPreparedFormula(p.preparedFormula, getMod(getFinal(ab)), cls.lv);
      }
    }
  }
  const bucket = cls.isPrimary ? C : cls.ec;
  const current = isCantrip
    ? (bucket?.selectedCantrips||[]).length
    : Object.values(bucket?.selectedSpells||{}).flat().length;
  return { max: m, current };
}

function _buildPickerClassTabs(){
  const el = document.getElementById('spl-class-tabs');
  if(!el) return;
  const casters = _getCasterClasses();
  if(casters.length <= 1){ el.innerHTML=''; return; }
  el.innerHTML = casters.map((c,i)=>
    `<button class="af-btn${_splFilter.classIdx===i?' on':''}"
      onclick="setPickerClass(${i})" style="font-size:var(--fs-label);padding:3px 8px">${c.clsName}</button>`
  ).join('');
}

function setPickerClass(idx){
  _splFilter.classIdx = idx;
  _splFilter.level = 0;
  _buildPickerClassTabs();
  _buildPickerTabs();
  _renderPickerList();
}

function _buildPickerTabs(){
  const el = document.getElementById('spl-tabs');
  if(!el) return;
  const casters = _getCasterClasses();
  const cls = casters[_splFilter.classIdx] || casters[0];
  const bucket = cls ? (cls.isPrimary ? C : cls.ec) : C;
  const maxCast = cls ? _clsMaxCastLevel(cls) : 0;
  const labels = ['Cantrip','1°','2°','3°','4°','5°','6°','7°','8°','9°'];
  el.innerHTML = labels.map((l,i)=>{
    const cnt = i===0 ? (bucket?.selectedCantrips||[]).length : (bucket?.selectedSpells?.[i]||[]).length;
    if(i>0 && i>maxCast && cnt===0) return '';
    const lim = cls ? _clsSpellLimit(cls, i===0) : { max: null, current: cnt };
    // lim.max is always a total budget; show total-used/total-max for clarity
    const badge = lim.max!==null ? ` (${lim.current}/${lim.max})` : '';
    return `<button class="af-btn${_splFilter.level===i?' on':''}"
      onclick="setPickerLevel(${i})" style="font-size:var(--fs-label);padding:3px 8px">${l}${badge}</button>`;
  }).join('');
  const cb = document.getElementById('spl-count');
  if(cb && cls){ const lim=_clsSpellLimit(cls,_splFilter.level===0); cb.textContent=lim.max!==null?`${lim.current}/${lim.max}`:''; }
}

function setPickerLevel(lv){
  _splFilter.level = lv;
  _buildPickerTabs();
  _renderPickerList();
}

async function openSpellPicker(){
  if(_getCasterClasses().length === 0) return;
  _splFilter.classIdx = 0;
  _splFilter.level = 0;
  const m = _getPickerModal();
  m.style.display = 'block';
  _buildPickerClassTabs();
  _buildPickerTabs();
  if(!sheetSpellDb){
    const ld = document.getElementById('spl-loading');
    if(ld) ld.style.display = 'block';
    await _loadSheetSpells();
    if(ld) ld.style.display = 'none';
  }
  _renderPickerList();
}

function closeSpellPicker(){
  const m = document.getElementById('spl-modal');
  if(m) m.style.display = 'none';
}

function _renderPickerList(){
  const el = document.getElementById('spl-list');
  if(!el || !sheetSpellDb) return;
  const q = (document.getElementById('spl-q')?.value||'').toLowerCase().trim();
  const lv = _splFilter.level;
  const casters = _getCasterClasses();
  const cls = casters[_splFilter.classIdx] || casters[0];
  const clsKey = cls?.clsName.toLowerCase();
  const subKey = cls?.scName ? `${clsKey}|${cls.scName.toLowerCase()}` : null;
  const bucket = cls ? (cls.isPrimary ? C : cls.ec) : C;
  const isWizardClass = String(cls?.clsName || '').toLowerCase() === 'wizard' && typeof WizardSpellbookAPI !== 'undefined';
  if(isWizardClass && bucket){
    WizardSpellbookAPI.initWizardSpellbook(bucket, cls?.lv || 1);
    if(typeof WizardSpellbookAPI.syncSpellbookFromPrepared === 'function') WizardSpellbookAPI.syncSpellbookFromPrepared(bucket);
  }
  const _hasLookup = _sheetClassSpellSets && Object.keys(_sheetClassSpellSets).length > 0;
  let list = sheetSpellDb.filter(s => {
    if(s.level !== lv) return false;
    if(!_hasLookup || !clsKey) return true;
    const sk = _normSpellKey(s.name);
    return _sheetClassSpellSets[clsKey]?.has(sk) || (subKey && _sheetSubclassSpellSets[subKey]?.has(sk));
  });
  if(isWizardClass && lv >= 0){
    const knownSb = [...new Set(((bucket?.wizardSpellbook?.[lv]) || []).filter(Boolean))];
    list = knownSb.map(n => sheetSpellDb.find(s => String(s.name||'').toLowerCase()===String(n||'').toLowerCase()) || ({name:n, level:lv, school:''}));
  }
  if(q) list = list.filter(s=>s.name.toLowerCase().includes(q));
  list.sort((a,b)=>a.name.localeCompare(b.name));
  list = list.slice(0,80);
  const knownCantrips = new Set(bucket?.selectedCantrips||[]);
  const knownSpells = new Set(Object.values(bucket?.selectedSpells||{}).flat());
  const lim = cls ? _clsSpellLimit(cls, lv===0) : { max: null, current: 0 };
  const cntEl = document.getElementById('spl-count');
  if(cntEl) cntEl.textContent = lim.max!==null ? `${lim.current}/${lim.max}` : '';
  const atMax = lim.max!==null && lim.current>=lim.max;
  const SCHOOL_SHORT={A:'Abiu',C:'Amm',D:'Div',E:'Evo',I:'Ill',N:'Nec',T:'Tras',V:'Vegg'};
  let wizardHdr = '';
  if(isWizardClass){
    const sbCount = typeof WizardSpellbookAPI.getTotalSpellbookSize === 'function'
      ? WizardSpellbookAPI.getTotalSpellbookSize(bucket)
      : Object.values(bucket?.wizardSpellbook||{}).flat().filter(Boolean).length;
    const maxLearn = cls ? _clsMaxCastLevel(cls) : 0;
    const ecIdx = cls?.isPrimary ? -1 : (C.extraClasses||[]).indexOf(cls?.ec);
    const targetKey = cls?.isPrimary ? 'primary' : (ecIdx >= 0 ? `ec:${ecIdx}` : 'primary');
    const btn = (typeof openWizardSpellbookManager === 'function' && (cls?.isPrimary || ecIdx >= 0))
      ? `<button class="chip" style="margin-left:auto;background:var(--bg3);border:1px solid var(--bdr2);color:var(--gold2);border-radius:999px;padding:4px 12px;cursor:pointer;font-size:var(--fs-label);letter-spacing:.07em" onclick="openWizardSpellbookManager('',0,'${targetKey}')">${luci('book-open')} Spellbook Wizard</button>`
      : '';
    wizardHdr = `<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.55rem">
      <span style="font-size:var(--fs-label);color:var(--text3)">Spellbook: <b style="color:var(--blue)">${sbCount}</b></span>
      <span style="font-size:var(--fs-label);color:var(--text3)">Prepared cap: <b style="color:var(--gold2)">${lim.max ?? 0}</b></span>
      <span style="font-size:var(--fs-label);color:var(--text3)">Max learnable level: <b style="color:var(--gold2)">${maxLearn}</b></span>
      ${btn}
    </div>`;
  }
  const rowsHtml = list.map(s=>{
    const on = lv===0 ? knownCantrips.has(s.name) : knownSpells.has(s.name);
    const blocked = !on && atMax;
    const safeName = s.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const _pSlug = s.name.toLowerCase().replace(/'/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const _pSrc  = (s.source||'xphb').toLowerCase();
    return `<div class="spl-row${on?' on':''}${blocked?' blocked':''}"
      onclick="${blocked?'':'toggleSheetSpell(\''+safeName+'\','+s.level+')'}">
      <span class="spl-name"><a href="https://5e.tools/spells/${_pSlug}-${_pSrc}.html" target="_blank" onclick="event.stopPropagation()" style="color:inherit;text-decoration:underline dotted;text-underline-offset:2px">${esc(s.name)}</a></span>
      <span class="spl-school">${SCHOOL_SHORT[s.school]||s.school||''}</span>
      ${s.concentration?`<span class="spl-school" style="color:var(--purple)">C</span>`:''}
      ${s.ritual?`<span class="spl-school" style="color:var(--teal)">R</span>`:''}
      ${on?`<span class="spl-check">${luci('check')}</span>`:blocked?`<span class="spl-school">max</span>`:''}
    </div>`;
  }).join('') || '<div class="phmsg">No spells found.</div>';
  el.innerHTML = wizardHdr + rowsHtml;
  refreshIcons();
}

function toggleSheetSpell(name, level){
  if(!C) return;
  const casters = _getCasterClasses();
  const cls = casters[_splFilter.classIdx] || casters[0];
  if(!cls) return;
  const bucket = cls.isPrimary ? C : cls.ec;
  const isWizardClass = String(cls?.clsName || '').toLowerCase() === 'wizard' && typeof WizardSpellbookAPI !== 'undefined';
  if(isWizardClass){
    WizardSpellbookAPI.initWizardSpellbook(bucket, cls?.lv || 1);
  }
  if(level===0){
    if(!bucket.selectedCantrips) bucket.selectedCantrips=[];
    if(isWizardClass){
      const i = bucket.selectedCantrips.indexOf(name);
      if(i>=0){
        bucket.selectedCantrips.splice(i,1);
      } else {
        if(!WizardSpellbookAPI.isInSpellbook(bucket, name, 0)) return;
        const limCan = _clsSpellLimit(cls, true);
        if(Number.isFinite(limCan?.max) && limCan.current >= limCan.max) return;
        bucket.selectedCantrips.push(name);
      }
    } else {
      const i=bucket.selectedCantrips.indexOf(name); if(i>=0)bucket.selectedCantrips.splice(i,1); else bucket.selectedCantrips.push(name);
    }
  } else {
    if(isWizardClass){
      const intMod = getMod(getFinal('int')) || 0;
      const lim = _clsSpellLimit(cls, false);
      const maxPrepared = Number.isFinite(lim?.max) ? lim.max : WizardSpellbookAPI.calcMaxPreparedSpells(cls?.lv||1, intMod);
      const already = !!(bucket.selectedSpells && bucket.selectedSpells[level] && bucket.selectedSpells[level].includes(name));
      if(!already && !WizardSpellbookAPI.isInSpellbook(bucket, name, level)) return;
      const ok = WizardSpellbookAPI.togglePreparedSpell(bucket, name, level, cls?.lv||1, intMod, maxPrepared);
      if(!ok && !already) return;
    } else {
      if(!bucket.selectedSpells) bucket.selectedSpells={};
      if(!bucket.selectedSpells[level]) bucket.selectedSpells[level]=[];
      const i=bucket.selectedSpells[level].indexOf(name); if(i>=0)bucket.selectedSpells[level].splice(i,1); else bucket.selectedSpells[level].push(name);
    }
  }
  // Sync spellSnapshots across all buckets
  const snap = sheetSpellDb?.find(s=>s.name===name);
  if(snap){
    const snaps = C.spellSnapshots||[];
    const si = snaps.findIndex(s=>s.name===name);
    const isKnown = level===0
      ? [...(C.selectedCantrips||[]), ...(C.extraClasses||[]).flatMap(ec=>ec.selectedCantrips||[])].includes(name)
      : [...(C.selectedSpells?.[level]||[]), ...(C.extraClasses||[]).flatMap(ec=>ec.selectedSpells?.[level]||[])].includes(name);
    if(isKnown && si<0){
      snaps.push({name:snap.name,level:snap.level,school:snap.school,source:snap.source,components:snap.components,duration:snap.duration,range:snap.range,ritual:snap.ritual||false,concentration:snap.concentration||false,entries:snap.entries||[],spellAttack:snap.spellAttack||null,damageInflict:snap.damageInflict||null});
    } else if(!isKnown && si>=0){
      snaps.splice(si,1);
    }
    C.spellSnapshots = snaps;
  }
  localStorage.setItem('5e_current_char', JSON.stringify(C));
  _buildPickerClassTabs();
  _buildPickerTabs();
  _renderPickerList();
  renderSpellsTab();
  renderActionsTab();
}

/* ═══════ TORNA AL BUILDER ═══════ */
function goBackToBuilder(e) {
  e.preventDefault();
  const cur = C || JSON.parse(localStorage.getItem('5e_current_char') || 'null');
  if (cur) {
    const existing = JSON.parse(localStorage.getItem('5e_builder_state') || 'null');
    // Only reuse builder-only fields if the stored state matches name+class+level+subclass exactly
    const sameChar = existing &&
      existing.name === cur.name &&
      existing.className === cur.className &&
      existing.classSource === cur.classSource &&
      existing.level === cur.level &&
      (existing.subclassShortName || null) === (cur.subclassShortName || null);
    const state = Object.assign({}, cur, sameChar ? {
      hpMode: existing.hpMode,
      hpManualRolls: existing.hpManualRolls,
      manualScores: existing.manualScores,
      dicePool: existing.dicePool,
      diceAssign: existing.diceAssign,
      equipChoices: existing.equipChoices,
      bgPatternIdx: existing.bgPatternIdx,
    } : {});
    try { state.inventory = JSON.parse(localStorage.getItem('5e_inventory') || JSON.stringify(cur.inventory || [])); } catch(e2){}
    try { state.currency = JSON.parse(localStorage.getItem('5e_currency') || JSON.stringify(cur.currency || {})); } catch(e2){}
    state.xp = parseInt(localStorage.getItem('5e_xp') || cur.xp || 0);
    localStorage.setItem('5e_builder_state', JSON.stringify(state));
  }
  if (window.GB_DOWNLOADED_SHEET_BUILDER_URL) {
    const keys = window.GB_DOWNLOADED_SHEET_KEYS || ['5e_current_char','5e_inventory','5e_currency','5e_xp','5e_hp_current','5e_hp_temp','5e_hp_max_bonus','5e_death_saves','5e_conditions_active','5e_hd_used','5e_slots_used','5e_notes','5e_skill_adv','5e_resources','5e_builder_state','5e_inspiration'];
    const data = {};
    keys.forEach(k => { const v = localStorage.getItem(k); if (v != null) data[k] = v; });
    const payload = { type: 'gb-sheet-import', charId: window.GB_CHAR_ID || 'default', data };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const target = new URL(window.GB_DOWNLOADED_SHEET_BUILDER_URL);
    target.searchParams.set('char', window.GB_CHAR_ID || 'default');
    target.hash = 'gbimport=' + encoded;
    window.name = JSON.stringify(payload);
    window.location.href = target.href;
    return;
  }
  window.location.href = typeof gbScopedHref === 'function' ? gbScopedHref('charbuilder.html') : 'charbuilder.html';
}

/* ═══════ DOWNLOAD SCHEDA ═══════ */
function downloadSheet() {
  try {
    // Bundle all 5e_ keys so the downloaded file is fully self-contained
    const keys = (window.GB_SHEET_KEYS && Array.isArray(window.GB_SHEET_KEYS))
      ? window.GB_SHEET_KEYS.slice()
      : ['5e_current_char','5e_inventory','5e_currency','5e_xp','5e_hp_current','5e_hp_temp','5e_hp_max_bonus','5e_death_saves','5e_conditions_active','5e_hd_used','5e_slots_used','5e_notes','5e_skill_adv','5e_resources','5e_builder_state','5e_inspiration'];
    const data = {};
    keys.forEach(k => { const v = localStorage.getItem(k); if (v != null) data[k] = v; });
    const safeEsc = s => String(s).replace(/</g,'\\u003c').replace(/>/g,'\\u003e').replace(/&/g,'\\u0026');
    const payload = { type: 'gb-sheet-import', version: 1, keys, data };
    // Embed raw payload as JSON script — robust import path
    const payloadTag = '<scr'+'ipt type="application/json" id="gb-sheet-payload">'+safeEsc(JSON.stringify(payload))+'</scr'+'ipt>';
    const safeJson = safeEsc(JSON.stringify(data));
    const knownKeys = safeEsc(JSON.stringify(keys));
    const publicBuilderUrl = 'https://albertopedalino.github.io/GM-Board/charbuilder.html';
    const builderUrl = safeEsc(JSON.stringify(publicBuilderUrl));
    const preload = '<style>.back-btn{display:none!important}</style>'+payloadTag+'<scr'+'ipt>(function(){var d='+safeJson+';var k='+knownKeys+';k.forEach(function(x){localStorage.removeItem(x);});for(var x in d)localStorage.setItem(x,d[x]);window.GB_DOWNLOADED_SHEET=true;window.GB_DOWNLOADED_SHEET_BUILDER_URL='+builderUrl+';window.GB_DOWNLOADED_SHEET_KEYS=k;document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll(".back-btn").forEach(function(el){el.remove();});});})();<'+'/scr'+'ipt>';
    const out = '<!DOCTYPE html>\n' + document.documentElement.outerHTML.replace('</head>', preload + '</head>');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([out], { type: 'text/html' }));
    a.download = (C && C.name ? C.name : 'personaggio').replace(/[^a-z0-9_\-\.]/gi, '_') + '_scheda.html';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } catch(e) {
    showDiceToast('Download', [], 0, 0, 'Errore download: ' + (e?.message || 'sconosciuto'));
  }
}

/* ═══════ INIT ═══════ */
C = loadChar();
renderAll();

// Load spell DB in background so ATK/DMG buttons and picker work immediately
_loadSheetSpells().then(()=>{ if(C) renderSpellsTab(); });
