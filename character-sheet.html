<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Scheda Personaggio — D&D 5e</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script>
    (function () {
      window.GB_SHEET_KEYS = [
        '5e_current_char','5e_inventory','5e_currency','5e_xp','5e_hp_current','5e_hp_temp','5e_hp_max_bonus',
        '5e_death_saves','5e_conditions_active','5e_hd_used','5e_slots_used','5e_notes','5e_skill_adv',
        '5e_resources','5e_builder_state','5e_inspiration'
      ];
      const scopedKeys = new Set(window.GB_SHEET_KEYS);
      const rawGet = Storage.prototype.getItem;
      const rawSet = Storage.prototype.setItem;
      const rawRemove = Storage.prototype.removeItem;
      const params = new URLSearchParams(location.search);
      const clean = v => String(v || '').toLowerCase().replace(/[^a-z0-9_-]/g, '').slice(0, 48);
      let id = clean(params.get('char'));
      if (id === 'new') {
        id = `pc_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
        history.replaceState(null, '', `${location.pathname}?char=${encodeURIComponent(id)}`);
      }
      if (!id) id = clean(rawGet.call(localStorage, 'gb_active_char_id')) || 'default';
      rawSet.call(localStorage, 'gb_active_char_id', id);
      window.GB_CHAR_ID = id;
      window.gbScopedHref = page => `${page}?char=${encodeURIComponent(id)}`;
      window.gbRegisterCharScope = function (label) {
        const raw = rawGet.call(localStorage, 'gb_char_registry') || '[]';
        let list = [];
        try { list = JSON.parse(raw); } catch (_) {}
        const now = Date.now();
        const name = String(label || '').trim() || id;
        list = [{ id, name, updatedAt: now }, ...list.filter(x => x && x.id !== id)].slice(0, 20);
        rawSet.call(localStorage, 'gb_char_registry', JSON.stringify(list));
      };
      const prefix = `gb:char:${id}:`;
      const scoped = key => scopedKeys.has(String(key || '')) ? prefix + key : key;
      Storage.prototype.getItem = function (key) { return rawGet.call(this, scoped(key)); };
      Storage.prototype.setItem = function (key, val) { return rawSet.call(this, scoped(key), val); };
      Storage.prototype.removeItem = function (key) { return rawRemove.call(this, scoped(key)); };
    })();
  </script>
  <style>
    :root {
      --ff-body: 'EB Garamond', Georgia, serif;
      --ff-display: 'Cinzel', Georgia, serif;
      --fs-base: 15px;
      --fs-tiny: 7px;
      --fs-micro: 8px;
      --fs-xs: 9px;
      --bg: #12100e;
      --bg2: #1a1713;
      --bg3: #23201a;
      --bg4: #2e2a22;
      --bg5: #3a342a;
      --bdr: rgba(199, 167, 99, .2);
      --bdr2: rgba(199, 167, 99, .42);
      --bdr3: rgba(199, 167, 99, .68);
      --gold: #caa550;
      --gold2: #edd48a;
      --gold3: #f7e8bf;
      --gdim: rgba(202, 165, 80, .14);
      --red: #c54a3f;
      --red2: #de5e52;
      --redbg: rgba(222, 94, 82, .14);
      --green: #3fa66c;
      --gbg: rgba(63, 166, 108, .14);
      --blue: #4d95d6;
      --bluebg: rgba(77, 149, 214, .14);
      --purple: #9d7fb8;
      --pbg: rgba(157, 127, 184, .16);
      --teal: #2ca797;
      --tbg: rgba(44, 167, 151, .14);
      --orange: #d58a3d;
      --obg: rgba(213, 138, 61, .14);
      --text: #efe6d4;
      --text2: #c4b393;
      --text3: #8f7a57;
      --r: 9px;
      --rl: 14px;
      --fs-label: 10px;
      --fs-meta: 11px;
      --fs-body: 12px;
      --fs-body-lg: 13px;
      --fs-ui-lg: 14px;
      --fs-ui-xl: 16px;
      --fs-ui-xxl: 20px;
      --fs-value-sm: 18px;
      --fs-value-md: 22px;
      --fs-value-xl: 24px;
      --fs-value-lg: 28px;
      --fs-dice: 38px;
      --lh-body: 1.58;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      font-size: var(--fs-base);
      min-height: 100vh;
      line-height: var(--lh-body);
      letter-spacing: .01em;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content:'';position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse at 18% 12%, rgba(202, 165, 80, .09) 0%, transparent 54%),
        radial-gradient(ellipse at 82% 88%, rgba(213, 138, 61, .05) 0%, transparent 54%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 1px;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      background: var(--bg2);
      border-bottom: 2px solid var(--bdr2);
      padding: .6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.5);
    }
    .char-avatar {
      width: 52px;height:52px;border-radius:50%;
      border: 2px solid var(--bdr2);
      background: var(--bg4);
      display:flex;align-items:center;justify-content:center;
      font-size:var(--fs-value-md);flex-shrink:0;
    }
    .char-identity { flex:1;min-width:0 }
    .char-name {
      font-family:var(--ff-display);font-size:var(--fs-value-sm);font-weight:700;
      color:var(--gold2);letter-spacing:.04em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .char-meta { font-size:var(--fs-body);color:var(--text2);margin-top:1px }

    .xp-block { display:flex;flex-direction:column;align-items:center;gap:3px;min-width:120px }
    .xp-bar-wrap {
      width:100%;height:6px;background:var(--bg4);
      border-radius:3px;border:1px solid var(--bdr);overflow:hidden;
    }
    .xp-bar-fill { height:100%;background:var(--gold);border-radius:3px;transition:width .4s }
    .xp-label { font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.1em;color:var(--text3) }
    #hd-label { font-size: var(--fs-meta); color: var(--text3); }

    .rest-btn {
      padding: 6px 13px;border:1px solid;border-radius:var(--r);
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .12s;
    }
    .rest-btn.short { border-color:var(--orange);color:var(--orange);background:var(--obg) }
    .rest-btn.short:hover { background:rgba(230,126,34,.2) }
    .rest-btn.long  { border-color:var(--blue);color:var(--blue);background:var(--bluebg) }
    .rest-btn.long:hover  { background:rgba(52,152,219,.2) }

    .back-btn {
      padding: 6px 12px;border:1px solid var(--bdr2);border-radius:var(--r);
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--text2);background:transparent;
      transition:all .12s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
    }
    .back-btn:hover { border-color:var(--gold);color:var(--gold) }

    /* ─── ABILITY SCORES ROW ─── */
    .scores-row {
      display:flex;align-items:stretch;gap:.6rem;
      padding:.55rem 1.1rem;background:var(--bg3);border-bottom:1px solid var(--bdr);
      flex-wrap:wrap;
    }
    .scores-left {
      display:grid;
      grid-template-columns:repeat(8,minmax(62px,1fr));
      gap:.6rem;
      flex:1 1 520px;
      min-width:0;
    }
    .score-box {
      background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r);
      display:flex;flex-direction:column;align-items:center;padding:.4rem .25rem;
      position:relative;transition:border-color .15s;
    }
    .score-box:hover { border-color:var(--gold) }
    .score-lbl {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:2px;
    }
    .score-mod {
      font-family:var(--ff-display);font-size:var(--fs-value-xl);font-weight:700;
      color:var(--gold2);line-height:1;
    }
    .score-base {
      font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      color:var(--text2);
      background:var(--bg3);border:1px solid var(--bdr);border-radius:50%;
      width:24px;height:24px;display:flex;align-items:center;justify-content:center;
      margin-top:4px;
    }

    /* ─── STATS ROW ─── */
    .stats-row { display:none; }
    .stat-box {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:.42rem .68rem;text-align:center;min-width:64px;
    }
    .stat-box-val {
      font-family:var(--ff-display);font-size:var(--fs-ui-xxl);font-weight:700;color:var(--gold2);line-height:1;
    }
    .stat-box-lbl {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:4px;
    }
    .stat-box.green .stat-box-val { color:var(--green) }
    .stat-box.blue  .stat-box-val { color:var(--blue)  }
    .stat-box.red   .stat-box-val { color:var(--red2)  }
    .stat-box.teal  .stat-box-val { color:var(--teal)  }

    /* HP section */
    .hp-block {
      flex:0 1 260px;min-width:220px;max-width:300px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:.3rem .45rem;
    }
    .hp-title {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:.2rem;
    }
    .hp-controls { display:flex;align-items:center;gap:.3rem }
    .hp-btn {
      width:24px;height:24px;padding:0;border-radius:var(--r);font-family:var(--ff-display);font-size:var(--fs-label);
      font-weight:600;cursor:pointer;border:1px solid;letter-spacing:.06em;
      display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .hp-btn.heal { border-color:var(--green);color:var(--green);background:var(--gbg) }
    .hp-btn.dmg  { border-color:var(--red2); color:var(--red2); background:var(--redbg) }
    .hp-vals { display:flex;align-items:baseline;gap:.3rem;flex:1;justify-content:center;white-space:nowrap }
    .hp-cur {
      font-family:var(--ff-display);font-size:var(--fs-value-xl);font-weight:700;color:var(--green);line-height:1;
    }
    .hp-sep { font-family:var(--ff-display);font-size:var(--fs-ui-lg);color:var(--text3) }
    .hp-max { font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:600;color:var(--text2) }
    .hp-subline { display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center;margin-top:4px; }
    .hp-mini {
      border:1px solid var(--bdr2);border-radius:var(--r);background:var(--bg2);
      color:var(--text2);font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.06em;
      display:inline-flex;align-items:center;gap:4px;padding:2px 6px;white-space:nowrap;width:100%;
    }
    .hp-mini b { color:var(--gold2);font-weight:700; margin-left:auto; }
    .hp-mini-actions { display:inline-flex;align-items:center;gap:4px; }
    .hp-mini-btn {
      width:18px;height:18px;border:1px solid var(--bdr2);border-radius:4px;
      background:transparent;color:var(--text2);cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;line-height:1;
    }
    .hp-mini-btn:hover { border-color:var(--gold);color:var(--gold2); }
    .hp-mini-btn.temp:hover { border-color:var(--teal);color:var(--teal); }
    .hp-mini-btn.max:hover { border-color:var(--purple);color:var(--purple); }
    .hp-death {
      margin-top:4px;padding-top:4px;border-top:1px dashed var(--bdr);
      display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    }
    .hp-death[hidden] { display:none; }
    .hp-ds-lbl {
      font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.06em;text-transform:uppercase;color:var(--text3);
    }
    .hp-ds-pips { display:flex;align-items:center;gap:3px; }
    .hp-ds-pip {
      width:12px;height:12px;border-radius:50%;border:1px solid var(--bdr2);background:transparent;
    }
    .hp-ds-pip.success.on { background:var(--green);border-color:var(--green); }
    .hp-ds-pip.fail.on { background:var(--red2);border-color:var(--red2); }
    .hp-amount-input {
      width:34px;height:24px;text-align:center;border:1px solid var(--bdr2);border-radius:var(--r);
      background:var(--bg2);color:var(--text2);font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      -moz-appearance:textfield;flex-shrink:0;
    }
    .hp-amount-input::-webkit-outer-spin-button,.hp-amount-input::-webkit-inner-spin-button{-webkit-appearance:none}
    .hp-amount-input:focus{outline:1px solid var(--gold);border-color:var(--gold)}

    /* ─── MAIN GRID ─── */
    .main-grid {
      display:grid;
      grid-template-columns: 200px 210px minmax(0, 1fr);
      gap:.55rem;
      padding:.55rem 1.1rem;
      align-items:start;
      min-height:calc(100vh - 220px);
    }
    @media(max-width:960px){
      :root{
        --fs-base: 16px;
        --fs-tiny: 8px;
        --fs-micro: 9px;
        --fs-xs: 10px;
        --fs-label: 11px;
        --fs-meta: 12px;
        --fs-body: 13px;
        --fs-body-lg: 14px;
        --fs-ui-lg: 15px;
        --fs-ui-xl: 17px;
        --fs-value-sm: 20px;
        --fs-value-md: 24px;
        --fs-value-xl: 26px;
      }
      .topbar {
        padding: .55rem .75rem;
        gap: .55rem;
        flex-wrap: wrap;
      }
      .char-avatar { width:46px;height:46px;font-size:var(--fs-value-sm); }
      .char-meta { font-size:var(--fs-meta); }
      .xp-block {
        order: 10;
        flex: 1 1 100%;
        min-width: 0;
        align-items: stretch;
      }
      .xp-block > div { justify-content: flex-start; }
      .rest-btn, .back-btn { padding: 6px 10px; }
      .scores-row { padding: .5rem .75rem; }
      .main-grid { padding: .5rem .75rem; gap: .5rem; }
      .panel-hdr { padding: .5rem .7rem; }
      .panel-body { padding: .6rem .7rem; }
      .tab-btn {
        padding: .66rem .9rem;
        font-size: var(--fs-meta);
        letter-spacing: .08em;
      }
      .scores-left { grid-template-columns:repeat(4,minmax(62px,1fr)); }
      .main-grid { grid-template-columns:1fr 1fr; }
      .main-col-right { grid-column:1 / -1; }
    }
    @media(max-width:600px){
      html, body { overflow-x:clip; max-width:100%; }
      .topbar { padding: .5rem .6rem; position: static; box-shadow: none; }
      .char-identity { flex: 1 1 100%; order: 2; }
      .rest-btn, .back-btn {
        flex: 1 1 auto;
        justify-content: center;
        text-align: center;
      }
      .scores-row { display:flex; flex-direction:column; padding:.45rem .6rem; gap:.45rem; }
      .scores-left { flex:none; width:100%; gap:.4rem; grid-template-columns:repeat(4,1fr); }
      .score-box { padding:.35rem .2rem; }
      .hp-block { flex:none; width:100%; min-width:0; max-width:none; }
      .main-grid { grid-template-columns:minmax(0,1fr); padding:.45rem .6rem; gap:.45rem; min-height:0; }
      .main-col-left, .main-col-right { min-width:0; }
      .right-top-row { gap:.35rem; flex-wrap:wrap; }
      .circle-stat { width:58px;height:58px; }
      .defenses-block, .conditions-block { min-width:0; flex:1 1 120px; padding:.38rem .55rem; }
      .hp-btn { width:32px; height:32px; }
      .hp-amount-input { width:44px; height:32px; font-size:var(--fs-body); }
      .tab-content { padding:.55rem; }
      .main-col-right { grid-column:1 }
      .af-btn { padding:6px 12px; font-size:var(--fs-label); }
      .tabs-bar { position:sticky; top:0; z-index:90; }
    }

    /* ─── PANELS ─── */
    .panel {
      background:var(--bg2);border:1px solid var(--bdr);
      border-radius:var(--rl);overflow:hidden;margin-bottom:.6rem;
      box-shadow:0 8px 24px rgba(0,0,0,.26);
    }
    .panel-hdr {
      background:var(--bg3);border-bottom:1px solid var(--bdr);
      padding:.48rem .8rem;display:flex;align-items:center;justify-content:space-between;
    }
    .panel-title {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;
      letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    }
    .panel-body { padding:.55rem .8rem }

    /* ─── SAVING THROWS ─── */
    .save-row {
      display:flex;align-items:center;gap:7px;padding:3px 0;
    }
    .save-dot {
      width:10px;height:10px;border-radius:50%;
      border:1px solid var(--bdr2);flex-shrink:0;
      background:transparent;transition:all .1s;
    }
    .save-dot.on { background:var(--gold);border-color:var(--gold) }
    .save-stat {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:600;
      color:var(--text3);letter-spacing:.08em;width:28px;flex-shrink:0;
    }
    .save-bonus {
      font-family:var(--ff-display);font-size:var(--fs-body);font-weight:600;
      color:var(--text);margin-left:auto;
    }

    /* ─── SENSES ─── */
    .sense-row {
      display:flex;align-items:center;justify-content:space-between;
      padding:4px 8px;background:var(--bg3);border:1px solid var(--bdr);
      border-radius:var(--r);margin-bottom:3px;
    }
    .sense-val {
      font-family:var(--ff-display);font-size:var(--fs-ui-lg);font-weight:700;color:var(--gold2);
      flex-shrink:0;
    }
    .sense-lbl { font-size:var(--fs-meta);color:var(--text2) }

    /* ─── PROFICIENCIES ─── */
    .prof-section { margin-bottom:.7rem }
    .prof-section-title {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;
    }
    .prof-text { font-size:var(--fs-body);color:var(--text2);line-height:1.5 }

    /* ─── SKILLS ─── */
    .skills-header {
      display:grid;grid-template-columns:20px 30px 1fr auto;
      gap:4px;padding:0 .9rem .3rem;
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
    }
    .skill-row {
      display:grid;grid-template-columns:20px 30px 1fr auto auto;
      gap:4px;padding:3px .9rem;align-items:center;cursor:pointer;
      transition:background .1s;
    }
    .skill-row:hover { background:var(--bg3) }
    .skill-dot {
      width:9px;height:9px;border-radius:50%;
      border:1px solid var(--bdr2);background:transparent;
    }
    .skill-dot.prof { background:var(--gold);border-color:var(--gold) }
    .skill-dot.exp  { background:var(--teal);border-color:var(--teal) }
    .skill-dot.joat { background:rgba(200,168,75,.35);border-color:var(--gold);border-style:dashed }
    .adv-badge {
      font-size:var(--fs-xs);font-family:var(--ff-display);font-weight:700;letter-spacing:.04em;
      padding:1px 5px;border-radius:3px;flex-shrink:0;
    }
    .adv-badge.adv   { background:rgba(39,174,96,.2);color:var(--green);border:1px solid var(--green) }
    .adv-badge.disadv{ background:rgba(192,57,43,.2);color:var(--red2);border:1px solid var(--red2) }
    .skill-ability {
      font-family:var(--ff-display);font-size:var(--fs-xs);color:var(--text3);
      letter-spacing:.06em;
    }
    .skill-name { font-size:var(--fs-body);color:var(--text2) }
    .skill-bonus {
      font-family:var(--ff-display);font-size:var(--fs-body);font-weight:600;color:var(--text);
      text-align:right;
    }

    /* ─── RIGHT COLUMN ─── */
    .right-top-row {
      display:flex;gap:.45rem;margin-bottom:.5rem;flex-wrap:wrap;
    }
    .circle-stat {
      width:62px;height:62px;border-radius:50%;
      background:var(--bg3);border:2px solid var(--bdr2);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .circle-stat.clickable { cursor:pointer; transition:border-color .12s, transform .08s; }
    .circle-stat.clickable:hover { border-color:var(--gold); }
    .circle-stat.clickable:active { transform:translateY(1px); }
    .circle-stat-val {
      font-family:var(--ff-display);font-size:var(--fs-ui-xxl);font-weight:700;color:var(--gold2);line-height:1;
    }
    .circle-stat-lbl {
      font-family:var(--ff-display);font-size:var(--fs-tiny);font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:2px;
    }
    .defenses-block, .conditions-block {
      flex:1;min-width:140px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:.4rem .62rem;
    }
    .block-title {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;
    }
    .def-text { font-size:var(--fs-body);color:var(--text2) }
    .def-tag {
      display:inline-block;font-size:var(--fs-label);font-family:var(--ff-display);
      padding:2px 7px;border-radius:3px;border:1px solid var(--bdr2);
      color:var(--text2);margin:2px;
    }
    .inspiration-block {
      min-width:90px;max-width:110px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:.4rem .62rem;cursor:pointer;transition:border-color .15s,background .15s;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      user-select:none;
    }
    .inspiration-block:hover { border-color:var(--gold) }
    .inspiration-block.active { border-color:var(--gold);background:var(--gdim);box-shadow:0 0 10px rgba(202,165,80,.2) }
    .insp-star { font-size:20px;line-height:1;transition:all .15s }
    .inspiration-block.active .insp-star { filter:drop-shadow(0 0 6px rgba(202,165,80,.6)) }
    /* Weight bar in inv-stat-row */
    .inv-weight-bar-wrap { width:100%;margin-top:.3rem }
    .inv-weight-track {
      height:6px;background:var(--bg4);border-radius:3px;
      position:relative;overflow:hidden;margin-bottom:2px;
    }
    .inv-weight-fill { position:absolute;top:0;left:0;height:100%;border-radius:3px;transition:width .3s,background .3s }
    .inv-weight-mark { position:absolute;top:0;width:2px;height:100%;background:rgba(0,0,0,.4) }
    .inv-enc-badge {
      display:inline-block;font-size:var(--fs-label);font-family:var(--ff-display);
      font-weight:700;padding:1px 7px;border-radius:3px;
    }

    /* ─── TABS ─── */
    .tabs-bar {
      display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto;background:var(--bg2);
    }
    .tabs-bar::-webkit-scrollbar{height:2px}
    .tabs-bar::-webkit-scrollbar-thumb{background:var(--bdr2)}
    .tab-btn {
      padding:.62rem 1rem;font-family:var(--ff-display);font-size:var(--fs-label);font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
      border:none;background:transparent;cursor:pointer;white-space:nowrap;
      border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;
    }
    .tab-btn:hover { color:var(--text2) }
    .tab-btn.active { color:var(--gold2);border-bottom-color:var(--gold) }
    .tab-content { display:none;padding:.62rem }
    .tab-content.active { display:block }

    /* ─── ACTIONS TAB ─── */
    .action-filters {
      display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.75rem;
    }
    .af-btn {
      padding:4px 10px;border:1px solid var(--bdr);border-radius:999px;
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:600;letter-spacing:.09em;
      background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;
      text-transform:uppercase;
    }
    .af-btn:hover { border-color:var(--bdr2);color:var(--text2) }
    .af-btn.on { background:var(--gdim);border-color:var(--gold);color:var(--gold2) }

    .attacks-table { width:100%;border-collapse:collapse;font-size:var(--fs-body) }
    .attacks-table th {
      font-family:var(--ff-display);font-size:var(--fs-micro);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
      border-bottom:1px solid var(--bdr);padding:4px 6px;text-align:left;
    }
    .attacks-table td {
      padding:6px 6px;border-bottom:1px solid var(--bdr);vertical-align:middle;
      color:var(--text2);
    }
    .attacks-table tr:last-child td { border-bottom:none }
    .attacks-table tr:hover td { background:var(--bg3) }
    .atk-name { color:var(--text);font-weight:600 }
    .atk-sub  { font-size:var(--fs-label);color:var(--text3) }
    .atk-hit  { font-family:var(--ff-display);font-weight:700;
      color:var(--gold2);font-size:var(--fs-ui-lg); }
    .atk-dmg  { font-family:var(--ff-display);color:var(--text);font-size:var(--fs-body) }
    .atk-icon { font-size:var(--fs-ui-lg);margin-right:4px }

    /* ─── SPELLS TAB ─── */
    .spell-level-section { margin-bottom:1rem }
    .spell-level-hdr {
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;
      letter-spacing:.1em;color:var(--blue);text-transform:uppercase;
      border-bottom:1px solid var(--bluebg);padding-bottom:4px;margin-bottom:.4rem;
    }
    .spell-entry {
      display:flex;align-items:center;gap:8px;padding:4px 8px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      margin-bottom:3px;font-size:var(--fs-body-lg);color:var(--text);cursor:pointer;
    }
    .spell-entry-body {
      display:none;font-size:var(--fs-meta);color:var(--text2);line-height:1.5;
      background:var(--bg);border:1px solid var(--bdr);border-top:none;
      border-radius:0 0 var(--r) var(--r);padding:6px 10px;margin-top:-3px;margin-bottom:3px;
    }
    .spell-entry-body.open { display:block }
    .spell-entry .sp-school { font-size:var(--fs-label);color:var(--text3);flex:1;text-align:right }
    .spell-badge {
      font-size:var(--fs-xs);font-family:var(--ff-display);padding:1px 6px;
      border-radius:3px;flex-shrink:0;
    }
    .spell-badge.auto { border:1px solid var(--teal);color:var(--teal);background:var(--tbg) }
    .spell-badge.conc { border:1px solid var(--purple);color:var(--purple);background:var(--pbg) }
    .spell-badge.rit  { border:1px solid var(--green);color:var(--green);background:var(--gbg) }
    .wz-shell {
      margin:.9rem 0 1rem;background:var(--bg2);border:1px solid var(--bdr2);
      border-radius:var(--rl);padding:.95rem;
    }
    .wz-topbar {
      display:flex;align-items:flex-start;justify-content:space-between;gap:.7rem;flex-wrap:wrap;margin-bottom:.72rem;
    }
    .wz-title {
      font-family:var(--ff-display);font-size:var(--fs-ui-lg);letter-spacing:.08em;color:var(--gold2);
      text-transform:uppercase;
    }
    .wz-subtitle { font-size:var(--fs-label);color:var(--text3);margin-top:2px; }
    .wz-prepared {
      display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
      border:1px solid var(--bdr2);font-family:var(--ff-display);font-size:var(--fs-meta);letter-spacing:.05em;
      color:var(--text2);background:var(--bg3);
    }
    .wz-prepared b { color:var(--teal);font-size:var(--fs-body-lg); }
    .wz-stat-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.55rem;margin-bottom:.8rem; }
    .wz-stat {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:.5rem .62rem;
    }
    .wz-stat-label {
      font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.11em;text-transform:uppercase;color:var(--text3);
    }
    .wz-stat-value {
      margin-top:1px;font-family:var(--ff-display);font-size:var(--fs-value-sm);line-height:1.1;color:var(--text);
    }
    .wz-stat-value.good { color:var(--green); }
    .wz-stat-value.warn { color:var(--orange); }
    .wz-stat-meta { font-size:var(--fs-label);color:var(--text3);margin-top:2px; }
    .wz-role-badge {
      display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;
      border:1px solid var(--bdr2);font-family:var(--ff-display);font-size:var(--fs-xs);
      letter-spacing:.08em;text-transform:uppercase;
    }
    .wz-role-primary { color:var(--teal); border-color:var(--teal); background:var(--tbg); }
    .wz-role-mc { color:var(--purple); border-color:var(--purple); background:var(--pbg); }
    .wz-actions { display:flex;gap:.45rem;flex-wrap:wrap; }
    .wz-actions .spl-add-btn { padding:6px 12px; }
    .wz-prepared-wrap { margin-top:.15rem; }
    .wz-prepared-title {
      font-family:var(--ff-display);font-size:var(--fs-label);letter-spacing:.1em;color:var(--blue);
      text-transform:uppercase;margin-bottom:.45rem;
    }
    .wz-empty {
      font-size:var(--fs-body-lg);color:var(--text3);font-style:italic;
      padding:.65rem .2rem .15rem;
    }

    /* ─── FEATURES TAB ─── */
    .feature-item {
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      margin-bottom:4px;overflow:hidden;
    }
    .feature-hdr {
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 9px;cursor:pointer;transition:background .1s;
    }
    .feature-hdr:hover { background:var(--bg4) }
    .feature-name { font-size:var(--fs-body-lg);color:var(--text);font-weight:600 }
    .feature-src  { font-size:var(--fs-label);color:var(--text3);font-style:italic }
    .feature-arrow { font-size:var(--fs-label);color:var(--text3);transition:transform .15s }
    .feature-item.open .feature-arrow { transform:rotate(90deg) }
    .feature-body {
      display:none;padding:8px 12px;font-size:var(--fs-body-lg);color:var(--text2);
      border-top:1px solid var(--bdr);line-height:1.6;
    }
    .feature-item.open .feature-body { display:block }
    .feature-lv-badge {
      font-family:var(--ff-display);font-size:var(--fs-micro);padding:2px 6px;
      border:1px solid var(--bdr2);border-radius:3px;color:var(--text3);flex-shrink:0;
    }

    /* ─── INVENTORY TAB ─── */
    .inv-category { margin-bottom:.8rem }
    .inv-cat-title {
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
      border-bottom:1px solid var(--bdr);padding-bottom:3px;margin-bottom:.4rem;
    }
    .inv-item {
      display:flex;align-items:center;gap:8px;
      padding:4px 8px;font-size:var(--fs-body-lg);color:var(--text2);
      border-bottom:1px solid var(--bdr);
    }
    .inv-item:last-child { border-bottom:none }
    .inv-icon { font-size:var(--fs-ui-lg);flex-shrink:0 }

    /* ─── BACKGROUND TAB ─── */
    .bg-section { margin-bottom:1rem }
    .bg-section-title {
      font-family:var(--ff-display);font-size:var(--fs-label);font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;
    }
    .bg-text { font-size:var(--fs-body-lg);color:var(--text2);line-height:1.6 }

    /* ─── NOTES TAB ─── */
    .notes-area {
      width:100%;min-height:200px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      color:var(--text);font-family:var(--ff-body);font-size:var(--fs-ui-lg);
      padding:.75rem;outline:none;resize:vertical;
    }
    .notes-area:focus { border-color:var(--gold) }

    /* ─── MISC ─── */
    .phmsg { font-size:var(--fs-body-lg);color:var(--text3);font-style:italic;padding:.5rem 0 }
    .spl-add-btn {
      background:var(--gdim);border:1px solid var(--gold);border-radius:var(--r);
      color:var(--gold);font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      letter-spacing:.06em;padding:5px 14px;cursor:pointer;transition:all .12s;
    }
    .spl-add-btn:hover { background:rgba(200,168,75,.2) }
    .spl-row {
      display:flex;align-items:center;gap:.5rem;padding:6px 9px;border-radius:var(--r);
      border:1px solid transparent;cursor:pointer;transition:all .12s;
    }
    .spl-row:hover { border-color:var(--bdr);background:var(--bg3) }
    .spl-row.on { border-color:var(--green);background:rgba(39,174,96,.08) }
    .spl-row.blocked { opacity:.45;cursor:not-allowed }
    .spl-name { flex:1;min-width:0;font-size:var(--fs-body-lg) }
    .spl-school { font-size:var(--fs-label);color:var(--text3);flex-shrink:0 }
    .spl-check { font-size:var(--fs-meta);color:var(--green);flex-shrink:0 }
    .spl-count-badge {
      font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:700;
      color:var(--gold2);background:var(--gdim);border:1px solid var(--bdr2);
      border-radius:10px;padding:1px 10px;
    }
    .divider { height:1px;background:var(--bdr);margin:.6rem 0 }
    .tag {
      display:inline-block;font-size:var(--fs-label);font-family:var(--ff-display);
      padding:2px 7px;border-radius:3px;border:1px solid;margin:2px;
    }
    .tag.g  { border-color:var(--gold);  color:var(--gold);  background:var(--gdim) }
    .tag.gr { border-color:var(--green); color:var(--green); background:var(--gbg)  }
    .tag.b  { border-color:var(--blue);  color:var(--blue);  background:var(--bluebg) }
    .tag.t  { border-color:var(--teal);  color:var(--teal);  background:var(--tbg)  }
    .tag.p  { border-color:var(--purple);color:var(--purple);background:var(--pbg)  }
    .tag.r  { border-color:var(--red2);  color:var(--red2);  background:var(--redbg) }

    /* dice tag */
    .hd-pips { display:flex;gap:4px;flex-wrap:wrap;margin-top:.3rem }
    .hd-pip {
      width:18px;height:18px;border-radius:3px;
      border:1px solid var(--bdr2);background:var(--bg3);
      display:flex;align-items:center;justify-content:center;
      font-size:var(--fs-xs);color:var(--text3);
    }
    .hd-pip.used { opacity:.3 }
    .hd-pip.full { background:var(--gdim);border-color:var(--gold);color:var(--gold) }

    /* scroll */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

    .condition-tag {
      display:inline-flex;align-items:center;gap:5px;
      padding:2px 8px;border-radius:999px;margin:0;font-size:var(--fs-label);
      font-family:var(--ff-display);border:1px solid var(--bdr2);color:var(--text3);
      background:var(--bg3);white-space:nowrap;
    }
    .condition-tag.on { color:var(--orange); border-color:var(--orange); background:var(--obg); }
    .condition-tag.empty { color:var(--text3); border-style:dashed; }
    .conditions-wrap { display:flex; flex-direction:column; gap:6px; }
    .cond-active { display:flex; flex-wrap:wrap; gap:4px; }
    .cond-details { border:1px dashed var(--bdr); border-radius:var(--r); padding:3px 6px; }
    .cond-summary {
      list-style:none; cursor:pointer; font-family:var(--ff-display);
      font-size:var(--fs-label); color:var(--text2); letter-spacing:.06em;
      display:inline-flex; align-items:center; gap:5px; user-select:none;
    }
    .cond-summary::-webkit-details-marker { display:none; }
    .cond-picker {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(108px,1fr));
      gap:4px; margin-top:6px;
    }
    .cond-btn {
      border:1px solid var(--bdr2); border-radius:var(--r); background:var(--bg3);
      color:var(--text2); padding:4px 6px; cursor:pointer; transition:all .12s;
      display:flex; align-items:center; gap:5px; justify-content:flex-start;
      font-family:var(--ff-display); font-size:var(--fs-xs); letter-spacing:.03em;
    }
    .cond-btn:hover { border-color:var(--gold); color:var(--gold2); }
    .cond-btn.on { border-color:var(--orange); color:var(--orange); background:var(--obg); }
    .cond-clear {
      border:1px solid var(--bdr2); border-radius:var(--r); background:transparent;
      color:var(--text3); padding:2px 7px; cursor:pointer;
      font-family:var(--ff-display); font-size:var(--fs-xs); letter-spacing:.06em; text-transform:uppercase;
      width:max-content;
    }
    .cond-clear:hover { border-color:var(--red2); color:var(--red2); }
    .ac-shield {
      position:relative;display:flex;align-items:center;justify-content:center;
      width:62px;height:68px;flex-shrink:0;
    }
    .ac-shield svg { position:absolute;inset:0;width:100%;height:100% }
    .ac-shield-val {
      position:relative;z-index:1;
      font-family:var(--ff-display);font-size:var(--fs-value-md);font-weight:700;color:var(--gold2);
    }
    .ac-shield-lbl {
      position:relative;z-index:1;
      font-family:var(--ff-display);font-size:var(--fs-tiny);font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
      display:block;margin-top:18px;
    }

    /* Typography normalization */
    .panel-title,
    .block-title,
    .stat-box-lbl,
    .score-lbl,
    .skill-ability,
    .save-stat,
    .circle-stat-lbl,
    .xp-label,
    .hp-sublbl,
    .tab-btn,
    .af-btn,
    .inv-chip,
    .rest-btn,
    .back-btn,
    .spell-level-hdr,
    .feature-lv-badge,
    .inv-cat-title,
    .bg-section-title,
    .prof-section-title {
      font-size: var(--fs-label);
    }

    .prof-text,
    .def-text,
    .sense-lbl,
    .skill-name,
    .skill-bonus,
    .attacks-table,
    .atk-dmg,
    .action-card-body,
    .action-desc,
    .spell-entry,
    .feature-name,
    .feature-body,
    .inv-item,
    .inv-row-name,
    .inv-row-meta,
    .bg-text,
    .notes-area {
      font-size: var(--fs-body);
    }

    .action-card-name,
    .spl-name,
    .inv-search-name {
      font-size: var(--fs-body-lg);
    }

    .slot-pips { display:flex;gap:4px;flex-wrap:wrap }
    .slot-pip {
      width:14px;height:14px;border-radius:50%;
      border:1px solid var(--bdr);background:transparent;
      transition:all .1s;cursor:pointer;
    }
    .slot-pip.used { background:var(--blue);border-color:var(--blue) }

    /* ─── XP INTERACTIVE ─── */
    .xp-block { position:relative }
    .xp-edit-input {
      background:transparent;border:none;border-bottom:1px solid var(--gold);
      color:var(--gold2);font-family:var(--ff-display);font-size:var(--fs-meta);font-weight:600;
      text-align:center;outline:none;width:100px;padding:2px 0;
    }

    /* ─── INVENTORY STYLES ─── */
    .inv-search-box {
      width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      padding:8px 12px;color:var(--text);font-family:var(--ff-body);font-size:var(--fs-base);
      outline:none;transition:border-color .15s;margin-bottom:.5rem;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }
    .inv-search-box:focus { border-color:var(--gold) }
    .inv-search-box::placeholder { color:var(--text3) }
    .inv-filter-row { display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.6rem }
    .inv-chip {
      padding:3px 10px;border:1px solid var(--bdr);border-radius:999px;
      font-family:var(--ff-display);font-size:var(--fs-xs);font-weight:600;letter-spacing:.08em;
      cursor:pointer;background:transparent;color:var(--text3);transition:all .12s;
      text-transform:uppercase;
    }
    .inv-chip:hover { border-color:var(--bdr2);color:var(--text2) }
    .inv-chip.on { background:var(--gdim);border-color:var(--gold);color:var(--gold2) }
    .inv-search-list {
      display:flex;flex-direction:column;gap:2px;
      max-height:180px;overflow-y:auto;margin-bottom:.75rem;
    }
    .inv-search-row {
      display:flex;align-items:center;gap:8px;padding:6px 10px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
      cursor:pointer;transition:all .1s;
    }
    .inv-search-row:hover { border-color:var(--gold);background:var(--bg4) }
    .inv-search-name { flex:1;font-size:var(--fs-body-lg);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .inv-search-meta { font-size:var(--fs-meta);color:var(--text3);flex-shrink:0 }
    .inv-search-price { font-size:var(--fs-label);color:var(--text2);flex-shrink:0 }
    .inv-row {
      display:flex;align-items:center;gap:7px;padding:6px 10px;
      background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:3px;
    }
    .inv-row:hover { border-color:var(--bdr2) }
    .inv-row.equipped { border-color:var(--teal);background:rgba(26,188,156,.06) }
    .inv-entry-body {

<script>
function luci(name){

}
document.addEventListener('DOMContentLoaded', () => {

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function clean(s){
  if(!s)return'';
  return String(s)
    .replace(/\{@hit ([^}]+)\}/g,(_,v)=>`<b>${+v>=0?'+'+v:v}</b>`)
    .replace(/\{@damage ([^}]+)\}/g,(_,v)=>`<b>${v}</b>`)
    .replace(/\{@dc ([^}]+)\}/g,'CD $1')
    .replace(/\{@spell ([^|}]+)[^}]*\}/g,'<i>$1</i>')
    .replace(/\{@condition ([^|}]+)[^}]*\}/g,'<b>$1</b>')
    .replace(/\{@action ([^|}]+)[^}]*\}/g,'<b>$1</b>')
    .replace(/\{@skill ([^|}]+)[^}]*\}/g,'$1')
    .replace(/\{@ability ([^|}]+)[^}]*\}/g,'$1')
    .replace(/\{@b ([^}]+)\}/g,'<b>$1</b>')
    .replace(/\{@i ([^}]+)\}/g,'<i>$1</i>')
    .replace(/\{@[a-z]+ ([^|}]+)[^}]*\}/gi,'$1')
    .replace(/\{[^}]+\}/g,'');
}
function rE(e){
  if(!e)return'';
  if(typeof e==='string')return clean(e);
  if(typeof e==='number')return String(e);
  if(Array.isArray(e))return e.map(rE).join('<br>');
  if(typeof e==='object'){
    if(e.type==='list')return`<ul style="margin:.3rem 0 .3rem 1.2rem">${(e.items||[]).map(i=>`<li>${rE(i)}</li>`).join('')}</ul>`;
    if(e.type==='table'){
      let h=`<table style="width:100%;border-collapse:collapse;font-size:var(--fs-body);margin:.4rem 0">`;
      if(e.colLabels)h+=`<thead><tr>${e.colLabels.map(l=>`<th style="font-family:var(--ff-display);font-size:var(--fs-xs);letter-spacing:.08em;color:var(--text3);padding:3px 6px;border-bottom:1px solid var(--bdr)">${clean(l)}</th>`).join('')}</tr></thead>`;
      h+=`<tbody>${(e.rows||[]).map(r=>`<tr>${r.map(c=>`<td style="padding:2px 6px;color:var(--text2);border-bottom:1px solid var(--bdr)">${rE(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      return h;
    }
    if(e.type==='entries'||e.type==='section')return`<div style="margin-bottom:5px">${e.name?`<b>${clean(e.name)}.</b> `:''} ${rE(e.entries)}</div>`;
    if(e.type==='inset')return`<div style="border-left:2px solid var(--bdr2);padding:5px 10px;margin:5px 0;font-style:italic">${rE(e.entries)}</div>`;
    if(e.name&&e.entries)return`<div style="margin-bottom:5px"><b><i>${clean(e.name)}.</i></b> ${rE(e.entries)}</div>`;
    if(e.entries)return rE(e.entries);
    if(e.entry)return rE(e.entry);
  }
  return'';
}

/* ═══════ DATA ═══════ */
let C = null; // character data
let currentHP = 0;
let maxHP = 0;
let tempHP = 0;
let hpAdjustAmt = 1;
let maxHPBonus = 0;
let deathSaves = { success: 0, fail: 0 };
let usedHD = 0;
let spellSlotUsed = {}; // {lvl: count}
let sheetInventory = []; // live inventory for this session
let sheetCurrency = { cp:0, sp:0, ep:0, gp:10, pp:0 };
let sheetInspiration = false;
let cachedEncLevel = 0; // 0=ok, 1=encumbered, 2=heavily — recomputed once per inventory change
let allItemsDb = []; // loaded from 5etools
let invFilter = 'all';
let activeConditions = [];
const BASE_URL = 'https://raw.githubusercontent.com/5etools-mirror-3/5etools-src/main/data/';
const ALLOWED_SOURCES = ['XPHB','FRAiF','FRHoF','EFA'];

function loadChar(){
  try {
    const raw = localStorage.getItem('5e_current_char');
    if(!raw) return null;
    const ch = JSON.parse(raw);
    // Merge sheet-side choice overrides (e.g. Arcane Armor model toggled at runtime per RAW)
    try {
      const ov = JSON.parse(localStorage.getItem('5e_choice_overrides') || '{}');
      if (ov && typeof ov === 'object' && Object.keys(ov).length) {
        ch.choices = { ...(ch.choices || {}), ...ov };
      }
    } catch(_) {}
    return ch;
  } catch(e){ return null; }
}

function _sheetWizardPreparedCap(wizardLv, clsName, subclassName, clsSnap, intMod){
  const lv = Number(wizardLv || 1);
  const profile = _sheetSpellcastingProfile(clsName || 'wizard', subclassName || '', clsSnap || {});
  let cap = null;
  if(Array.isArray(clsSnap?.preparedSpellsProgression)) cap = clsSnap.preparedSpellsProgression[lv-1] ?? null;
  if(!Number.isFinite(cap) && Array.isArray(profile?.preparedSpellsProgression)) cap = profile.preparedSpellsProgression[lv-1] ?? null;
  if(!Number.isFinite(cap) && Array.isArray(profile?.spellsKnown)) cap = profile.spellsKnown[lv-1] ?? null;
  if(!Number.isFinite(cap) && profile?.preparedFormula){
    const ab = String(profile.preparedFormula.ability || 'int').toLowerCase();
    const mod = (ab === 'int') ? Number(intMod || 0) : getMod(getFinal(ab));
    cap = applyPreparedFormula(profile.preparedFormula, mod || 0, lv);
  }
  if(!Number.isFinite(cap)) cap = Math.max(1, lv + Number(intMod || 0));
  return Math.max(0, Number(cap || 0));
}

function ensureWizardSpellbookInitialized(){
  if(!C || typeof WizardSpellbookAPI === 'undefined') return;
  const intMod = getMod(getFinal('int')) || 0;
  const targets = [];
  if(String(C.className || '').toLowerCase() === 'wizard'){
    targets.push({
      bucket: C,
      lv: C.classLevel || C.level || 1,
      clsName: C.className || 'Wizard',
      subclassName: C.subclassShortName || '',
      clsSnap: C.clsSnapshot || {},
    });
  }
  (C.extraClasses || []).forEach(ec => {
    if(String(ec?.name || '').toLowerCase() === 'wizard'){
      targets.push({
        bucket: ec,
        lv: ec.level || 1,
        clsName: ec.name || 'Wizard',
        subclassName: ec.subclassShortName || '',
        clsSnap: ec.clsSnapshot || {},
      });
    }
  });
  targets.forEach(t => {
    const maxPrepared = _sheetWizardPreparedCap(t.lv, t.clsName, t.subclassName, t.clsSnap, intMod);
    WizardSpellbookAPI.initWizardSpellbook(t.bucket, t.lv);
    if(typeof WizardSpellbookAPI.syncSpellbookFromPrepared === 'function'){
      WizardSpellbookAPI.syncSpellbookFromPrepared(t.bucket);
    }
    const prefix = t.bucket === C ? '' : `mc${(C.extraClasses || []).indexOf(t.bucket)}_`;
    if(C?.choices){
      for(const [key, val] of Object.entries(C.choices)){
        if(!String(key).startsWith(prefix)) continue;
        if(prefix ? !String(key).startsWith(`${prefix}subclass_`) : !String(key).startsWith('subclass_')) continue;
        if(!String(key).includes('_savant_')) continue;
        const vals = Array.isArray(val) ? val : [val];
        vals.forEach(name => {
          const cleanName = String(name || '').split('|')[0].trim();
          if(!cleanName) return;
          const snap = (C.spellSnapshots || []).find(s => String(s?.name || '').toLowerCase() === cleanName.toLowerCase());
          const full = Array.isArray(sheetSpellDb) ? sheetSpellDb.find(s => String(s?.name || '').toLowerCase() === cleanName.toLowerCase()) : null;
          const level = Number((snap || full)?.level);
          if(Number.isFinite(level)) WizardSpellbookAPI.addToSpellbook(t.bucket, (snap || full).name, level);
        });
      }
    }
    const addRuntimeSpellbookGrants = (cfg) => {
      [
        ...(cfg?.spellcasting?.alwaysKnownSpells || []),
        ...(cfg?.spellcasting?.alwaysPreparedSpells || []),
      ].forEach(entry => {
        if(!entry || entry.addToSpellbook !== true) return;
        if((t.lv || 1) < Number(entry.minLevel || 1)) return;
        const cleanName = String(entry.name || '').trim();
        if(!cleanName) return;
        const snap = (C.spellSnapshots || []).find(s => String(s?.name || '').toLowerCase() === cleanName.toLowerCase());
        const full = Array.isArray(sheetSpellDb) ? sheetSpellDb.find(s => String(s?.name || '').toLowerCase() === cleanName.toLowerCase()) : null;
        const level = Number((snap || full)?.level);
        if(Number.isFinite(level)) WizardSpellbookAPI.addToSpellbook(t.bucket, (snap || full).name, level);
      });
    };
    addRuntimeSpellbookGrants(_sheetGetClassRuntimeConfig(t.clsName));
    addRuntimeSpellbookGrants(_sheetGetSubclassRuntimeConfig(t.clsName, t.subclassName));
    if(typeof WizardSpellbookAPI.validatePreparedSpells === 'function'){
      WizardSpellbookAPI.validatePreparedSpells(t.bucket, t.lv, intMod, maxPrepared);
    }
  });
}

function getBase(stat){
  if(!C) return 10;
  const m = C.scoreMethod;
  if(m==='pointbuy') return (C.pbScores||{})[stat] || 8;
  if(m==='standard') { const v = (C.arrAssign||{})[stat]; return v!==null&&v!==undefined ? v : 8; }
  if(m==='manual') { const v = (C.manualScores||{})[stat]; return v!=null ? v : 8; }
  const v = (C.diceAssign||{})[stat]; return v!==null&&v!==undefined ? v : 8;
}
function bgBonus(stat){
  if(C?.bgBonusMap) return C.bgBonusMap[stat] || 0;
  if(!C?.bgAbility?.length) return 0;
  const idx = C.bgAbility.indexOf(stat);
  if(idx<0) return 0;
  return idx===0 ? 2 : 1;
}
function getAsiFeatBonus(stat){
  let bonus = 0;
  if(!C?.choices) return 0;
  for(const [k,v] of Object.entries(C.choices)){
    if(!/^feat_asi_lv\d+_asi_picks$/.test(k)) continue;
    const mode = C.choices[k.replace('_asi_picks','_asi_mode')] || 'double';
    const picks = Array.isArray(v) ? v : [];
    if(mode==='double'){ if(picks[0]===stat) bonus+=2; }
    else bonus += picks.filter(p=>p===stat).length;
  }
  return bonus;
}
function getFinal(stat){ return getBase(stat)+bgBonus(stat)+getAsiFeatBonus(stat)+_sheetStatBonus(stat); }
function getMod(v){ return Math.floor((v-10)/2); }
function getPB(){ return C ? (PB_TABLE[C.level]||2) : 2; }
function fmod(v){ const m=getMod(v); return(m>=0?'+':'')+m; }

function hasSaveProficiency(stat){
  return C && (C.clsSnapshot?.proficiency||[]).includes(stat);
}
function getSaveBonus(stat){
  const m = getMod(getFinal(stat));
  return m + (hasSaveProficiency(stat)?getPB():0) + _sheetEffectFlatBonus({ type:'save', ability: stat });
}

/* ─── Sheet Effects aggregator (stat/speed/adv/disadv/resist/immune/sense/ac/reach/size/tempHp) ─── */
function _sheetEffNorm(v){ return String(v||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
function _sheetEffEntities(){
  const out = [];
  if (!C) return out;
  out.push({ kind:'class', name: C.className||'', sub: C.subclassShortName||'', lv: C.classLevel||C.level||1, prefix:'' });
  (C.extraClasses||[]).forEach((ec, i) => {
    out.push({ kind:'class', name: ec.name||'', sub: ec.subclassShortName||'', lv: ec.level||1, prefix:`mc${i}_` });
  });
  out.push({ kind:'species', name: C.speciesName||'', src: C.speciesSource||'', lv: C.level||1, prefix:'' });
  (C.allFeatSnapshots||[]).forEach(f => out.push({ kind:'feat', name: f?.name||'', lv: C.level||1, prefix:'' }));
  return out;
}
function _sheetEffMatchChoice(rc, prefix){
  if (!rc) return true;
  const stored = C?.choices?.[(prefix||'') + rc.key];
  const vals = Array.isArray(stored) ? stored : (stored ? [stored] : []);
  if (!vals.length) return false;
  const targets = Array.isArray(rc.value) ? rc.value : [rc.value];
  return vals.some(v => targets.some(t => _sheetEffNorm(v) === _sheetEffNorm(t)));
}
function _sheetEffActiveFeature(name){
  if (!name) return true;
  const map = (typeof getResourceVals === 'function') ? getResourceVals() : null;
  if (!map) return true;
  const v = map[String(name)];
  return v === true || v === 'on' || v === 1 || v === '1';
}
function _sheetCollectEntityEffects(ent){
  let arr = [];
  if (ent.kind === 'class') {
    if (typeof getClassSheetEffects === 'function') arr = arr.concat(getClassSheetEffects(ent.name) || []);
    if (ent.sub && typeof getSubclassSheetEffects === 'function') arr = arr.concat(getSubclassSheetEffects(ent.name, ent.sub) || []);
  } else if (ent.kind === 'species') {
    if (typeof getSpeciesSheetEffects === 'function') arr = arr.concat(getSpeciesSheetEffects(ent.name, ent.src) || []);
  } else if (ent.kind === 'feat') {
    if (typeof getFeatSheetEffects === 'function') arr = arr.concat(getFeatSheetEffects(ent.name) || []);
  }
  return arr.filter(e => {
    if (!e || typeof e !== 'object') return false;
    if (Number(e.minLevel||1) > Number(ent.lv||1)) return false;
    if (e.requiredChoice && !_sheetEffMatchChoice(e.requiredChoice, ent.prefix)) return false;
    if (e.requiredFeatureActive && !_sheetEffActiveFeature(e.requiredFeatureActive)) return false;
    if (typeof e.condition === 'function') {
      try { if (!e.condition(C, { entity: ent })) return false; } catch(_) { return false; }
    }
    if (e.requiredItemFlag) {
      const flags = _sheetCollectEquippedFlags();
      const reqs = Array.isArray(e.requiredItemFlag) ? e.requiredItemFlag : [e.requiredItemFlag];
      if (!reqs.every(f => flags.has(f))) return false;
    }
    return true;
  });
}
function _collectSheetEffects(){
  const out = [];
  _sheetEffEntities().forEach(ent => {
    _sheetCollectEntityEffects(ent).forEach(e => out.push({ ...e, _ent: ent }));
  });
  return out;
}
function _sheetEffValue(eff){
  const v = eff.value;
  if (typeof v === 'function') {
    try {
      return Number(v({ character: C, level: eff._ent?.lv||C?.level||1, choices: C?.choices||{}, prefix: eff._ent?.prefix||'', getMod, getPB, getBase, bgBonus, getAsiFeatBonus })) || 0;
    } catch(_) { return 0; }
  }
  return Number(v) || 0;
}
function _sheetStatBonus(stat){
  let b = 0;
  _collectSheetEffects().forEach(e => { if (e.type === 'stat' && e.stat === stat) b += _sheetEffValue(e); });
  return b;
}
function _sheetSpeedBonus(speedType){
  const t = String(speedType || 'walk').toLowerCase();
  let b = 0;
  _collectSheetEffects().forEach(e => {
    if (e.type !== 'speed') return;
    const st = String(e.speedType || 'walk').toLowerCase();
    if (st === t || st === 'all') b += _sheetEffValue(e);
  });
  return b;
}
function _sheetSpeedSet(speedType){
  const t = String(speedType || 'walk').toLowerCase();
  let max = 0;
  _collectSheetEffects().forEach(e => {
    if (e.type !== 'speed') return;
    const st = String(e.speedType || 'walk').toLowerCase();
    if (st === t && e.set) max = Math.max(max, _sheetEffValue(e));
  });
  return max;
}
function _sheetAdvFor(opts){
  // opts: { target:'save'|'check'|'attack'|'skill'|'initiative', ability?, skill? }
  let adv = false, dis = false;
  _collectSheetEffects().forEach(e => {
    if (e.type !== 'advantage' && e.type !== 'disadvantage') return;
    const t = String(e.target || '').toLowerCase();
    if (t && t !== opts.target) return;
    if (opts.target === 'skill' && e.skill) {
      if (_sheetEffNorm(e.skill) !== _sheetEffNorm(opts.skill||'')) return;
    } else if (e.ability && e.ability !== 'all') {
      if (e.ability !== opts.ability) return;
    }
    if (e.type === 'advantage') adv = true;
    else dis = true;
  });
  return adv && !dis ? 'adv' : (dis && !adv ? 'disadv' : (adv && dis ? 'cancel' : null));
}
function _sheetEffectFlatBonus(opts){
  // flat numeric bonus to a roll category (e.g. save bonus)
  let b = 0;
  _collectSheetEffects().forEach(e => {
    if (e.type !== 'bonus') return;
    if (String(e.target||'') !== opts.target) return;
    if (e.ability && e.ability !== 'all' && e.ability !== opts.ability) return;
    b += _sheetEffValue(e);
  });
  return b;
}

function _normSkill(s){
  if(!s||typeof s!=='string') return '';
  return s.toLowerCase().replace(/[^a-z]/g,'');
}

function _collectSheetAdapterSkillGrants(){
  const out = [];
  const append = (grants, lv, prefix) => {
    (Array.isArray(grants) ? grants : []).forEach(g => {
      if(!g || (g.type !== 'skill' && g.type !== 'expertise')) return;
      if((lv || 1) < Number(g.minLevel || 1)) return;
      if(g.requiredChoice){
        const rc = g.requiredChoice;
        const stored = C?.choices?.[`${prefix || ''}${rc.key}`];
        const vals = Array.isArray(stored) ? stored : (stored ? [stored] : []);
        if(!vals.includes(rc.value)) return;
      }
      out.push(g);
    });
  };
  const addEntity = (className, subclassShortName, lv, prefix) => {
    if(typeof getClassSheetProficiencies === 'function') append(getClassSheetProficiencies(className), lv, prefix);
    if(typeof getSubclassSheetProficiencies === 'function') append(getSubclassSheetProficiencies(className, subclassShortName), lv, prefix);
  };
  addEntity(C?.className || '', C?.subclassShortName || '', C?.classLevel || C?.level || 1, '');
  (C?.extraClasses || []).forEach((ec, idx) => addEntity(ec?.name || '', ec?.subclassShortName || '', ec?.level || 1, `mc${idx}_`));
  if(typeof getSpeciesSheetProficiencies === 'function') append(getSpeciesSheetProficiencies(C?.speciesName || '', C?.speciesSource || ''), C?.level || 1, '');
  return out;
}

function getSkillProficiency(skillName){
  const nsk = _normSkill(skillName);
  // Builder saves selectedSkills as {proficient:[...], expert:[...]} or legacy array
  const skillData = C?.selectedSkills || {};
  const profList = Array.isArray(skillData) ? skillData : (skillData.proficient || []);
  const expList  = Array.isArray(skillData) ? [] : (skillData.expert || []);
  if(expList.some(s=>_normSkill(s)===nsk)) return 'exp';
  if(profList.some(s=>_normSkill(s)===nsk)) return 'prof';
  // Background fixed skills
  const bgFixed = (C?.bgSnapshot?.skillProficiencies||[]).flatMap(sp=>Object.keys(sp).filter(k=>k!=='choose'));
  if(bgFixed.some(s=>_normSkill(s)===nsk)) return 'prof';
  // Class starting skill choices
  if(C?.choices){
    for(const [key,val] of Object.entries(C.choices)){
      if(!val) continue;
      if(key.includes('skill')||key.startsWith('start_skills')){
        const vals = Array.isArray(val)?val:[val];
        if(vals.some(v=>_normSkill(v)===nsk)) return 'prof';
      }
      if(key.includes('exp')||key.includes('expertise')){
        const vals = Array.isArray(val)?val:[val];
        if(vals.some(v=>_normSkill(v)===nsk)) return 'exp';
      }
    }
  }
  const adapterSkillGrants = _collectSheetAdapterSkillGrants();
  if(adapterSkillGrants.some(g => g.type === 'expertise' && (Array.isArray(g.values) ? g.values : [g.values]).some(v => _normSkill(v) === nsk))) return 'exp';
  if(adapterSkillGrants.some(g => g.type === 'skill' && (Array.isArray(g.values) ? g.values : [g.values]).some(v => _normSkill(v) === nsk))) return 'prof';
  return null;
}
function getSkillBonus(sk){
  const m = getMod(getFinal(sk.a));
  const p = getSkillProficiency(sk.n);
  if(p==='exp') return m+getPB()*2;
  if(p==='prof') return m+getPB();
  // Adapter-driven untrained check modifiers (e.g. Jack of All Trades)
  let addHalfPb = false;
  _sheetClassEntities().forEach(ent => {
    const classCfg = _sheetGetClassRuntimeConfig(ent.className);
    const subCfg = _sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName);
    const classMin = Number(classCfg?.skillRules?.jackOfAllTradesMinLevel || 0);
    const subMin = Number(subCfg?.skillRules?.jackOfAllTradesMinLevel || 0);
    if ((classMin > 0 && ent.level >= classMin) || (subMin > 0 && ent.level >= subMin)) addHalfPb = true;
  });
  if(addHalfPb) return m+Math.floor(getPB()/2);
  return m;
}

function _getClassLevelByName(name){
  const target = String(name || "").toLowerCase();
  if (!target) return 0;
  if ((C?.className || "").toLowerCase() === target) return C?.classLevel || C?.level || 1;
  const ec = (C?.extraClasses || []).find(x => String(x?.name || "").toLowerCase() === target);
  return ec ? (ec.level || 1) : 0;
}
function _sheetFindUnarmedStrikeRule(equippedArmor, equippedShield){
  for(const ent of _sheetClassEntities()){
    const subCfg = _sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName);
    const rule = subCfg?.unarmedStrike;
    if(!rule || typeof rule !== 'object') continue;
    if(Number(ent.level || 0) < Number(rule.minLevel || 1)) continue;
    if(rule.requiresNoArmor && !!equippedArmor) continue;
    if(rule.requiresNoShield && !!equippedShield) continue;
    return { rule, entity: ent };
  }
  return null;
}

function calcMaxHP(){
  if(!C) return 10;
  const hd = C.clsSnapshot?.hd;
  let faces = 8;
  if(hd){ if(hd.faces) faces=hd.faces; else if(Array.isArray(hd)&&hd[0]?.faces) faces=hd[0].faces; }
  const conMod = getMod(getFinal('con'));
  const pLv = C.classLevel || C.level;
  let total = faces + conMod;
  if(pLv > 1){
    if(C.hpMode === 'rolled'){
      for(let i=2; i<=pLv; i++){
        const val = parseInt((C.hpManualRolls||{})[i]);
        total += (isNaN(val) ? Math.floor(faces/2)+1 : val) + conMod;
      }
    } else {
      total += (Math.floor(faces/2)+1+conMod)*(pLv-1);
    }
  }
   (C.extraClasses||[]).forEach((ec, ecIdx) => {
     const ecHd = ec.clsSnapshot?.hd;
     let ecFaces = 8;
     if(ecHd){ if(ecHd.faces) ecFaces=ecHd.faces; else if(Array.isArray(ecHd)&&ecHd[0]?.faces) ecFaces=ecHd[0].faces; }
     const keyPrefix = 'extra_' + ecIdx + '_';
     if(C.hpMode === 'rolled'){
       for(let i=1; i<=(ec.level||1); i++){
         const val = parseInt((C.hpManualRolls||{})[keyPrefix + i]);
         total += (isNaN(val) ? Math.floor(ecFaces/2)+1 : val) + conMod;
       }
     } else {
       total += (Math.floor(ecFaces/2)+1+conMod)*(ec.level||1);
     }
   });
  const lv = C.level;
  const hpBonusPerLv = C.hpBonusPerLv != null
    ? C.hpBonusPerLv
    : (Array.isArray(C.allFeatSnapshots)?C.allFeatSnapshots:[]).reduce((sum,f)=>sum+(f?.hpBonusPerLevel||0),0);
  total += hpBonusPerLv * lv;
  return Math.max(1, total);
}

function _resolvedInventory(){
  const raw = sheetInventory || C?.inventory || [];
  if(typeof _resolveInvItem !== 'function') return raw;
  return raw.map(i => (i.type || i.custom) ? i : _resolveInvItem(i));
}

function _sheetCleanTaggedText(v){
  return String(v || '')
    .replace(/\{@[a-z]+ ([^|}]+)(?:\|[^}]*)?\}/gi, '$1')
    .replace(/\{@[a-z]+\s*/gi, '')
    .replace(/[{}]/g, '')
    .split('|')[0]
    .trim();
}

function _sheetCompactKey(v){
  return _sheetCleanTaggedText(v).toLowerCase().replace(/[^a-z0-9]/g, '');
}

function _sheetNormalizeProfLabel(v){
  let base = _sheetCleanTaggedText(v);
  if (!base) return '';
  base = base.replace(/\.$/, '').replace(/\s+/g, ' ').trim();
  if (/^martial weapons that have the finesse or light$/i.test(base)) {
    base = 'Martial weapons that have the Finesse or Light property';
  }
  if (/^(?:finesse|light) property$/i.test(base)) return '';
  if (/^one type of /i.test(base)) return '';
  if (/ of your choice$/i.test(base)) return '';
  if (/^any/i.test(base)) return '';
  if (base.includes(',')) return '';
  const lc = base.toLowerCase();
  const alias = {
    "thieves' tools": "Thieves' Tools",
    "thieves' tool": "Thieves' Tools",
    "tinker's tools": "Tinker's Tools",
    "tinker's tool": "Tinker's Tools",
    "artisan's tools": "Artisan's Tools",
    "herbalism kit": "Herbalism Kit",
    "navigator's tools": "Navigator's Tools",
    "poisoner's kit": "Poisoner's Kit",
    "forgery kit": "Forgery Kit",
    "disguise kit": "Disguise Kit",
  };
  if (alias[lc]) return alias[lc];
  return base.charAt(0).toUpperCase() + base.slice(1);
}

function _sheetSplitAndNormalizeProfs(raw){
  if (!raw || typeof raw !== 'string') return [];
  return raw.split(/[;,]/).map(s => _sheetNormalizeProfLabel(s)).filter(Boolean);
}

function _sheetNormalizeProfDisplayList(vals){
  const out = [];
  (Array.isArray(vals) ? vals : Array.from(vals || [])).forEach(v => {
    const n = _sheetNormalizeProfLabel(v);
    if (n && !out.some(x => String(x).toLowerCase() === String(n).toLowerCase())) out.push(n);
  });
  return out;
}

function _sheetFixedKeysFromProfBlock(block, excluded){
  if (!block || typeof block !== 'object' || Array.isArray(block)) return [];
  return Object.keys(block)
    .filter(k => !(excluded || []).includes(k) && block[k] !== false)
    .map(_sheetNormalizeProfLabel)
    .filter(Boolean);
}

function _sheetCollectFixedFeatureProfs(field, excluded){
  const out = new Set();
  if(!C) return out;
  const buckets = [{
    maxLv: C.classLevel || C.level || 1,
    features: [
      ...(C.allClassFeatures || []),
      ...(C.subclassShortName
        ? (C.allSubFeatures || []).filter(f => f.subclassShortName === C.subclassShortName)
        : []),
    ],
  }];
  for (const ec of (C.extraClasses || [])) {
    if (!ec?.name) continue;
    buckets.push({
      maxLv: ec.level || 1,
      features: [
        ...(ec.allClassFeatures || []),
        ...(ec.subclassShortName
          ? (ec.allSubFeatures || []).filter(f => f.subclassShortName === ec.subclassShortName)
          : []),
      ],
    });
  }
  buckets.forEach(({ maxLv, features }) => {
    (features || [])
      .filter(f => !f?.isReprinted && (f?.level || 0) <= maxLv)
      .forEach(feat => {
        (feat?.[field] || []).forEach(block => {
          if (typeof block === 'string') {
            const n = _sheetNormalizeProfLabel(block);
            if (n) out.add(n);
            return;
          }
          _sheetFixedKeysFromProfBlock(block, excluded).forEach(v => out.add(v));
        });
      });
  });
  return out;
}

function _sheetCollectFixedFeatProfs(field, excluded){
  const out = new Set();
  const selectedFeatSnapshots = Array.isArray(C?.allFeatSnapshots) ? C.allFeatSnapshots : [];
  selectedFeatSnapshots.forEach(feat => {
    (feat?.[field] || []).forEach(block => {
      if (typeof block === 'string') {
        const n = _sheetNormalizeProfLabel(block);
        if (n) out.add(n);
        return;
      }
      _sheetFixedKeysFromProfBlock(block, excluded).forEach(v => out.add(v));
    });
  });
  return out;
}

function _sheetCollectAdapterProfGrants(){
  const adapterProfGrants = [];
  const appendAdapterGrants = (grants, lv, prefix = '') => {
    (Array.isArray(grants) ? grants : []).forEach(g => {
      if (!g || typeof g !== 'object') return;
      const minLevel = Number(g.minLevel || 1);
      if ((lv || 1) < minLevel) return;
      if (g.requiredChoice) {
        const rc = g.requiredChoice;
        const stored = C?.choices?.[prefix + rc.key];
        const vals = Array.isArray(stored) ? stored : (stored ? [stored] : []);
        if (!vals.includes(rc.value)) return;
      }
      adapterProfGrants.push(g);
    });
  };
  const collectEntityAdapterGrants = (className, subclassShortName, lv, prefix = '') => {
    if (typeof getClassSheetProficiencies === 'function') {
      appendAdapterGrants(getClassSheetProficiencies(className), lv, prefix);
    }
    if (typeof getSubclassSheetProficiencies === 'function') {
      appendAdapterGrants(getSubclassSheetProficiencies(className, subclassShortName), lv, prefix);
    }
  };
  collectEntityAdapterGrants(C?.className || '', C?.subclassShortName || '', C?.classLevel || C?.level || 1);
  for (const [idx, ec] of (C?.extraClasses || []).entries()) {
    collectEntityAdapterGrants(ec?.name || '', ec?.subclassShortName || '', ec?.level || 1, `mc${idx}_`);
  }
  if (typeof getSpeciesSheetProficiencies === 'function') {
    appendAdapterGrants(getSpeciesSheetProficiencies(C?.speciesName || '', C?.speciesSource || ''), C?.level || 1);
  }
  return adapterProfGrants;
}

function _collectSheetEquipmentProficiencySets(){
  const sp = C?.clsSnapshot?.startingProficiencies || {};
  const armorSet = new Set();
  const weaponSet = new Set();
  const weaponMasterySet = new Set();
  const weaponRules = [];
  const addFixedProfsFromBlocks = (src, set) => {
    const arr = Array.isArray(src) ? src : [src];
    arr.forEach(entry => {
      if (!entry) return;
      if (typeof entry === 'string') {
        _sheetSplitAndNormalizeProfs(entry).forEach(v => set.add(v));
        return;
      }
      _sheetFixedKeysFromProfBlock(entry, ['choose', 'any']).forEach(v => set.add(v));
    });
  };
  addFixedProfsFromBlocks(sp.armor, armorSet);
  addFixedProfsFromBlocks(sp.weapons, weaponSet);
  _sheetCollectFixedFeatureProfs('armorProficiencies', ['choose', 'any']).forEach(v => armorSet.add(v));
  _sheetCollectFixedFeatureProfs('weaponProficiencies', ['choose', 'any']).forEach(v => weaponSet.add(v));
  _sheetCollectFixedFeatProfs('armorProficiencies', ['choose', 'any']).forEach(v => armorSet.add(v));
  _sheetCollectFixedFeatProfs('weaponProficiencies', ['choose', 'any']).forEach(v => weaponSet.add(v));
  if (C?.choices) {
    for (const [key, val] of Object.entries(C.choices)) {
      if (!val) continue;
      const lk = key.toLowerCase();
      const vals = Array.isArray(val) ? val : [val];
      if (lk.includes('mastery') && lk.includes('weapon')) {
        vals.forEach(v => {
          const nv = _sheetNormalizeProfLabel(v);
          if (nv) weaponMasterySet.add(nv);
        });
        continue;
      }
      if (lk.includes('armor')) {
        vals.forEach(v => {
          const nv = _sheetNormalizeProfLabel(v);
          if (nv) armorSet.add(nv);
        });
      }
      if (lk.includes('weapon')) {
        vals.forEach(v => {
          const nv = _sheetNormalizeProfLabel(v);
          if (nv) weaponSet.add(nv);
        });
      }
    }
  }
  _sheetCollectAdapterProfGrants()
    .filter(g => g.type === 'armor' || g.type === 'weapon')
    .forEach(g => {
      const vals = Array.isArray(g.values) ? g.values : [g.values];
      if (g.display !== false) {
        vals.map(_sheetNormalizeProfLabel).filter(Boolean).forEach(v => {
          if (g.type === 'armor') armorSet.add(v);
          else weaponSet.add(v);
        });
      }
      if (g.type === 'weapon' && g.match && typeof g.match === 'object') weaponRules.push(g.match);
    });
  return { armorSet, weaponSet, weaponMasterySet, weaponRules };
}

const _SHEET_SIMPLE_WEAPONS = new Set([
  'club','dagger','greatclub','handaxe','javelin','lighthammer','mace','quarterstaff','sickle','spear',
  'dart','lightcrossbow','shortbow','sling','crossbowlight'
]);
const _SHEET_MARTIAL_WEAPONS = new Set([
  'battleaxe','flail','glaive','greataxe','greatsword','halberd','lance','longsword','maul','morningstar',
  'pike','rapier','scimitar','shortsword','trident','warpick','warhammer','whip','blowgun','handcrossbow',
  'heavycrossbow','longbow','crossbowhand','crossbowheavy','pistol','musket'
]);

function _sheetWeaponNameKeys(item){
  const raw = String(item?.name || '')
    .replace(/,\s*\+\d+$/i, '')
    .replace(/\s*\+\d+$/i, '')
    .trim();
  const key = _sheetCompactKey(raw);
  const keys = new Set([key]);
  const aliases = {
    crossbowhand: 'handcrossbow',
    handcrossbow: 'crossbowhand',
    crossbowlight: 'lightcrossbow',
    lightcrossbow: 'crossbowlight',
    crossbowheavy: 'heavycrossbow',
    heavycrossbow: 'crossbowheavy',
  };
  if (aliases[key]) keys.add(aliases[key]);
  Array.from(keys).forEach(k => {
    if (k.endsWith('s')) keys.add(k.slice(0, -1));
  });
  return keys;
}

function _sheetWeaponCategory(item){
  const raw = item?.weaponCategory || item?.weaponType || item?.category || item?._weaponCategory || item?.weaponGroup || '';
  const k = _sheetCompactKey(raw);
  if (k.includes('simple')) return 'simple';
  if (k.includes('martial')) return 'martial';
  const nameKeys = _sheetWeaponNameKeys(item);
  for (const nk of nameKeys) {
    if (_SHEET_SIMPLE_WEAPONS.has(nk)) return 'simple';
    if (_SHEET_MARTIAL_WEAPONS.has(nk)) return 'martial';
  }
  return '';
}

function _sheetItemHasProperty(item, props){
  const propAliases = {
    f: ['f', 'finesse'],
    finesse: ['f', 'finesse'],
    l: ['l', 'light'],
    light: ['l', 'light'],
    h: ['h', 'heavy'],
    heavy: ['h', 'heavy'],
    v: ['v', 'versatile'],
    versatile: ['v', 'versatile'],
    t: ['t', 'thrown'],
    thrown: ['t', 'thrown'],
    '2h': ['2h', 'twohanded'],
    twohanded: ['2h', 'twohanded'],
    'two-handed': ['2h', 'twohanded'],
    s: ['s', 'stealth', 'disadvantage'],
    stealth: ['s', 'stealth', 'disadvantage'],
    disadvantage: ['s', 'stealth', 'disadvantage'],
  };
  const expandPropKeys = (v) => {
    const k = _sheetCompactKey(v);
    return propAliases[k] || [k];
  };
  const wanted = new Set((Array.isArray(props) ? props : [props]).flatMap(expandPropKeys));
  return (item?.property || []).some(p => {
    const raw = String(p || '');
    const lbl = typeof WEAPON_PROP_LABELS === 'object' ? WEAPON_PROP_LABELS[raw] : '';
    return expandPropKeys(raw).some(k => wanted.has(k)) || expandPropKeys(lbl).some(k => wanted.has(k));
  });
}

function _sheetWeaponMatchesRule(item, rule){
  if(!item || !rule || typeof rule !== 'object') return false;
  if(rule.type && item.type !== rule.type) return false;
  if(Array.isArray(rule.types) && !rule.types.includes(item.type)) return false;
  const cat = _sheetWeaponCategory(item);
  if(rule.category && cat !== String(rule.category).toLowerCase()) return false;
  if(rule.melee === true && item.type !== 'M') return false;
  if(rule.ranged === true && item.type !== 'R') return false;
  if(Array.isArray(rule.propertiesAny) && rule.propertiesAny.length && !rule.propertiesAny.some(p => _sheetItemHasProperty(item, p))) return false;
  if(Array.isArray(rule.propertiesAll) && rule.propertiesAll.length && !rule.propertiesAll.every(p => _sheetItemHasProperty(item, p))) return false;
  if(Array.isArray(rule.excludeProperties) && rule.excludeProperties.some(p => _sheetItemHasProperty(item, p))) return false;
  return true;
}

function _sheetWeaponProficiencyInfo(item, weaponOverride){
  if (!item || !['M','R'].includes(item.type)) return { proficient: true, source: '' };
  if (weaponOverride?.grantsProficiency) return { proficient: true, source: weaponOverride.label || weaponOverride.key || '' };
  const { weaponSet, weaponRules } = _collectSheetEquipmentProficiencySets();
  if (weaponRules.some(rule => _sheetWeaponMatchesRule(item, rule))) return { proficient: true, source: 'Weapon Training' };
  const profKeys = Array.from(weaponSet).map(_sheetCompactKey).filter(Boolean);
  const hasAny = (...keys) => profKeys.some(k => keys.includes(k));
  const cat = _sheetWeaponCategory(item);
  if (cat === 'simple' && hasAny('simple', 'simpleweapon', 'simpleweapons')) return { proficient: true, source: 'Simple Weapons' };
  if (cat === 'martial' && hasAny('martial', 'martialweapon', 'martialweapons')) return { proficient: true, source: 'Martial Weapons' };
  const nameKeys = _sheetWeaponNameKeys(item);
  for (const nk of nameKeys) {
    if (profKeys.includes(nk) || profKeys.includes(nk + 's')) return { proficient: true, source: item.name || '' };
  }
  const isMelee = item.type === 'M';
  const isRanged = item.type === 'R';
  const isHeavy = _sheetItemHasProperty(item, ['H', 'heavy']);
  const isTwoHanded = _sheetItemHasProperty(item, ['2H', 'two-handed', 'twohanded']);
  for (const k of profKeys) {
    if (k === 'weapons' || k === 'allweapons') return { proficient: true, source: 'Weapons' };
    if (isMelee && (k === 'meleeweapons' || k === 'meleeweapon')) return { proficient: true, source: 'Melee Weapons' };
    if (isRanged && (k === 'rangedweapons' || k === 'rangedweapon')) return { proficient: true, source: 'Ranged Weapons' };
    if (isMelee && cat === 'simple' && k.includes('simple') && k.includes('melee')) return { proficient: true, source: 'Simple Melee Weapons' };
    if (isRanged && cat === 'simple' && k.includes('simple') && k.includes('ranged')) return { proficient: true, source: 'Simple Ranged Weapons' };
    if (isMelee && cat === 'martial' && k.includes('martial') && k.includes('melee')) {
      if (k.includes('withoutheavyortwohanded') || k.includes('withoutheavyortwohandedproperty')) {
        if (!isHeavy && !isTwoHanded) return { proficient: true, source: 'Melee Martial Weapons' };
      } else {
        return { proficient: true, source: 'Melee Martial Weapons' };
      }
    }
    if (isRanged && cat === 'martial' && k.includes('martial') && k.includes('ranged')) return { proficient: true, source: 'Martial Ranged Weapons' };
  }
  return { proficient: false, source: '' };
}

function _sheetArmorTrainingInfo(item){
  if (!item || !['LA','MA','HA','S'].includes(item.type)) return { trained: true, kind: '' };
  const { armorSet } = _collectSheetEquipmentProficiencySets();
  const keys = Array.from(armorSet).map(_sheetCompactKey).filter(Boolean);
  const has = (...vals) => keys.some(k => vals.includes(k));
  if (item.type === 'LA') return { trained: has('light', 'lightarmor'), kind: 'Light Armor' };
  if (item.type === 'MA') return { trained: has('medium', 'mediumarmor'), kind: 'Medium Armor' };
  if (item.type === 'HA') return { trained: has('heavy', 'heavyarmor'), kind: 'Heavy Armor' };
  if (item.type === 'S') return { trained: has('shield', 'shields'), kind: 'Shield' };
  return { trained: true, kind: '' };
}

function _sheetArmorTrainingIssues(){
  const inv = _resolvedInventory();
  return inv
    .filter(i => i.equipped && ['LA','MA','HA','S'].includes(i.type))
    .map(item => ({ item, info: _sheetArmorTrainingInfo(item) }))
    .filter(r => !r.info.trained);
}

function _sheetHasNonProficientArmor(){
  return _sheetArmorTrainingIssues().some(r => ['LA','MA','HA'].includes(r.item.type));
}

function calcAC(){
  if(!C) return 10;
  const dex = getMod(getFinal('dex'));
  const con = getMod(getFinal('con'));
  const wis = getMod(getFinal('wis'));
  const cha = getMod(getFinal('cha'));
  const inv = _resolvedInventory();
  const equippedArmor  = inv.find(i => i.equipped && ['LA','MA','HA'].includes(i.type));
  const equippedShield = inv.find(i => i.equipped && i.type === 'S');
  const shieldTrained = equippedShield ? _sheetArmorTrainingInfo(equippedShield).trained : false;
  const shieldBonus = equippedShield && shieldTrained ? (2 + (equippedShield.bonusAc ? parseInt(equippedShield.bonusAc)||0 : 0)) : 0;
  let ac;
  const effAC = _sheetACBonus();
  if(equippedArmor){
    const baseAC = equippedArmor.ac || 10;
    const magicBonus = equippedArmor.bonusAc ? parseInt(equippedArmor.bonusAc)||0 : 0;
    if(equippedArmor.type==='LA') ac = baseAC + dex + magicBonus;
    else if(equippedArmor.type==='MA') ac = baseAC + Math.min(2,dex) + magicBonus;
    else ac = baseAC + magicBonus; // HA
    return ac + shieldBonus + effAC;
  }

  // No armor: evaluate all legal formulas and use the best one.
  const candidates = [10 + dex + shieldBonus];
  const modByAbility = { str:getMod(getFinal('str')), dex, con, wis, int:getMod(getFinal('int')), cha };
  const evalRules = (rules, level) => {
    (Array.isArray(rules) ? rules : []).forEach(rule => {
      if (!rule || typeof rule !== 'object') return;
      const minLevel = Number(rule.minLevel || 1);
      if (Number(level || 0) < minLevel) return;
      if (rule.requiresNoArmor !== false && !!equippedArmor) return;
      const allowShield = !!rule.allowShield;
      if (!allowShield && !!equippedShield) return;
      const base = Number(rule.base || 10);
      const abilities = Array.isArray(rule.abilities) ? rule.abilities : [];
      const abMod = abilities.reduce((sum, ab) => sum + Number(modByAbility[String(ab || '').toLowerCase()] || 0), 0);
      const withShield = allowShield ? shieldBonus : 0;
      candidates.push(base + abMod + withShield);
    });
  };
  _sheetClassEntities().forEach(ent => {
    evalRules(_sheetGetClassRuntimeConfig(ent.className)?.unarmoredDefense, ent.level);
    evalRules(_sheetGetSubclassRuntimeConfig(ent.className, ent.subclassShortName)?.unarmoredDefense, ent.level);
  });
  evalRules(_sheetGetSpeciesRuntimeConfig(C?.speciesName || '', C?.speciesSource || '')?.unarmoredDefense, C?.level || 1);
  ac = Math.max(...candidates);
  return ac + _sheetACBonus();
}
